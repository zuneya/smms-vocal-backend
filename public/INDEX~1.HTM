<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMMS — K-POP 교육 플랫폼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquareNeo@1.0/nanumsquareneo.css">
<style>
:root{
  --bg-app:#f5f5f7;
  --bg-elevated:#ffffff;
  --bg-sidebar:#ffffff;
  --border:rgba(0,0,0,.09);
  --border-soft:rgba(0,0,0,.06);
  --text:#0a0a0f;
  --text-muted:#52525b;
  --text-faint:#a1a1aa;
  --accent:#0a0a0f;
  --accent-hover:#18181b;
  --accent-soft:rgba(10,10,15,.05);
  --accent-ring:rgba(10,10,15,.15);
  --highlight:#6d28d9;
  --highlight-soft:rgba(109,40,217,.07);
  --shadow-xs:0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 2px 8px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 8px 24px rgba(0,0,0,.07),0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 20px 48px rgba(0,0,0,.10),0 4px 12px rgba(0,0,0,.05);
  --radius:16px;
  --radius-sm:10px;
  --radius-pill:999px;
  --font:'NanumSquareNeo','Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',system-ui,sans-serif;

  /* 폰트 크기 위계 — 6단계로 한정 */
  --fs-display:26px;  /* 핵심 강조 수치(대시보드 히어로 KPI) */
  --fs-title:18px;     /* 페이지/모달/카드 타이틀 */
  --fs-emphasis:15px;  /* 메뉴명·버튼·소제목 등 강조 본문 */
  --fs-body:13px;      /* 일반 본문·리스트·설명 */
  --fs-caption:11px;   /* 캡션·라벨·타임스탬프·배지 */
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-app);min-height:100vh;font-size:15px;color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;letter-spacing:-.012em}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:#fff;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border-soft)}
.logo{padding:20px 18px 20px;display:flex;align-items:center}
.logo-img{display:block;width:158px;max-width:100%;height:auto;object-fit:contain}
.user-info-trigger{cursor:pointer;text-align:left;width:100%;border:none;font:inherit;background:transparent;padding:0;display:block;-webkit-tap-highlight-color:transparent}
.user-info-inner{padding:14px 16px;border-top:1px solid var(--border-soft);transition:background .15s}
.user-info-trigger:hover .user-info-inner{background:#f4f4f5}
.user-info-trigger:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:var(--radius-sm)}
.user-info-main{display:flex;align-items:center;gap:10px}
.user-avatar-mini{width:34px;height:34px;border-radius:50%;background:var(--text);color:#fff;font-size:var(--fs-body);font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-info-text{flex:1;min-width:0}
.user-role-line{font-size:var(--fs-caption);color:var(--text-faint);margin-top:1px}
.user-info-chevron{color:var(--text-faint);font-size:var(--fs-caption);flex-shrink:0}
.user-info-hint{font-size:var(--fs-caption);color:var(--text-faint);padding:0 16px 12px;margin-top:-4px}
.role-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.36);z-index:95;align-items:center;justify-content:center;padding:20px}
.role-overlay.show{display:flex}
.role-sheet{background:#fff;border-radius:var(--radius);padding:24px;width:360px;max-width:100%;border:1px solid var(--border-soft);box-shadow:var(--shadow-lg)}
.role-sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.role-sheet-title{font-size:var(--fs-title);font-weight:800;color:var(--text);letter-spacing:-.01em}
.role-sheet-desc{font-size:var(--fs-body);color:var(--text-muted);line-height:1.5;margin-bottom:16px}
.role-option-list{display:flex;flex-direction:column;gap:6px}
.role-option{display:block;width:100%;padding:11px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fafafa;color:var(--text-muted);cursor:pointer;font-size:var(--fs-body);font-weight:700;text-align:left;transition:border-color .15s,background .15s,color .15s;font-family:inherit}
.role-option:hover{border-color:rgba(0,0,0,.2);color:var(--text);background:#f4f4f5}
.role-option.active{border-color:var(--text);background:var(--text);color:#fff}
.nav{flex:1;padding:16px 10px 12px;overflow-y:auto}
.nav-section{margin-bottom:6px}
.nav-section-title{font-size:var(--fs-caption);color:var(--text-faint);text-transform:uppercase;letter-spacing:.07em;padding:8px 10px 4px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:var(--fs-body);font-weight:400;color:var(--text-muted);transition:background .12s,color .12s;margin-bottom:1px}
.nav-item:hover{background:#f4f4f5;color:var(--text)}
.nav-item.active{background:var(--text);color:#fff;font-weight:700}
.nav-item .icon{font-size:var(--fs-body);width:18px;text-align:center;opacity:.8}
.nav-item.active .icon{opacity:1}
.nav-item .badge{margin-left:auto;background:#dc2626;color:#fff;font-size:var(--fs-caption);font-weight:700;padding:1px 6px;border-radius:var(--radius-pill)}
.user-name{font-weight:700;color:var(--text);font-size:var(--fs-body);letter-spacing:-.015em}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0;scrollbar-gutter:stable}
.topbar{background:rgba(245,245,247,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0;position:sticky;top:0;z-index:20}
.topbar-inner{max-width:1320px;margin:0 auto;padding:13px 32px;display:flex;align-items:center;gap:14px;width:100%}
.page-title{font-size:var(--fs-title);font-weight:800;color:var(--text);letter-spacing:-.015em;line-height:1.2;display:none}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:var(--fs-body);font-weight:700;transition:opacity .12s,transform .1s,background .12s;font-family:inherit;letter-spacing:-.01em;white-space:nowrap;flex-shrink:0}
.btn:active{transform:scale(.975)}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:hover{opacity:.8}
.btn-secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#f4f4f5}
.btn:disabled,.btn[disabled]{opacity:.55;cursor:not-allowed;pointer-events:none}
.btn-sm{padding:6px 12px;font-size:var(--fs-body);border-radius:7px}
.btn-danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.content-shell{flex:1;width:100%}
.content{max-width:1320px;margin:0 auto;padding:28px 32px 48px;width:100%}

/* Stats — editorial strip, not isolated boxes */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:24px;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;background:#fff}
.stat-card{background:#fff;padding:20px 22px;border:none;border-right:1px solid var(--border-soft);transition:background .15s;position:relative}
.stat-card:last-child{border-right:none}
.stat-card:hover{background:#fafafa}
.stat-label{font-size:var(--fs-caption);color:var(--text-faint);margin-bottom:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.stat-value{font-size:var(--fs-display);font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1}
.stat-sub{font-size:var(--fs-caption);color:var(--text-muted);margin-top:7px;font-weight:400}
.stat-up{color:#16a34a;font-weight:700}


/* ── Phase 2-4 upgrade: live ecosystem, narrative bridge, motion hierarchy ── */
@keyframes smuFadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes smuPulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.45)}}
@keyframes smuScan{0%{transform:translateX(-105%);opacity:0}25%{opacity:.45}100%{transform:translateX(105%);opacity:0}}
.hero-section{animation:smuFadeUp .42s cubic-bezier(.2,.7,.2,1) both}
.momentum-strip{display:grid;grid-template-columns:1.15fr .9fr .9fr;gap:0;margin:-10px 0 18px;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;background:#fff;animation:smuFadeUp .44s cubic-bezier(.2,.7,.2,1) .06s both}
.momentum-cell{position:relative;padding:14px 18px;border-right:1px solid var(--border-soft);min-height:74px;background:linear-gradient(180deg,#fff,#fbfbfc)}
.momentum-cell:last-child{border-right:none}
.momentum-kicker{display:flex;align-items:center;gap:8px;font-size:var(--fs-caption);font-weight:900;letter-spacing:.10em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;box-shadow:0 0 0 5px rgba(22,163,74,.08);animation:smuPulse 2.2s ease-in-out infinite;flex-shrink:0}
.momentum-main{font-size:var(--fs-title);font-weight:900;letter-spacing:-.02em;color:var(--text);line-height:1.15}
.momentum-sub{font-size:var(--fs-caption);color:var(--text-muted);margin-top:5px;font-weight:700;line-height:1.35}
.momentum-cell.primary{background:#fff;color:var(--text);overflow:hidden;border-left:3px solid var(--text)}
.momentum-cell.primary:after{display:none}
.momentum-cell.primary .momentum-kicker{color:var(--text-faint)}
.momentum-cell.primary .momentum-main{color:var(--text)}
.momentum-cell.primary .momentum-sub{color:var(--text-muted)}
.dash-panel,.workflow-row,.dash-signal,.compact-metric,.activity-item{transition:transform .18s cubic-bezier(.2,.7,.2,1),box-shadow .18s cubic-bezier(.2,.7,.2,1),border-color .18s,background .18s}
.dash-panel{animation:smuFadeUp .45s cubic-bezier(.2,.7,.2,1) both;box-shadow:0 1px 2px rgba(0,0,0,.025)}
.dash-stack .dash-panel:nth-child(1){animation-delay:.08s}.dash-stack .dash-panel:nth-child(2){animation-delay:.13s}.dash-stack .dash-panel:nth-child(3){animation-delay:.18s}
.dash-panel:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(0,0,0,.07);border-color:rgba(0,0,0,.12)}
.workflow-row:hover,.dash-signal:hover,.compact-metric:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(0,0,0,.055);border-color:rgba(0,0,0,.13)}
.activity-item:hover{background:#fafafa;margin-left:-8px;margin-right:-8px;padding-left:8px;padding-right:8px;border-radius:10px}
.live-panel-head{display:flex;align-items:center;gap:8px}.live-panel-head:before{content:"";width:6px;height:6px;border-radius:50%;background:#16a34a;box-shadow:0 0 0 5px rgba(22,163,74,.08);animation:smuPulse 2.1s ease-in-out infinite}.activity-time{font-size:var(--fs-caption);color:var(--text-faint);font-weight:800;white-space:nowrap}.journey-map{display:flex;flex-direction:column;gap:11px}.journey-node{display:grid;grid-template-columns:34px 1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid var(--border-soft);border-radius:13px;background:#fff;position:relative}.journey-node:before{content:"";position:absolute;left:28px;top:46px;bottom:-14px;width:1px;background:var(--border-soft)}.journey-node:last-child:before{display:none}.journey-icon{width:34px;height:34px;border-radius:11px;background:#0a0a0f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:var(--fs-body);font-weight:900}.journey-title{font-size:var(--fs-body);font-weight:800;color:var(--text);letter-spacing:-.01em}.journey-sub{font-size:var(--fs-caption);color:var(--text-muted);margin-top:2px;font-weight:700}.journey-state{font-size:var(--fs-caption);font-weight:900;color:var(--text);background:#f4f4f5;border:1px solid var(--border-soft);padding:4px 9px;border-radius:999px;white-space:nowrap}.signal-line{height:6px;border-radius:999px;background:#f4f4f5;overflow:hidden;margin-top:13px}.signal-fill{height:100%;border-radius:999px;background:#0a0a0f}.pulse-card{animation:smuFadeUp .45s cubic-bezier(.2,.7,.2,1) .14s both}.pulse-card .live-dot{display:inline-block;margin-right:0}.priority-ribbon{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px}
.priority-chip{font-size:var(--fs-caption);font-weight:700;letter-spacing:.02em;border:1px solid var(--border);color:var(--text-muted);border-radius:999px;padding:4px 9px;background:#f4f4f5}
@media(max-width:900px){.momentum-strip{grid-template-columns:1fr}.momentum-cell{border-right:none;border-bottom:1px solid var(--border-soft)}.momentum-cell:last-child{border-bottom:none}}
@media(max-width:768px){.momentum-strip{margin:0 0 16px}.momentum-main{font-size:var(--fs-emphasis)}.journey-node{grid-template-columns:30px 1fr}.journey-state{grid-column:2}.journey-icon{width:30px;height:30px}.dash-panel:hover,.workflow-row:hover,.dash-signal:hover,.compact-metric:hover{transform:none}}


/* ── Dashboard architecture — asymmetric product layout ── */
.dash-architecture{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.75fr);gap:18px;align-items:start}
.dash-stack{display:flex;flex-direction:column;gap:16px}
.dash-panel{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden}
.dash-panel.featured{min-height:250px}
.dash-panel-head{padding:16px 20px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;gap:14px}
.dash-panel-title{font-size:var(--fs-body);font-weight:800;letter-spacing:-.02em;color:var(--text);display:flex;align-items:center;gap:8px}
.dash-panel-kicker{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.dash-panel-body{padding:18px 20px}
.dash-focus{display:grid;grid-template-columns:minmax(0,1fr) 170px;gap:22px;align-items:end}
.dash-focus-label{font-size:var(--fs-caption);font-weight:800;color:var(--text-faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.dash-focus-title{font-size:var(--fs-display);font-weight:900;letter-spacing:-.02em;line-height:1.12;margin-bottom:10px;color:var(--text)}
.dash-focus-desc{font-size:var(--fs-body);color:var(--text-muted);line-height:1.65;max-width:560px}
.dash-focus-metric{background:#fafafa;color:var(--text);border-radius:14px;padding:18px;min-height:138px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border-soft)}
.dash-focus-metric .metric-label{font-size:var(--fs-caption);font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--text-faint)}
.dash-focus-metric .metric-value{font-size:var(--fs-display);font-weight:900;letter-spacing:-.02em;line-height:1;color:var(--text)}
.dash-focus-metric .metric-sub{font-size:var(--fs-caption);color:var(--text-muted);font-weight:700}
.dash-signal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
.dash-signal{border:1px solid var(--border-soft);border-radius:12px;padding:14px;background:#fafafa}
.dash-signal-label{font-size:var(--fs-caption);color:var(--text-faint);font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.dash-signal-value{font-size:var(--fs-display);font-weight:900;letter-spacing:-.02em;line-height:1;color:var(--text)}
.dash-signal-sub{font-size:var(--fs-caption);color:var(--text-muted);margin-top:7px;font-weight:700}
.activity-list{display:flex;flex-direction:column}
.activity-item{display:grid;grid-template-columns:8px minmax(0,1fr) auto;gap:12px;align-items:start;padding:13px 0;border-bottom:1px solid var(--border-soft)}
.activity-item:last-child{border-bottom:none;padding-bottom:0}
.activity-dot{width:7px;height:7px;border-radius:50%;background:var(--text);margin-top:7px}
.activity-dot.purple{background:#8b5cf6}.activity-dot.green{background:#10b981}.activity-dot.amber{background:#f59e0b}.activity-dot.red{background:#ef4444}.activity-dot.blue{background:#3b82f6}
.activity-title{font-size:var(--fs-body);font-weight:800;color:var(--text);letter-spacing:-.02em}
.activity-meta{font-size:var(--fs-caption);color:var(--text-faint);margin-top:2px;font-weight:700}
.activity-tag{font-size:var(--fs-caption);font-weight:800;border-radius:999px;background:#f4f4f5;color:var(--text-muted);padding:3px 8px;white-space:nowrap}
.workflow-list{display:flex;flex-direction:column;gap:10px}
.workflow-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border-soft);border-radius:12px;background:#fff}
.workflow-index{width:28px;height:28px;border-radius:9px;background:#0a0a0f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:var(--fs-caption);font-weight:800;flex-shrink:0}
.workflow-main{flex:1;min-width:0}
.workflow-title{font-size:var(--fs-body);font-weight:800;color:var(--text);letter-spacing:-.02em}
.workflow-sub{font-size:var(--fs-caption);color:var(--text-muted);margin-top:2px}
.workflow-state{font-size:var(--fs-caption);font-weight:800;color:var(--text);white-space:nowrap}
.pulse-card{background:#fff;color:var(--text);border-radius:var(--radius-sm);padding:18px 20px;position:relative;overflow:hidden;border:1px solid var(--border-soft);border-left:3px solid var(--text)}
.pulse-card:before{display:none}
.pulse-label{position:relative;font-size:var(--fs-caption);color:var(--text-faint);font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.pulse-value{position:relative;font-size:var(--fs-display);font-weight:900;letter-spacing:-.02em;line-height:1;color:var(--text)}
.pulse-desc{position:relative;font-size:var(--fs-body);color:var(--text-muted);line-height:1.55;margin-top:10px}
.compact-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.compact-metric{border:1px solid var(--border-soft);border-radius:12px;background:#fff;padding:14px}
.compact-metric-label{font-size:var(--fs-caption);color:var(--text-faint);font-weight:800;text-transform:uppercase;letter-spacing:.07em}
.compact-metric-value{font-size:var(--fs-display);font-weight:900;letter-spacing:-.02em;line-height:1;margin-top:8px}
.compact-metric-sub{font-size:var(--fs-caption);color:var(--text-muted);margin-top:6px;font-weight:700}
@media(max-width:1000px){
  .dash-architecture{grid-template-columns:1fr}
  .dash-focus{grid-template-columns:1fr}
  .dash-focus-metric{min-height:110px}
}
@media(max-width:768px){
  .dash-signal-grid,.compact-metrics{grid-template-columns:1fr}
  .dash-panel-head{padding:14px 16px}
  .dash-panel-body{padding:16px}
  .dash-focus-title{font-size:var(--fs-title)}
}

/* Cards */
.card{background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border-soft);margin-bottom:16px;overflow:hidden}
.card-header{padding:15px 20px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:8px}
.card-title{font-size:var(--fs-body);font-weight:700;color:var(--text);letter-spacing:-.02em}
.card-body{padding:20px}


/* ── Topbar right group (PC) ── */
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.mobile-right-group{display:none;align-items:center;gap:6px;flex-shrink:0}

/* ── Language in profile sheet ── */
.lang-sheet-opt{padding:9px 10px;border-radius:8px;border:1px solid var(--border);background:#fafafa;color:var(--text-muted);cursor:pointer;font-size:var(--fs-body);font-weight:700;text-align:center;transition:border-color .15s,background .15s,color .15s;font-family:inherit}
.lang-sheet-opt:hover{border-color:rgba(0,0,0,.2);color:var(--text);background:#f4f4f5}
.lang-sheet-opt.active{border-color:var(--text);background:var(--text);color:#fff}

/* ── Notification bell — dot fixed to button ── */
.notif-bell-wrap{position:relative;flex-shrink:0}
.notif-bell{width:36px;height:36px;border-radius:9px;border:1px solid var(--border-soft);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .12s;position:relative}
.notif-bell:hover{background:#f4f4f5}
.notif-bell-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:#dc2626;border:2px solid var(--bg-app);z-index:1;pointer-events:none}
.notif-dropdown{display:none;position:fixed;width:320px;background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:999;overflow:hidden;max-height:calc(100dvh - 80px);overflow-y:auto}
.notif-dropdown.open{display:block}
.notif-drop-head{padding:14px 16px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between}
.notif-drop-title{font-size:var(--fs-body);font-weight:800;letter-spacing:-.02em}
.notif-drop-clear{font-size:var(--fs-caption);color:var(--text-faint);cursor:pointer;font-weight:700}
.notif-drop-clear:hover{color:var(--text)}
.notif-drop-list{max-height:340px;overflow-y:auto}
.notif-drop-item{padding:12px 16px;border-bottom:1px solid var(--border-soft);display:flex;gap:10px;cursor:pointer;transition:background .12s}
.notif-drop-item:last-child{border-bottom:none}
.notif-drop-item:hover{background:#fafafa}
.notif-drop-item.unread{background:#fafafa}
.notif-dot-sm{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.nd-red{background:#dc2626}.nd-amber{background:#d97706}.nd-blue{background:#3b82f6}.nd-green{background:#16a34a}.nd-purple{background:#7c3aed}
.notif-drop-text{font-size:var(--fs-body);font-weight:700;color:var(--text);line-height:1.3}
.notif-drop-meta{font-size:var(--fs-caption);color:var(--text-faint);margin-top:2px;font-weight:400}

/* ── Calendar view ── */
.cal-wrap{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:16px}
.cal-head{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border-soft)}
.cal-nav{width:28px;height:28px;border-radius:7px;border:1px solid var(--border-soft);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:var(--fs-body);transition:background .12s}
.cal-nav:hover{background:#f4f4f5}
.cal-month{font-size:var(--fs-emphasis);font-weight:800;letter-spacing:-.01em;flex:1}
.cal-view-toggle{display:flex;gap:0;border:1px solid var(--border-soft);border-radius:7px;overflow:hidden}
.cal-vbtn{padding:5px 11px;font-size:var(--fs-caption);font-weight:700;cursor:pointer;background:#fff;border:none;color:var(--text-muted);transition:background .12s,color .12s;font-family:inherit}
.cal-vbtn.active{background:var(--text);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-label{padding:8px 0;text-align:center;font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border-soft)}
.cal-cell{min-height:88px;padding:6px;border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);vertical-align:top;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.last-row{border-bottom:none}
.cal-cell.other-month .cal-date{color:var(--text-faint)}
.cal-cell.today{background:#fafafa}
.cal-date{font-size:var(--fs-caption);font-weight:700;color:var(--text);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .cal-date{background:var(--text);color:#fff}
.cal-event{font-size:var(--fs-caption);font-weight:700;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.cal-ev-vocal{background:#f0f4ff;color:#1e40af}
.cal-ev-dance{background:#f0fdf4;color:#166534}
.cal-ev-compose{background:#fffbeb;color:#92400e}
.cal-ev-eval{background:#0a0a0f;color:#fff}

/* ── Weekly timeline (instructor) ── */
.week-timeline{display:grid;grid-template-columns:52px repeat(5,1fr);gap:0;background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:16px}
.wt-head{padding:10px 8px;text-align:center;font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border-soft);border-right:1px solid var(--border-soft)}
.wt-head:last-child{border-right:none}
.wt-time{font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);padding:6px 6px;border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);text-align:right;background:#fafafa}
.wt-cell{border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);padding:3px;min-height:42px;position:relative}
.wt-cell:last-child{border-right:none}
.wt-block{border-radius:6px;padding:4px 6px;font-size:var(--fs-caption);font-weight:700;cursor:pointer;height:100%;display:flex;flex-direction:column;justify-content:center}
.wt-block.vocal{background:#f0f4ff;color:#1e40af}
.wt-block.dance{background:#f0fdf4;color:#166534}
.wt-block.compose{background:#fffbeb;color:#92400e}
.wt-block-title{font-size:var(--fs-caption);font-weight:700;line-height:1.2}
.wt-block-sub{font-size:var(--fs-caption);opacity:.7;margin-top:1px}

/* ── Online Lecture ── */
.lecture-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
.lecture-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.lecture-card{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);display:flex;gap:0;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.lecture-card:hover{box-shadow:var(--shadow-md)}
.lecture-thumb{width:140px;flex-shrink:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;position:relative;min-height:90px}
.lecture-thumb-icon{font-size:32px;opacity:.7}
.lecture-thumb-dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;font-size:var(--fs-caption);font-weight:700;padding:2px 5px;border-radius:4px}
.lecture-thumb-done{position:absolute;top:6px;left:6px;background:#16a34a;color:#fff;font-size:var(--fs-caption);font-weight:700;padding:2px 6px;border-radius:4px}
.lecture-thumb-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;background:rgba(0,0,0,.3);transition:opacity .15s}
.lecture-card:hover .lecture-thumb-play{opacity:1}
.lecture-play-btn{width:40px;height:40px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px}
.lecture-info{padding:14px 16px;flex:1;min-width:0}
.lecture-unit{font-size:var(--fs-caption);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:5px}
.lecture-title{font-size:var(--fs-body);font-weight:800;letter-spacing:-.01em;margin-bottom:4px;color:var(--text)}
.lecture-desc{font-size:var(--fs-caption);color:var(--text-muted);line-height:1.5;margin-bottom:10px}
.lecture-meta{display:flex;gap:12px;align-items:center}
.lecture-report-btn{margin-top:8px;width:100%;padding:7px;border-radius:8px;border:1px solid #e9e5fb;background:#faf9ff;color:var(--highlight);font-size:var(--fs-caption);font-weight:700;cursor:pointer;font-family:inherit;transition:background .12s,border-color .12s}
.lecture-report-btn:hover{background:#f0ecfd;border-color:#ddd6fe}
.lecture-meta-item{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700}
.lecture-progress-mini{flex:1;height:3px;background:#f4f4f5;border-radius:999px;overflow:hidden}
.lecture-progress-fill{height:100%;background:var(--text);border-radius:999px}

/* video player */
.vod-player{background:#0a0a0f;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px;position:relative}
.vod-screen{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:linear-gradient(160deg,#111,#0a0a0f)}
.vod-screen-icon{font-size:56px;opacity:.3}
.vod-screen-title{color:rgba(255,255,255,.5);font-size:var(--fs-body);font-weight:700}
.vod-controls{padding:10px 14px;display:flex;align-items:center;gap:10px;background:#111}
.vod-play{width:32px;height:32px;border-radius:50%;background:#fff;border:none;cursor:pointer;font-size:var(--fs-body);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .12s}
.vod-play:hover{opacity:.85}
.vod-seekbar{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:999px;cursor:pointer;position:relative}
.vod-seekbar-fill{height:100%;width:35%;background:#fff;border-radius:999px}
.vod-time{font-size:var(--fs-caption);color:rgba(255,255,255,.5);font-weight:700;flex-shrink:0}
.vod-vol{font-size:var(--fs-body);cursor:pointer;opacity:.6}

/* AI analysis panel */
.ai-panel{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px}
.ai-panel-head{padding:13px 16px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:8px}
.ai-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--fs-caption);font-weight:800;text-transform:uppercase;letter-spacing:.09em;background:#0a0a0f;color:#fff;padding:3px 8px;border-radius:999px}
.ai-badge-dot{width:5px;height:5px;border-radius:50%;background:#a78bfa;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.ai-panel-body{padding:16px}
.ai-score-row{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden}
.ai-score-cell{flex:1;padding:12px 14px;border-right:1px solid var(--border-soft);text-align:center}
.ai-score-cell:last-child{border-right:none}
.ai-score-label{font-size:var(--fs-caption);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint);margin-bottom:6px}
.ai-score-val{font-size:var(--fs-display);font-weight:800;letter-spacing:-.015em;color:var(--text)}
.ai-score-sub{font-size:var(--fs-caption);font-weight:700;margin-top:3px}
.ai-score-good{color:#16a34a}.ai-score-warn{color:#d97706}.ai-score-bad{color:#dc2626}
.ai-graph{margin-bottom:14px}
.ai-graph-label{font-size:var(--fs-caption);font-weight:700;color:var(--text-muted);margin-bottom:6px}
.ai-pitch-bars{display:flex;gap:2px;align-items:flex-end;height:44px}
.ai-pitch-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:opacity .15s}
.ai-pitch-bar:hover{opacity:.7}
.ai-comment{background:#fafafa;border-radius:var(--radius-sm);padding:12px 14px;font-size:var(--fs-body);color:var(--text-muted);line-height:1.65;border-left:3px solid #a78bfa}
.ai-comment-strong{font-weight:700;color:var(--text)}
.ai-suggest{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.ai-suggest-item{display:flex;gap:8px;align-items:flex-start;font-size:var(--fs-caption);color:var(--text-muted)}
.ai-suggest-icon{flex-shrink:0;margin-top:1px}

/* submit panel */
.submit-panel{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:16px;margin-bottom:14px}
.submit-panel-title{font-size:var(--fs-body);font-weight:800;letter-spacing:-.02em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

/* instructor lecture mgmt */
.lecture-mgmt-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-soft)}
.lecture-mgmt-thumb{width:60px;height:40px;background:#0a0a0f;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lecture-submission-card{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px}
.lecture-submission-card.sub-card-clickable{cursor:pointer;transition:border-color .12s,box-shadow .12s}
.lecture-submission-card.sub-card-clickable:hover{border-color:var(--text-faint);box-shadow:var(--shadow-xs)}
.submission-ai-preview{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:var(--radius-sm);padding:10px 12px;margin:10px 0;font-size:var(--fs-caption);color:#5b21b6;line-height:1.6}

/* AI score block */
.ai-analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
@media(max-width:760px){.ai-analysis-grid{grid-template-columns:1fr}}
.ai-analysis-grid-1col{display:flex;flex-direction:column;gap:12px;margin-bottom:10px}
.ai-score-block{background:#faf9ff;border:1px solid #e9e5fb;border-radius:var(--radius-sm);padding:12px 14px;display:flex;flex-direction:column}
.ai-score-head{display:flex;align-items:center;gap:6px;font-size:var(--fs-caption);font-weight:800;color:var(--highlight);letter-spacing:.01em;margin-bottom:10px}
.ai-score-head .ai-dot{width:6px;height:6px;border-radius:50%;background:var(--highlight)}
.ai-score-row{display:grid;grid-template-columns:84px 1fr 34px;align-items:center;gap:10px;margin-bottom:7px}
.ai-score-row:last-child{margin-bottom:0}
.ai-score-label{font-size:var(--fs-caption);font-weight:700;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-score-bar{height:6px;background:#ece8fb;border-radius:999px;overflow:hidden}
.ai-score-fill{height:100%;border-radius:999px;background:var(--highlight)}
.ai-score-fill.warn{background:#d97706}
.ai-score-fill.low{background:#dc2626}
.ai-score-val{font-size:var(--fs-caption);font-weight:800;color:var(--text);text-align:right}
.ai-score-foot{margin-top:10px;padding-top:9px;border-top:1px solid #e9e5fb;font-size:var(--fs-caption);font-weight:700;color:var(--text-faint)}

/* AI highlight timestamps */
.ai-highlight-block{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:12px 14px;display:flex;flex-direction:column}
.ai-highlight-label{font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px}
.ai-highlight-list{display:flex;flex-direction:column;gap:6px}
.ai-highlight-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;background:#fafafa;border:1px solid var(--border-soft);cursor:pointer;transition:background .12s,border-color .12s;font-family:inherit;text-align:left;width:100%}
.ai-highlight-item:hover{background:#f4f4f5;border-color:rgba(0,0,0,.13)}
.ai-highlight-time{font-size:var(--fs-caption);font-weight:800;color:#fff;background:var(--text);padding:2px 7px;border-radius:6px;flex-shrink:0;letter-spacing:-.01em}
.ai-highlight-text{font-size:var(--fs-caption);color:var(--text);font-weight:700;flex:1}
.ai-highlight-tag{font-size:var(--fs-caption);font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0}
.ai-highlight-tag.alert{background:#fef2f2;color:#b91c1c}
.ai-highlight-tag.warn{background:#fffbeb;color:#b45309}
.ai-highlight-tag.good{background:#f0fdf4;color:#15803d}
.ai-highlight-more{margin-top:8px;font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);text-align:center}

/* quick comment tags */
.quick-tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.quick-tag{font-size:var(--fs-caption);font-weight:700;padding:5px 10px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;transition:border-color .12s,background .12s,color .12s;font-family:inherit}
.quick-tag:hover{border-color:var(--text);color:var(--text);background:#f4f4f5}

/* feedback split */
.feedback-divider{display:flex;align-items:center;gap:8px;margin:12px 0 8px;font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em}
.feedback-divider:before,.feedback-divider:after{content:'';flex:1;height:1px;background:var(--border-soft)}
.ai-coach-toggle{font-size:var(--fs-caption);font-weight:700;color:var(--highlight);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;text-decoration:underline;text-decoration-color:rgba(109,40,217,.3)}

/* operator lecture dashboard */
.online-stat-bar{display:flex;gap:0;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:20px;background:#fff}
.online-stat-cell{flex:1;padding:18px 20px;border-right:1px solid var(--border-soft)}
.online-stat-cell:last-child{border-right:none}
.online-stat-label{font-size:var(--fs-caption);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint);margin-bottom:8px}
.online-stat-val{font-size:var(--fs-display);font-weight:800;letter-spacing:-.02em;color:var(--text);line-height:1}
.online-stat-sub{font-size:var(--fs-caption);color:var(--text-muted);margin-top:5px;font-weight:400}


@media(max-width:768px){
  .week-timeline{overflow-x:auto;display:block}
  .week-timeline > *{display:grid;grid-template-columns:40px repeat(5,1fr)}
}
@media(max-width:900px){.lecture-layout{grid-template-columns:1fr}}
@media(max-width:600px){.lecture-thumb{width:100px}.ai-score-row{flex-direction:column}}

/* ── 1:1 Message ── */
.msg-layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 158px);min-height:420px;max-height:720px;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;background:#fff;margin-bottom:16px}
.msg-list{border-right:1px solid var(--border-soft);display:flex;flex-direction:column}
.msg-list-head{padding:14px 16px;border-bottom:1px solid var(--border-soft);font-size:var(--fs-body);font-weight:800;letter-spacing:-.02em}
.msg-list-body{flex:1;overflow-y:auto}
.msg-thread{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border-soft);display:flex;gap:10px;align-items:flex-start;transition:background .12s}
.msg-thread:hover{background:#fafafa}
.msg-thread.active{background:#f4f4f5}
.msg-thread-avatar{width:32px;height:32px;border-radius:50%;background:var(--text);color:#fff;font-size:var(--fs-caption);font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg-thread-name{font-size:var(--fs-body);font-weight:700;color:var(--text)}
.msg-thread-preview{font-size:var(--fs-caption);color:var(--text-faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.msg-thread-time{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;margin-left:auto;flex-shrink:0}
.msg-thread-unread{width:7px;height:7px;border-radius:50%;background:#dc2626;flex-shrink:0;margin-top:4px}
.msg-chat{display:flex;flex-direction:column;flex:1}
.msg-chat-head{padding:14px 18px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:10px}
.msg-back-btn{display:none;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:var(--text);font-size:18px;cursor:pointer;flex-shrink:0;margin-right:-2px}
.msg-back-btn:hover{background:#f4f4f5}
.msg-chat-name{font-size:var(--fs-body);font-weight:700}
.msg-chat-sub{font-size:var(--fs-caption);color:var(--text-faint)}
.msg-chat-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;justify-content:flex-end;gap:12px;background:#fafafa}
.msg-bubble-wrap{display:flex;gap:8px;align-items:flex-end}
.msg-date-divider{text-align:center;font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;margin-bottom:2px}
.msg-bubble-wrap.me{flex-direction:row-reverse}
.msg-bubble{max-width:68%;padding:10px 13px;border-radius:14px;font-size:var(--fs-body);line-height:1.5;font-weight:400}
.msg-bubble.them{background:#fff;color:var(--text);border:1px solid var(--border-soft);border-bottom-left-radius:4px}
.msg-bubble.me{background:var(--text);color:#fff;border-bottom-right-radius:4px}
.msg-bubble-time{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;flex-shrink:0}
.msg-chat-input{padding:12px 16px;border-top:1px solid var(--border-soft);display:flex;gap:8px;background:#fff}
.msg-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:20px;font-size:var(--fs-body);font-family:inherit;resize:none;outline:none;transition:border-color .15s}
.msg-input:focus{border-color:var(--text)}
.msg-send{width:36px;height:36px;border-radius:50%;background:var(--text);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:opacity .12s;flex-shrink:0}
.msg-send:hover{opacity:.8}

/* ── Practice log ── */
.plog-editor{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:20px;margin-bottom:16px}
.plog-editor-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.plog-editor-title{font-size:var(--fs-body);font-weight:800;letter-spacing:-.01em}
.plog-date{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700}
.plog-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.plog-field{display:flex;flex-direction:column;gap:5px}
.plog-label{font-size:var(--fs-caption);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint)}
.plog-stars{display:flex;gap:3px}
.plog-star{font-size:20px;cursor:pointer;opacity:.3;transition:opacity .12s}
.plog-star.on{opacity:1}
.plog-timeline{display:flex;flex-direction:column;gap:0}
.plog-item{display:grid;grid-template-columns:48px 1fr;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-soft)}
.plog-item:last-child{border-bottom:none}
.plog-item-date{font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);text-align:right;padding-top:2px;line-height:1.4}
.plog-item-body{flex:1}
.plog-item-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.plog-item-title{font-size:var(--fs-body);font-weight:700;color:var(--text)}
.plog-item-score{display:flex;gap:1px}
.plog-item-score span{font-size:var(--fs-caption);opacity:.3}
.plog-item-score span.on{opacity:1}
.plog-item-note{font-size:var(--fs-body);color:var(--text-muted);line-height:1.5}
.plog-item-tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.plog-tag{font-size:var(--fs-caption);font-weight:700;padding:2px 7px;border-radius:var(--radius-pill);background:#f4f4f5;color:var(--text-muted)}

/* ── Waitlist / enrollment flow ── */
.wait-card{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.wait-rank{width:28px;height:28px;border-radius:8px;background:#f4f4f5;display:flex;align-items:center;justify-content:center;font-size:var(--fs-caption);font-weight:800;color:var(--text-muted);flex-shrink:0}
.wait-info{flex:1;min-width:0}
.wait-name{font-size:var(--fs-body);font-weight:700;color:var(--text)}
.wait-meta{font-size:var(--fs-caption);color:var(--text-faint);margin-top:2px}
.wait-date{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;text-align:right;flex-shrink:0;min-width:60px}
.enroll-section{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:16px}
.enroll-head{padding:14px 18px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between}
.enroll-course-name{font-size:var(--fs-body);font-weight:800;letter-spacing:-.01em}
.enroll-capacity{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700}
.enroll-bar{height:4px;background:#f4f4f5;margin:0 18px}
.enroll-bar-fill{height:100%;background:var(--text);border-radius:var(--radius-pill);transition:width .3s}
.enroll-body{padding:14px 18px}

/* ── Enrollment & Payment ── */
.course-explore-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:16px}
.course-card{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;transition:transform .15s,box-shadow .15s;cursor:pointer}
.course-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.course-card-top{padding:16px 18px 12px;border-bottom:1px solid var(--border-soft)}
.course-card-field{display:inline-flex;align-items:center;gap:5px;font-size:var(--fs-caption);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:8px}
.course-card-name{font-size:var(--fs-emphasis);font-weight:800;letter-spacing:-.01em;margin-bottom:4px}
.course-card-instr{font-size:var(--fs-caption);color:var(--text-muted);font-weight:700}
.course-card-body{padding:12px 18px}
.course-card-info{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.course-card-info-row{display:flex;justify-content:space-between;font-size:var(--fs-caption)}
.course-card-info-label{color:var(--text-faint);font-weight:700}
.course-card-info-val{font-weight:700;color:var(--text)}
.course-price{font-size:var(--fs-title);font-weight:800;letter-spacing:-.015em;color:var(--text);margin-bottom:10px}
.course-price span{font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);letter-spacing:0}
.course-capacity-bar{height:4px;background:#f4f4f5;border-radius:999px;overflow:hidden;margin-bottom:10px}
.course-capacity-fill{height:100%;border-radius:999px;background:var(--text)}

/* checkout flow */
.checkout-layout{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
.checkout-card{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px}
.checkout-section{padding:20px}
.checkout-section-title{font-size:var(--fs-body);font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);margin-bottom:16px}
.checkout-course-summary{display:flex;gap:14px;align-items:center;padding:16px;background:#fafafa;border-radius:var(--radius-sm);margin-bottom:16px}
.checkout-course-icon{width:44px;height:44px;border-radius:10px;background:var(--text);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.checkout-course-name{font-size:var(--fs-body);font-weight:800;letter-spacing:-.02em}
.checkout-course-meta{font-size:var(--fs-caption);color:var(--text-muted);margin-top:2px}
.payment-method-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.payment-method{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:border-color .12s}
.payment-method.selected{border-color:var(--text);background:#fafafa}
.payment-method-icon{font-size:20px;width:28px;text-align:center}
.payment-method-label{font-size:var(--fs-body);font-weight:700;flex:1}
.payment-method-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .12s}
.payment-method.selected .payment-method-radio{border-color:var(--text)}
.payment-method.selected .payment-method-radio:after{content:'';width:8px;height:8px;border-radius:50%;background:var(--text);display:block}
.order-summary-box{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;position:sticky;top:20px}
.order-summary-head{padding:16px 18px;border-bottom:1px solid var(--border-soft);font-size:var(--fs-body);font-weight:800;letter-spacing:-.02em}
.order-summary-body{padding:16px 18px}
.order-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:var(--fs-body)}
.order-row-label{color:var(--text-muted);font-weight:700}
.order-row-val{font-weight:700;color:var(--text)}
.order-divider{height:1px;background:var(--border-soft);margin:12px 0}
.order-total-label{font-size:var(--fs-body);font-weight:800}
.order-total-val{font-size:var(--fs-title);font-weight:800;letter-spacing:-.015em}
.order-notice{font-size:var(--fs-caption);color:var(--text-faint);line-height:1.6;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-soft)}

/* payment status badge / history */
.pay-status-paid{background:#f0fdf4;color:#15803d;padding:3px 9px;border-radius:999px;font-size:var(--fs-caption);font-weight:700}
.pay-status-pending{background:#fffbeb;color:#b45309;padding:3px 9px;border-radius:999px;font-size:var(--fs-caption);font-weight:700}
.pay-status-refunded{background:#fef2f2;color:#b91c1c;padding:3px 9px;border-radius:999px;font-size:var(--fs-caption);font-weight:700}
.pay-status-partial{background:#eff6ff;color:#1d4ed8;padding:3px 9px;border-radius:999px;font-size:var(--fs-caption);font-weight:700}

/* revenue dashboard */
.revenue-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;background:#fff;margin-bottom:20px}
.revenue-kpi{padding:18px 20px;border-right:1px solid var(--border-soft)}
.revenue-kpi:last-child{border-right:none}
.revenue-kpi-label{font-size:var(--fs-caption);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint);margin-bottom:8px}
.revenue-kpi-val{font-size:var(--fs-display);font-weight:800;letter-spacing:-.02em;color:var(--text);line-height:1}
.revenue-kpi-sub{font-size:var(--fs-caption);color:var(--text-muted);margin-top:6px;font-weight:400}
.revenue-kpi-up{color:#16a34a;font-weight:700}
.revenue-bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;margin-top:12px}
.revenue-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.revenue-bar{width:100%;border-radius:4px 4px 0 0;background:var(--text);opacity:.85;transition:opacity .15s;min-height:4px}
.revenue-bar:hover{opacity:1}
.revenue-bar-label{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700}

@media(max-width:900px){
  .checkout-layout{grid-template-columns:1fr}
  .order-summary-box{position:static}
  .revenue-kpi-grid{grid-template-columns:1fr 1fr}
  .revenue-kpi:nth-child(2){border-right:none}
  .revenue-kpi:nth-child(3){border-top:1px solid var(--border-soft)}
}
@media(max-width:768px){
  .course-explore-grid{grid-template-columns:1fr}
}

table{width:100%;border-collapse:collapse}
.md-view-toggle{display:flex;gap:6px;margin-bottom:14px}
.md-view-btn{font-size:var(--fs-caption);font-weight:700;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;transition:all .12s}
.md-view-btn:hover{border-color:rgba(0,0,0,.2);color:var(--text)}
.md-view-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.roster-table-wrap{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden}
.roster-table-wrap table{margin:0}
.roster-table-bar{width:64px;height:6px;border-radius:var(--radius-pill);background:#e4e4e7;overflow:hidden;flex-shrink:0}
.roster-table-bar-fill{height:100%;border-radius:var(--radius-pill)}
th{text-align:left;font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);padding:10px 14px;background:#fafafa;border-bottom:1px solid var(--border-soft);text-transform:uppercase;letter-spacing:.06em}
td{padding:12px 14px;border-bottom:1px solid var(--border-soft);font-size:var(--fs-body);color:var(--text-muted);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 9px;border-radius:var(--radius-pill);font-size:var(--fs-caption);font-weight:700}
.badge-green{background:#f0fdf4;color:#15803d}
.badge-blue{background:#eff6ff;color:#1d4ed8}
.badge-amber{background:#fffbeb;color:#b45309}
.badge-red{background:#fef2f2;color:#b91c1c}
.badge-gray{background:#f4f4f5;color:#52525b}
.badge-purple{background:#f5f3ff;color:#6d28d9}
.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:var(--fs-caption);font-weight:700;margin-right:8px}
.av-blue{background:#eff6ff;color:#1d4ed8}
.av-teal{background:#f0fdf4;color:#15803d}
.av-purple{background:#faf5ff;color:#6d28d9}
.av-coral{background:#fff7ed;color:#c2410c}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
.form-group{margin-bottom:14px}
label{display:block;font-size:var(--fs-caption);font-weight:700;color:var(--text-muted);margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:var(--fs-body);color:var(--text);background:#fff;font-family:inherit;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--text);box-shadow:0 0 0 3px var(--accent-ring)}
textarea{resize:vertical;min-height:64px}
textarea[readonly]{background:#fafafa;color:var(--text-muted);cursor:default;resize:none}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.timeline{list-style:none}
.timeline-item{display:flex;gap:12px;margin-bottom:16px}
.tl-dot{width:7px;height:7px;border-radius:50%;background:var(--text);margin-top:6px;flex-shrink:0}
.tl-date{font-size:var(--fs-caption);color:var(--text-faint);margin-bottom:2px;font-weight:700;letter-spacing:.02em}
.tl-content{font-size:var(--fs-body);color:var(--text-muted)}
.attendance-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-soft)}
.attendance-row:last-child{border-bottom:none}
.att-name{flex:1;font-size:var(--fs-body);font-weight:400;color:var(--text)}
.att-btns{display:flex;gap:5px}
.att-btn{padding:5px 10px;border-radius:6px;border:none;cursor:pointer;font-size:var(--fs-caption);font-weight:700;font-family:inherit;transition:transform .1s,opacity .12s;letter-spacing:.01em}
.att-btn:active{transform:scale(.96)}
.att-O{background:#f0fdf4;color:#15803d}
.att-O.sel{background:#16a34a;color:#fff}
.att-L{background:#fffbeb;color:#b45309}
.att-L.sel{background:#d97706;color:#fff}
.att-X{background:#fef2f2;color:#b91c1c}
.att-X.sel{background:#dc2626;color:#fff}
.progress-bar{height:5px;background:#f4f4f5;border-radius:var(--radius-pill);overflow:hidden}
.progress-fill{height:100%;border-radius:var(--radius-pill);background:var(--text)}
.notification-item{padding:14px 16px;margin-bottom:8px;border-radius:var(--radius-sm);background:#fff;border:1px solid var(--border-soft);border-left-width:3px}
.notif-blue{border-left-color:var(--highlight)}
.notif-red{border-left-color:#dc2626}
.notif-amber{border-left-color:#d97706}
.notif-title{font-size:var(--fs-body);font-weight:700;margin-bottom:3px;color:var(--text)}
.notif-desc{font-size:var(--fs-body);color:var(--text-muted);line-height:1.45}
.screen{display:none}
.screen.active{display:block}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.6}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:var(--radius);padding:28px;width:500px;max-width:100%;max-height:82vh;overflow-y:auto;border:1px solid var(--border-soft);box-shadow:var(--shadow-lg)}
.modal.modal-wide{width:760px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:var(--fs-title);font-weight:800;letter-spacing:-.01em;color:var(--text)}
.modal-close{background:#f4f4f5;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);line-height:1;width:32px;height:32px;border-radius:8px;transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e4e4e7;color:var(--text)}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border-soft);margin-bottom:18px}
.tab{padding:8px 14px;cursor:pointer;font-size:var(--fs-body);font-weight:700;color:var(--text-faint);border-radius:var(--radius-sm) var(--radius-sm) 0 0;transition:color .12s;margin-bottom:-1px;border-bottom:2px solid transparent}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:var(--radius-pill);font-size:var(--fs-caption);font-weight:700;margin-right:4px}
.chip-course{background:#f4f4f5;color:var(--text-muted);border:1px solid var(--border-soft)}
.feedback-card{border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:box-shadow .3s,border-color .3s}
.feedback-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px}
.score-badge{background:var(--text);color:#fff;font-size:var(--fs-body);font-weight:700;padding:3px 10px;border-radius:var(--radius-pill);flex-shrink:0}
.hw-feedback-link{margin-top:10px;width:100%;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px;border-radius:8px;border:1px solid var(--border);background:#fafafa;color:var(--text);font-size:var(--fs-caption);font-weight:700;cursor:pointer;font-family:inherit;transition:background .12s,border-color .12s}
.hw-feedback-link:hover{background:#f4f4f5;border-color:rgba(0,0,0,.15)}
.flash-highlight{border-color:var(--highlight)!important;box-shadow:0 0 0 3px rgba(109,40,217,.12)}
.feedback-ai-toggle-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-soft)}
.feedback-ai-panel{margin-top:10px}

/* vocal growth log */
.gc-course-filter{font-size:var(--fs-caption);font-weight:700;padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:border-color .12s,background .12s,color .12s}
.gc-course-filter:hover{border-color:rgba(0,0,0,.2)}
.gc-course-filter.active{background:var(--text);color:#fff;border-color:var(--text)}
.gc-course-filter-row{display:flex;gap:6px;flex-wrap:wrap}
.ic-filter-count{opacity:.65;margin-left:2px}
.ic-capture-section{border:1px solid var(--border-soft);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden}
.ic-capture-section-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:#fafafa;transition:background .12s}
.ic-capture-section-head:hover{background:#f4f4f5}
.ic-capture-section-arrow{font-size:11px;color:var(--text-faint);width:12px;flex-shrink:0}
.ic-capture-section-body{padding:12px;background:#fff;border-top:1px solid var(--border-soft)}
.ic-capture-section-body .lecture-submission-card{margin-bottom:10px}
.ic-capture-section-body .lecture-submission-card:last-child{margin-bottom:0}
.gc-chart-legend{display:flex;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.gc-legend-item{display:flex;align-items:center;gap:5px;font-size:var(--fs-caption);font-weight:700;color:var(--text-muted)}
.gc-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gc-table-wrap{overflow-x:auto;margin-top:14px}
.gc-vocal-table{width:100%;border-collapse:collapse;font-size:var(--fs-caption);min-width:480px}
.gc-vocal-table th{text-align:left;padding:8px 10px;font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border-soft);white-space:nowrap}
.gc-vocal-table td{padding:8px 10px;border-bottom:1px solid var(--border-soft);white-space:nowrap}
.gc-vocal-table tbody tr:hover{background:#fafafa}

/* vocal AI report (detailed, tabbed) — font sizes limited to 24px / 13px / 11px */
.vreport{font-size:var(--fs-body)}
.vreport-head{margin-bottom:16px}
.vreport-date{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;margin-bottom:3px}
.vreport-name{font-size:var(--fs-body);font-weight:800;color:var(--text)}
.vreport-tabbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;border-bottom:1px solid var(--border-soft);padding-bottom:10px}
.vreport-tab{font-size:var(--fs-body);font-weight:700;padding:7px 12px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:border-color .12s,background .12s,color .12s;white-space:nowrap}
.vreport-tab:hover{border-color:rgba(0,0,0,.18)}
.vreport-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.vreport-section{border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:12px}
.vreport-section-empty{background:#fafafa}
.vreport-section-title{font-size:var(--fs-body);font-weight:800;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-soft)}
.vreport-score-hero{text-align:center;padding:8px 0 4px}
.vreport-score-num{font-size:var(--fs-display);font-weight:800;letter-spacing:-.01em;color:var(--highlight)}
.vreport-score-max{font-size:var(--fs-body);font-weight:700;color:var(--text-faint)}
.vreport-score-desc{font-size:var(--fs-body);color:var(--text-muted);margin-top:6px;font-weight:700}
.vreport-bars{display:flex;flex-direction:column;gap:9px}
.vreport-bar-row{display:grid;grid-template-columns:108px 1fr 38px;align-items:center;gap:10px}
.vreport-bar-label{font-size:var(--fs-body);font-weight:700;color:var(--text-muted)}
.vreport-bar-track{height:9px;background:#f4f4f5;border-radius:999px;overflow:hidden}
.vreport-bar-fill{height:100%;border-radius:999px}
.vreport-bar-fill.good{background:#16a34a}
.vreport-bar-fill.fair{background:#d97706}
.vreport-bar-fill.low{background:#dc2626}
.vreport-bar-val{font-size:var(--fs-body);font-weight:800;color:var(--text);text-align:right}
.vreport-bar-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:var(--fs-caption);color:var(--text-faint);font-weight:700}
.vreport-bar-legend .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.vreport-meta-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--border-soft);margin-top:4px;font-size:var(--fs-body)}
.vreport-meta-row span:first-child{color:var(--text-muted);font-weight:700}
.vreport-meta-val{font-weight:800;color:var(--text)}
.vreport-range-result{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.vreport-range-result{grid-template-columns:1fr}}
.vreport-range-item{display:flex;justify-content:space-between;padding:9px 12px;background:#fafafa;border-radius:8px;font-size:var(--fs-body)}
.vreport-range-key{color:var(--text-muted);font-weight:700}
.vreport-range-value{font-weight:800;color:var(--text)}
.vreport-note{font-size:var(--fs-body);color:var(--text-muted);line-height:1.6;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-soft)}
.vreport-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.vreport-list li{font-size:var(--fs-body);font-weight:700;padding:8px 12px;border-radius:8px;position:relative;padding-left:30px}
.vreport-list.good li{background:#f0fdf4;color:#15803d}
.vreport-list.good li:before{content:'✓';position:absolute;left:12px;font-weight:800}
.vreport-list.warn li{background:#fffbeb;color:#b45309}
.vreport-list.warn li:before{content:'!';position:absolute;left:12px;font-weight:800}
.vreport-list.task li{background:#faf9ff;color:var(--highlight)}
.vreport-list.task li:before{content:'·';position:absolute;left:14px;font-weight:800}
.vreport-comment{font-size:var(--fs-body);line-height:1.75;color:var(--text);white-space:pre-line}
.vreport-table-wrap{overflow-x:auto;margin-top:12px}
.vreport-table{width:100%;border-collapse:collapse;font-size:var(--fs-body);min-width:380px}
.vreport-table th{text-align:center;padding:7px 8px;font-size:var(--fs-caption);font-weight:700;color:var(--text-faint);border-bottom:1px solid var(--border-soft)}
.vreport-table td{text-align:center;padding:7px 8px;border-bottom:1px solid var(--border-soft);font-weight:700}
.vreport-table td:first-child{text-align:left;color:var(--text-muted);font-weight:700}
.vreport-foot{font-size:var(--fs-caption);color:var(--text-faint);text-align:center;padding-top:8px}
.vreport-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.vreport-action-btn{font-size:var(--fs-caption);font-weight:700;padding:6px 11px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:border-color .12s,background .12s,color .12s;white-space:nowrap}
.vreport-action-btn:hover{border-color:rgba(0,0,0,.2);color:var(--text);background:#fafafa}
@media(max-width:600px){.vreport-action-btn{padding:6px 9px}}

/* 강사 — 수강생 상세 히스토리 레이어 */
.student-row-clickable{cursor:pointer;transition:background .12s}
.student-row-clickable:hover{background:#fafafa}
.history-layer{font-size:var(--fs-body)}
.history-summary{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.history-name{font-size:var(--fs-title);font-weight:800;color:var(--text)}
.history-sub{font-size:var(--fs-caption);color:var(--text-faint);margin-top:2px}
.history-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:600px){.history-stat-row{grid-template-columns:repeat(2,1fr)}}
.history-stat{background:#fafafa;border-radius:10px;padding:12px;text-align:center}
.history-stat-label{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;margin-bottom:4px}
.history-stat-val{font-size:var(--fs-title);font-weight:800;color:var(--text)}
.history-attend-row{display:flex;gap:5px;flex-wrap:wrap}
.history-attend-box{width:22px;height:22px;border-radius:5px;flex-shrink:0}
.history-attend-box.present{background:#16a34a}
.history-attend-box.absent{background:#e4e4e7}
.campus-card{background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.campus-icon{width:40px;height:40px;border-radius:var(--radius-sm);background:#f4f4f5;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.campus-info{flex:1;min-width:0}
.campus-name{font-weight:700;font-size:var(--fs-body);color:var(--text)}
.campus-meta{font-size:var(--fs-body);color:var(--text-muted);margin-top:2px}
.campus-stats{display:flex;gap:20px}
.campus-stat{text-align:center}
.campus-stat-val{font-size:var(--fs-title);font-weight:800;color:var(--text);letter-spacing:-.01em}
.campus-stat-label{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.mini-progress{display:flex;align-items:center;gap:10px}
.mp-label{font-size:var(--fs-body);color:var(--text-muted);width:60px;font-weight:400}
.mp-bar{flex:1;height:4px;background:#f4f4f5;border-radius:var(--radius-pill);overflow:hidden}
.mp-fill{height:100%;border-radius:var(--radius-pill)}
.mp-val{font-size:var(--fs-body);font-weight:700;color:var(--text);width:36px;text-align:right}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.page-title{line-height:1.2;letter-spacing:-.015em}

/* ── Master-detail layout (timeline list + detail panel, side by side) ── */
.md-layout{display:grid;grid-template-columns:340px 1fr;gap:0;background:#fff;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;align-items:stretch}
.md-master{border-right:1px solid var(--border-soft);max-height:calc(100vh - 220px);min-height:520px;overflow-y:auto;background:#fafafa}
.md-master-head{padding:14px 16px 10px;border-bottom:1px solid var(--border-soft);background:#fff;position:sticky;top:0;z-index:2}
.md-master-title{font-size:var(--fs-body);font-weight:800;color:var(--text)}
.md-master-sub{font-size:var(--fs-caption);color:var(--text-faint);margin-top:2px}
.md-master-filters{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.md-search-input{width:100%;margin-top:10px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:var(--fs-caption);font-family:inherit;background:#fafafa}
.md-search-input:focus{outline:none;border-color:var(--text);background:#fff}
.md-master-controls{display:flex;gap:6px;margin-top:8px}
.md-course-select,.md-sort-select{flex:1;min-width:0;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:var(--fs-caption);font-family:inherit;background:#fff;color:var(--text);cursor:pointer}
.md-filter-chip{font-size:var(--fs-caption);font-weight:700;padding:5px 11px;border-radius:var(--radius-pill);border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;transition:all .12s}
.md-filter-chip:hover{border-color:rgba(0,0,0,.2);color:var(--text)}
.md-filter-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.md-tl{position:relative;padding:6px 0}
.md-tl-row{position:relative;display:flex;align-items:stretch;border-bottom:1px solid var(--border-soft)}
.md-tl-row:last-child{border-bottom:none}
.md-tl-row.checked{background:#f0f7ff}
.md-tl-checkbox{position:relative;z-index:1;margin:14px 0 14px 12px;width:16px;height:16px;cursor:pointer;accent-color:var(--text);flex-shrink:0}
.md-tl-item{position:relative;display:block;flex:1;min-width:0;text-align:left;border:none;background:transparent;font:inherit;padding:12px 16px 12px 22px;cursor:pointer}
.md-tl-row:hover .md-tl-item{background:#f4f4f5}
.md-tl-item.active{background:#fff}
.md-tl-item.active:before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--text)}
.md-tl-dot{position:absolute;left:4px;top:18px;width:8px;height:8px;border-radius:50%;background:var(--text-faint);flex-shrink:0}
.md-tl-dot.good{background:#16a34a}
.md-tl-dot.warn{background:#d97706}
.md-tl-dot.alert{background:#dc2626}
.md-tl-line{position:absolute;left:7.5px;top:30px;bottom:-13px;width:1px;background:var(--border)}
.md-tl-row:last-child .md-tl-line{display:none}
.md-tl-date{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;margin-bottom:3px}
.md-tl-title{font-size:var(--fs-body);font-weight:700;color:var(--text);line-height:1.4}
.md-tl-meta{font-size:var(--fs-caption);color:var(--text-muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.md-tl-score{font-weight:800}
.md-tl-score.good{color:#16a34a}
.md-tl-score.fair{color:#d97706}
.md-tl-score.low{color:#dc2626}
.md-bulk-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#eef4ff;border-bottom:1px solid var(--border-soft);flex-wrap:wrap}
.md-bulk-count{font-size:var(--fs-caption);font-weight:800;color:var(--text)}
.md-detail{padding:22px 26px;overflow-y:auto;max-height:calc(100vh - 220px);min-height:520px}
.md-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:var(--fs-body);text-align:center;padding:40px 20px}
.md-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border-soft)}
.md-detail-title{font-size:var(--fs-title);font-weight:800;color:var(--text);letter-spacing:-.01em}
.md-detail-sub{font-size:var(--fs-caption);color:var(--text-faint);margin-top:4px}
.md-detail-contact-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:10px 14px;background:#fafafa;border:1px solid var(--border-soft);border-radius:var(--radius-sm);margin-bottom:16px}
.md-detail-contact-item{display:flex;flex-direction:column;gap:2px}
.md-detail-contact-label{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700}
.md-detail-contact-val{font-size:var(--fs-body);color:var(--text);font-weight:700}
.student-notes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.student-note-item{padding:10px 12px;background:#fafafa;border:1px solid var(--border-soft);border-radius:var(--radius-sm)}
.student-note-meta{display:flex;justify-content:space-between;margin-bottom:4px}
.student-note-author{font-size:var(--fs-caption);font-weight:800;color:var(--text)}
.student-note-time{font-size:var(--fs-caption);color:var(--text-faint)}
.student-note-text{font-size:var(--fs-body);color:var(--text);line-height:1.5;white-space:pre-wrap}
.student-note-input-row{display:flex;gap:8px;align-items:flex-end}
.student-note-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:var(--fs-body);font-family:inherit;resize:vertical}
.student-note-input:focus{outline:none;border-color:var(--text)}
@media(max-width:900px){.md-layout{grid-template-columns:1fr}.md-master{max-height:280px;border-right:none;border-bottom:1px solid var(--border-soft)}.md-detail{max-height:none}}
.data-trail-note{display:flex;align-items:center;gap:8px;font-size:var(--fs-caption);color:var(--text-faint);padding:9px 14px;background:#fafafa;border:1px solid var(--border-soft);border-radius:var(--radius-sm);margin-bottom:14px}
.data-trail-note .dot{width:5px;height:5px;border-radius:50%;background:#16a34a;flex-shrink:0}

.verify-radio-group{display:flex;flex-direction:column;gap:7px}
.verify-radio{display:flex;align-items:center;gap:9px;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:var(--fs-body);font-weight:700;color:var(--text-muted);transition:border-color .12s,background .12s;white-space:nowrap}
.verify-radio:hover{background:#fafafa}
.verify-radio.sel{border-color:var(--text);background:#fafafa;color:var(--text)}
.verify-radio input{accent-color:var(--text);flex-shrink:0;width:15px;height:15px;margin:0}
.verify-radio-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.verify-radio-dot.good{background:#16a34a}.verify-radio-dot.low{background:#dc2626}.verify-radio-dot.fair{background:#d97706}
.verify-history-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;padding:2px}
.verify-history-item{border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:10px 12px;background:#fafafa}
.verify-history-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.verify-history-who{font-size:var(--fs-caption);font-weight:800;color:var(--text)}
.verify-history-role{font-weight:400;color:var(--text-faint)}
.verify-history-date{font-size:var(--fs-caption);color:var(--text-faint)}
.verify-history-change{margin-bottom:5px}
.verify-history-note{font-size:var(--fs-caption);color:var(--text-muted);line-height:1.5}
.verify-history-score-adjust{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.verify-history-score-chip{font-size:10px;font-weight:700;color:#6d28d9;background:#f3f0ff;padding:3px 8px;border-radius:var(--radius-pill)}

/* ── 제출물 재생 플레이어 — 실제 음성/영상 파일 대신, 제출 시 기록된 길이(durationSec)를 기준으로
   재생 진행을 시뮬레이션한다. AI 하이라이트의 타임스탬프(sec)를 트랙 위 마커로 표시해 "그 지점으로
   이동해 들어본다"는 행동을 그대로 재현한다. */
.sub-player{background:#fafafa;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px}
.sub-player-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sub-player-title{font-size:var(--fs-caption);font-weight:800;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.sub-player-badge{font-size:10px;font-weight:700;color:#fff;background:var(--highlight);padding:2px 7px;border-radius:var(--radius-pill)}
.sub-player-controls{display:flex;align-items:center;gap:12px}
.sub-player-playbtn{width:38px;height:38px;border-radius:50%;background:var(--text);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px;transition:transform .1s}
.sub-player-playbtn:hover{transform:scale(1.06)}
.sub-player-track-wrap{flex:1;position:relative;padding-top:14px}
.sub-player-track{position:relative;height:6px;background:#e4e4e7;border-radius:99px;cursor:pointer}
.sub-player-progress{position:absolute;left:0;top:0;height:100%;background:var(--text);border-radius:99px;pointer-events:none}
.sub-player-handle{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:var(--text);border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.1);transform:translate(-50%,-50%);pointer-events:none}
.sub-player-marker{position:absolute;top:-14px;width:9px;height:9px;border-radius:50%;transform:translateX(-50%);cursor:pointer;border:2px solid #fafafa}
.sub-player-marker.good{background:#16a34a}.sub-player-marker.warn{background:#d97706}.sub-player-marker.alert{background:#dc2626}
.sub-player-time{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700;min-width:74px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.sub-player-current-note{margin-top:10px;font-size:var(--fs-caption);color:var(--text-muted);min-height:16px}
.sub-player-current-note b{color:var(--text)}
.sub-highlight-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.sub-highlight-chip{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 9px;border-radius:var(--radius-pill);background:#fff;border:1px solid var(--border);cursor:pointer;transition:border-color .12s}
.sub-highlight-chip:hover{border-color:var(--text)}
.sub-highlight-chip .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sub-highlight-chip .dot.good{background:#16a34a}.sub-highlight-chip .dot.warn{background:#d97706}.sub-highlight-chip .dot.alert{background:#dc2626}
.sub-highlight-chip.active{border-color:var(--text);background:#f4f4f5}
@media(max-width:600px){.sub-player-controls{flex-wrap:wrap}.sub-player-time{order:1;flex-basis:100%;text-align:left;margin-top:6px}}

/* ── AI 분석 진행중 상태 — 제출 직후 잠시 표시되는 "분석 중" 배지와 스피너.
   submissionLog의 aiStatus가 'analyzing'일 때만 보이고, 완료되면 일반 점수/배지로 자동 전환된다. */
.ai-analyzing-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:#6d28d9;background:#f3f0ff;padding:4px 10px;border-radius:var(--radius-pill)}
.ai-analyzing-spinner{width:10px;height:10px;border-radius:50%;border:2px solid #ddd6fe;border-top-color:#6d28d9;animation:aiSpin .7s linear infinite;flex-shrink:0}
@keyframes aiSpin{to{transform:rotate(360deg)}}
@keyframes aiDotPulse{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
.ai-attempt-stepper{display:inline-flex;align-items:center;gap:4px;margin-left:8px;vertical-align:middle}
.ai-attempt-dot{width:7px;height:7px;border-radius:50%;background:#e4e4e7;display:inline-block}
.ai-attempt-dot.done{background:#6d28d9}
.ai-attempt-dot.active{background:#6d28d9;animation:aiDotPulse .9s ease-in-out infinite}
.ai-attempt-label{font-size:10px;color:#6d28d9;font-weight:700;margin-left:4px}
.ai-analyzing-card{opacity:.88}
.ai-just-completed{animation:aiCompleteFlash 1.6s ease-out}
@keyframes aiCompleteFlash{0%{background:#f3f0ff}100%{background:transparent}}
.upload-drop{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:22px 16px;text-align:center;cursor:pointer;transition:border-color .12s,background .12s}
.upload-drop:hover{border-color:var(--text-faint);background:#fafafa}
.upload-drop.has-file{border-style:solid;border-color:var(--text);background:#fafafa}
.upload-drop-icon{font-size:26px;margin-bottom:6px}
.upload-drop-text{font-size:var(--fs-body);color:var(--text-muted);font-weight:700}
.upload-drop-sub{font-size:var(--fs-caption);color:var(--text-faint);margin-top:3px}
.upload-file-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:10px;font-size:var(--fs-body)}
.upload-file-chip .remove{margin-left:auto;color:var(--text-faint);cursor:pointer;font-weight:700}
.upload-preview-wrap{margin-top:10px}
.upload-preview-media{width:100%;max-height:220px;border-radius:var(--radius-sm);background:#0a0a0f;display:block}
.upload-progress-track{height:5px;background:#e4e4e7;border-radius:99px;margin-top:10px;overflow:hidden}
.upload-progress-fill{height:100%;background:var(--text);border-radius:99px;width:0%;transition:width .2s linear}
.sub-player-video{width:100%;max-height:260px;border-radius:var(--radius-sm);background:#0a0a0f;display:block;margin-bottom:10px}
.ic-student-pick-list{display:flex;flex-direction:column;gap:2px;max-height:220px;overflow-y:auto;border:1px solid var(--border-soft);border-radius:var(--radius-sm);padding:4px}
.ic-student-pick-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:var(--fs-body)}
.ic-student-pick-item:hover{background:#fafafa}
.ic-student-pick-item input[type="checkbox"]{width:15px;height:15px;cursor:pointer;accent-color:var(--text)}
