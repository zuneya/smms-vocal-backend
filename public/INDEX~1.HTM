    updateInstructorCaptureSubmitState(); return;
  }

  // 이 수업에 속한 강의(차시) 목록을 보여주고, 맨 끝에 "목록에 없음" 직접입력 옵션을 둔다.
  const lectures = vodLectures.filter(l=>l.courseId===course.id);
  lecWrap.style.display = '';
  lecSelect.innerHTML = `
    <option value="">— 강의를 선택하세요 —</option>
    ${lectures.map(l=>`<option value="${l.id}">${l.unit} · ${l.title}</option>`).join('')}
    <option value="${IC_CUSTOM_LEC_VALUE}">목록에 없음 — 직접 입력</option>`;
  document.getElementById('ic-lec-custom-wrap').style.display = 'none';
  document.getElementById('ic-lec-custom-input').value = '';

  // 수강생 명단은 수업 선택과 동시에 채워둔다(강의 선택을 기다리지 않아도 됨)
  const roster = (attendanceLog[course.name]?.students)||[];
  studentWrap.style.display = '';
  studentList.innerHTML = roster.map(name=>`
    <label class="ic-student-pick-item">
      <input type="checkbox" value="${name}" onchange="toggleInstructorCaptureStudent('${name.replace(/'/g,"\\'")}',this.checked)">
      <span class="avatar av-blue" style="width:24px;height:24px;font-size:11px">${name[0]}</span>
      <span>${name}</span>
    </label>`).join('');
  updateInstructorCaptureSubmitState();
}

function onInstructorCaptureLecChange(value){
  if(!instructorCaptureDraft) return;
  const customWrap = document.getElementById('ic-lec-custom-wrap');
  if(value===IC_CUSTOM_LEC_VALUE){
    instructorCaptureDraft.lecId = null;
    instructorCaptureDraft.lecTitle = '';
    customWrap.style.display = '';
    document.getElementById('ic-lec-custom-input').focus();
  } else if(value){
    const lecId = parseInt(value);
    const l = vodLectures.find(x=>x.id===lecId);
    instructorCaptureDraft.lecId = lecId;
    instructorCaptureDraft.lecTitle = l ? l.title : '';
    customWrap.style.display = 'none';
  } else {
    instructorCaptureDraft.lecId = null;
    instructorCaptureDraft.lecTitle = '';
    customWrap.style.display = 'none';
  }
  updateInstructorCaptureSubmitState();
}

function onInstructorCaptureLecCustomInput(value){
  if(!instructorCaptureDraft) return;
  instructorCaptureDraft.lecTitle = value.trim();
  instructorCaptureDraft.lecId = null; // 직접 입력은 vodLectures 참조가 없다 — 텍스트만 저장
  updateInstructorCaptureSubmitState();
}

function toggleInstructorCaptureStudent(name, checked){
  if(!instructorCaptureDraft) return;
  if(checked) instructorCaptureDraft.selectedStudents.add(name);
  else instructorCaptureDraft.selectedStudents.delete(name);
  updateInstructorCaptureSubmitState();
}

function onInstructorCaptureFileSelected(input){
  const file = input.files && input.files[0];
  if(!file || !instructorCaptureDraft) return;
  if(instructorCaptureDraft.mediaUrl) URL.revokeObjectURL(instructorCaptureDraft.mediaUrl);

  const sizeLabel = file.size > 1024*1024 ? `${(file.size/1024/1024).toFixed(1)}MB` : `${Math.max(1,Math.round(file.size/1024))}KB`;
  const mediaType = file.type.startsWith('video/') ? 'video' : (file.type.startsWith('audio/') ? 'audio' : (file.name.match(/\.(mp4|mov|webm|m4v)$/i) ? 'video' : 'audio'));
  const mediaUrl = URL.createObjectURL(file);
  instructorCaptureDraft.fileName = file.name;
  instructorCaptureDraft.fileSize = sizeLabel;
  instructorCaptureDraft.mediaUrl = mediaUrl;
  instructorCaptureDraft.mediaType = mediaType;

  document.getElementById('ic-upload-drop').classList.add('has-file');
  document.getElementById('ic-upload-file-chip').innerHTML = `
    <div class="upload-file-chip">${mediaType==='video'?'🎥':'🎵'} <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</span><span style="color:var(--text-faint);font-size:var(--fs-caption)">${sizeLabel}</span><span class="remove" onclick="event.stopPropagation();clearInstructorCaptureFile()">제거</span></div>
    <div class="upload-preview-wrap">${mediaType==='video'
      ? `<video src="${mediaUrl}" controls preload="metadata" class="upload-preview-media"></video>`
      : `<audio src="${mediaUrl}" controls preload="metadata" class="upload-preview-media"></audio>`}</div>`;
  updateInstructorCaptureSubmitState();
}

function clearInstructorCaptureFile(){
  if(!instructorCaptureDraft) return;
  if(instructorCaptureDraft.mediaUrl) URL.revokeObjectURL(instructorCaptureDraft.mediaUrl);
  instructorCaptureDraft.fileName = null;
  instructorCaptureDraft.fileSize = null;
  instructorCaptureDraft.mediaUrl = null;
  instructorCaptureDraft.mediaType = null;
  const input = document.getElementById('ic-upload-input');
  if(input) input.value = '';
  document.getElementById('ic-upload-drop').classList.remove('has-file');
  document.getElementById('ic-upload-file-chip').innerHTML = '';
  updateInstructorCaptureSubmitState();
}

/* 제출 버튼 활성화 조건: 수업 선택 + 강의(차시) 지정(목록선택 또는 직접입력 텍스트) + 대상 수강생
   1명 이상 + 파일 선택 완료. 하나라도 빠지면 "어떤 강의인지 알 수 없는" 항목이 등록되는 일을 막는다. */
function updateInstructorCaptureSubmitState(){
  const btn = document.getElementById('ic-upload-submit-btn');
  if(!btn) return;
  const d = instructorCaptureDraft;
  const lecReady = !!(d && (d.lecId!=null || (d.lecTitle && d.lecTitle.trim())));
  const ready = !!(d && d.courseId!=null && lecReady && d.selectedStudents.size>0 && d.mediaUrl);
  btn.disabled = !ready;
}

let instructorCaptureTimer = null;

function submitInstructorCapture(){
  const d = instructorCaptureDraft;
  if(!d || d.courseId==null || d.selectedStudents.size===0 || !d.mediaUrl) return;
  if(d.lecId==null && !(d.lecTitle && d.lecTitle.trim())) return;
  const progressWrap = document.getElementById('ic-upload-progress-wrap');
  const progressFill = document.getElementById('ic-upload-progress-fill');
  const progressLabel = document.getElementById('ic-upload-progress-label');
  const submitBtn = document.getElementById('ic-upload-submit-btn');
  if(progressWrap) progressWrap.style.display = '';
  if(submitBtn) submitBtn.disabled = true;
  let pct = 0;
  let stopped = false;
  const tick = ()=>{
    if(stopped) return;
    pct = Math.min(100, pct + 18 + Math.random()*12);
    if(progressFill) progressFill.style.width = pct+'%';
    if(progressLabel) progressLabel.textContent = pct>=100 ? '업로드 완료' : `업로드 중... ${Math.round(pct)}%`;
    if(pct>=100){
      stopped = true;
      clearInterval(instructorCaptureTimer);
      instructorCaptureTimer = null;
      setTimeout(finalizeInstructorCapture, 280);
    }
  };
  instructorCaptureTimer = setInterval(tick, 160);
}

function cancelInstructorCapture(){
  if(instructorCaptureTimer){ clearInterval(instructorCaptureTimer); instructorCaptureTimer = null; }
  if(instructorCaptureDraft?.mediaUrl) URL.revokeObjectURL(instructorCaptureDraft.mediaUrl);
  instructorCaptureDraft = null;
  closeModal();
}

/* 선택된 수강생 수만큼 같은 파일을 복제해 각각 submissionLog 항목으로 등록한다. 같은 영상이라도
   completeAiAnalysis가 학생별로 다른 jitter를 적용하므로 점수는 자연스럽게 갈린다.
   lec/lecId는 강의 선택 단계에서 지정한 값을 그대로 넣어, "어떤 강의차시"였는지가 모든 생성 항목에
   동일하게 귀속된다. 등록 후에는 "현장 촬영 평가" 탭으로 돌아가 방금 만든 항목들을 바로 확인할 수 있게 한다. */
function finalizeInstructorCapture(){
  const d = instructorCaptureDraft;
  if(!d) return;
  const course = courseList.find(c=>c.id===d.courseId);
  const lecTitle = d.lecId!=null ? (vodLectures.find(l=>l.id===d.lecId)?.title || d.lecTitle) : d.lecTitle;
  const note = (document.getElementById('ic-upload-note')?.value || '').trim();
  const instructorName = roles.instructor.name;
  const students = Array.from(d.selectedStudents);

  students.forEach(studentName=>{
    createSubmissionFromMedia({
      course: course?.name || '',
      lec: lecTitle, lecId: d.lecId,
      mediaUrl: d.mediaUrl, mediaType: d.mediaType, note,
      studentName, sourceType:'instructor_capture', submittedBy:instructorName,
      submissionKind:'instructor_capture',
    });
  });

  // 방금 등록한 강의의 섹션은 자동으로 펼쳐서 바로 확인할 수 있게 하고, 수업 필터와 출처 필터도
  // 그에 맞춰 둔다 — 다른 필터가 걸려 있던 채로 등록하면 방금 만든 항목이 안 보이는 혼란을 막는다.
  const newGroupKey = d.lecId!=null ? `lec:${d.lecId}` : `txt:${course?.name || ''}|${lecTitle}`;
  srExpandedKeys.add(newGroupKey);
  srCourseFilter = d.courseId;
  srKindFilter = 'all';

  instructorCaptureDraft = null;
  closeModal();
  navReturnTo = 'online_lecture_mgmt';
  navigate('online_lecture_mgmt');
  setTimeout(()=>{
    const submissionsTab = document.querySelector('#om-tabs .tab:nth-child(2)');
    if(submissionsTab) omTab(submissionsTab,'submissions');
  }, 0);
}

    return;
  }

  const sameLec = submissionLog.filter(x=>x.lec===s.lec && x.id!==s.id && x.aiStatus!=='analyzing');
  const baseline = sameLec.length
    ? Math.round(sameLec.reduce((sum,x)=>sum+(x.aiScores.pitch+x.aiScores.rhythm+x.aiScores.breath+x.aiScores.resonance)/4,0)/sameLec.length)
    : 70;
  const jitter = ()=>Math.max(35, Math.min(97, baseline + Math.round((Math.random()-0.5)*24)));
  const scores = {pitch:jitter(),rhythm:jitter(),breath:jitter(),resonance:jitter()};
  const avg = Math.round((scores.pitch+scores.rhythm+scores.breath+scores.resonance)/4);

  s.aiScores = {...scores};
  s.adjustedScores = {...scores};
  s.aiScore = avg;
  s.confidence = Math.max(55, Math.min(95, avg-3+Math.round(Math.random()*10)));
  s.aiStatus = 'done';
  s._playbackReady = false; // highlights를 새 점수 기준으로 다시 합성하도록 리셋
  delete s.highlights;
  ensureSubmissionPlaybackMeta(s);

  // 타임라인 요약문도 분석 완료 내용으로 갱신
  const tlItem = studentTimelineLog.find(x=>x.submissionRef===submissionId);
  if(tlItem) tlItem.summary = `AI 1차 분석이 완료되었습니다. 종합 ${avg}점 — 강사 확인 후 정식 피드백이 도착합니다.`;

  refreshAfterAiAnalysisComplete(submissionId);
}

  // 0) 지금 바로 이 제출물의 "업로드 완료" 페이지를 보고 있는 경우 — 페이지 전체를 다시 그려

  if(activeUploadResultSubmissionId===submissionId && currentNav==='upload_result_'+submissionId){
    const main = document.getElementById('main-content');
    if(main){
      main.innerHTML = renderHomeworkUploadResultPage(submissionId);
      main.classList.add('ai-just-completed');

  }

  // 0-1) 지금 바로 이 제출물의 "검토" 페이지를 보고 있는 경우(강사/매니저가 분석중 항목을 열어두고 대기 중) —
  //      analyzing 안내만 보이던 화면이 점수보정/피드백 입력 폼으로 바뀌어야 하므로 페이지를 통째로 다시 그린다.
  if(currentNav==='submission_review_'+submissionId){
    const main = document.getElementById('main-content');
    if(main){
      main.innerHTML = renderSubmissionReviewPage(submissionId);
      bindSubmissionReviewPageEvents();
      main.classList.add('ai-just-completed');
    }

  // 1) 학생이 지금 정확히 "이 제출물"의 타임라인 상세를 보고 있는 경우에만 그 패널을 다시 그린다.
  //    studentActiveTimelineId로 식별 — DOM 내용 패턴 매칭은 다른 제출물을 보고 있을 때 오갱신될 수 있어 사용하지 않는다.

  // 2) 강사 "제출물 검토" 탭이 열려 있는 경우 — 출처 무관 통합 탭이므로 분기 없이 다시 그린다.
  const omPane = document.getElementById('om-content');
  if(omPane && omPane.querySelector('.lecture-submission-card, .ic-capture-section, .md-detail-empty')){

function svgLineChart(series,opts){
  opts=opts||{};
  const w=opts.w||560, h=opts.h||200, pad={t:16,r:16,b:26,l:opts.lPad||34};
  const innerW=w-pad.l-pad.r, innerH=h-pad.t-pad.b;
  const n=series[0].data.length;
  const xStep=n>1?innerW/(n-1):0;
  const yMax=opts.yMax!=null?opts.yMax:100, yMin=opts.yMin!=null?opts.yMin:0;
  const yToPx=v=>pad.t+innerH-((v-yMin)/(yMax-yMin))*innerH;
  const xToPx=i=>pad.l+xStep*i;
  const steps=opts.ySteps||[0,25,50,75,100].map(p=>yMin+(yMax-yMin)*p/100);
  const fontStack="'NanumSquareNeo','Noto Sans KR',sans-serif";
  const gridLines=steps.map(v=>`<line x1="${pad.l}" y1="${yToPx(v)}" x2="${w-pad.r}" y2="${yToPx(v)}" stroke="#ececef" stroke-width="1"/><text x="${pad.l-8}" y="${yToPx(v)+3}" font-size="11" font-family="${fontStack}" fill="#a1a1aa" text-anchor="end">${Math.round(v)}</text>`).join('');
  const labels=opts.labels||series[0].data.map((_,i)=>i+1);
  const xLabels=labels.map((l,i)=>`<text x="${xToPx(i)}" y="${h-6}" font-size="11" font-family="${fontStack}" fill="#a1a1aa" text-anchor="middle">${l}</text>`).join('');
  const lines=series.map(s=>{
    const pts=s.data.map((v,i)=>`${xToPx(i)},${yToPx(v)}`).join(' ');
    const dots=s.data.map((v,i)=>`<circle cx="${xToPx(i)}" cy="${yToPx(v)}" r="3" fill="${s.color}"/>`).join('');
    return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block;font-family:${fontStack}">${gridLines}${lines}${xLabels}</svg>`;
}

/* svgRadarChart — 항목별 점수를 오각형(레이더) 차트로 그린다. svgLineChart와 마찬가지로
   외부 라이브러리 없이 순수 SVG 문자열을 생성한다. values는 labels와 같은 순서, 0~max 범위. */
function svgRadarChart(labels, values, opts){
  opts = opts || {};
  const w = opts.w || 300, h = opts.h || 300, max = opts.max || 100;
  const cx = w/2, cy = h/2;
  const r = Math.min(w,h)/2 - (opts.pad || 46);
  const n = labels.length;
  const angleFor = i => (Math.PI*2*i/n) - Math.PI/2;
  const pointFor = (i,val) => {
    const a = angleFor(i);
    const rr = r * Math.max(0, Math.min(1, val/max));
    return [cx + rr*Math.cos(a), cy + rr*Math.sin(a)];
  };
  const rings = [0.33,0.66,1].map(f=>{
    const pts = labels.map((_,i)=>{
      const a = angleFor(i);
      return `${cx + r*f*Math.cos(a)},${cy + r*f*Math.sin(a)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="var(--border-soft)" stroke-width="1"/>`;
  }).join('');
  const axes = labels.map((_,i)=>{
    const a = angleFor(i);
    const x2 = cx + r*Math.cos(a), y2 = cy + r*Math.sin(a);
    return `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="var(--border-soft)" stroke-width="1"/>`;
  }).join('');
  const dataPts = values.map((v,i)=>pointFor(i,v).join(',')).join(' ');
  const dots = values.map((v,i)=>{
    const [x,y] = pointFor(i,v);
    return `<circle cx="${x}" cy="${y}" r="3.5" fill="var(--highlight)"/>`;
  }).join('');
  const labelEls = labels.map((lab,i)=>{
    const a = angleFor(i);
    const lx = cx + (r+26)*Math.cos(a), ly = cy + (r+26)*Math.sin(a);
    const cosv = Math.cos(a);
    const anchor = cosv>0.3 ? 'start' : cosv<-0.3 ? 'end' : 'middle';
    return `<text x="${lx}" y="${ly}" font-size="12" font-weight="700" fill="var(--text-muted)" text-anchor="${anchor}" dominant-baseline="middle">${lab} <tspan fill="var(--highlight)" font-weight="800">${values[i]}</tspan></text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" style="max-width:${w}px;display:block;margin:0 auto">
    ${rings}${axes}
    <polygon points="${dataPts}" fill="var(--highlight-soft)" stroke="var(--highlight)" stroke-width="2"/>
    ${dots}
    ${labelEls}
  </svg>`;
}

/* submission 타입 항목은 score를 직접 갖지 않고 submissionRef로 연결된 제출물의 adjustedScores 평균을 그때그때 계산해 쓴다.
   AI가 아직 분석 중인 제출물은 점수가 없으므로 null을 반환 — 호출부에서 "분석 중" 표시로 처리한다. */
function timelineItemScore(item){
  if(item.type!=='submission') return item.score;
  const s = submissionLog.find(x=>x.id===item.submissionRef);
  if(!s || s.aiStatus==='analyzing') return null;
  return Math.round((s.adjustedScores.pitch+s.adjustedScores.rhythm+s.adjustedScores.breath+s.adjustedScores.resonance)/4);
}
const timelineTypeMeta = {
  submission:{icon:'🎙️',label:'녹음 제출 · AI 분석',dotClass:s=>{const v=timelineItemScore(s);return v==null?'fair':(v>=80?'good':v>=60?'warn':'alert');}},
  practice:{icon:'✏️',label:'연습 일지',dotClass:s=>s.score>=4?'good':s.score>=3?'warn':'alert'},
  attendance:{icon:'✅',label:'수업 출석',dotClass:()=>'good'},
};

function studentTimelineMaster(activeId){
  const items = studentTimelineLog.map(item=>{
    const meta = timelineTypeMeta[item.type];
    const dot = meta.dotClass(item);
    const score = timelineItemScore(item);
    const isAnalyzing = item.type==='submission' && score==null;
    const scoreClass = item.type==='submission'?(score>=80?'good':score>=60?'fair':'low'):item.scoreClass;
    return `<button class="md-tl-item${item.id===activeId?' active':''}" onclick="selectTimelineItem('${item.id}')">
      <span class="md-tl-dot ${dot}"></span><span class="md-tl-line"></span>
      <div class="md-tl-date">${item.date} · ${meta.icon} ${meta.label}</div>
      <div class="md-tl-title">${item.title}</div>
      <div class="md-tl-meta">${item.course}${isAnalyzing?` · <span class="ai-analyzing-badge" style="padding:2px 7px"><span class="ai-analyzing-spinner"></span>분석 중</span>`:(score!=null?` · <span class="md-tl-score ${scoreClass}">${item.scoreLabel} ${score}${item.type==='practice'?'/5':'점'}</span>`:'')}</div>
    </button>`;
  }).join('');
  return `<div class="md-master-head">
    <div class="md-master-title">내 활동 타임라인</div>
    <div class="md-master-sub">연습 · 제출 · 출석이 시간순으로 쌓입니다</div>
  </div>
  <div class="md-tl">${items}</div>`;
}

function studentTimelineDetail(id){
  const item = studentTimelineLog.find(x=>x.id===id);
  if(!item) return `<div class="md-detail-empty">왼쪽 타임라인에서 항목을 선택하면<br>상세 내용이 여기에 표시됩니다.</div>`;
  const meta = timelineTypeMeta[item.type];
  let body = '';
  if(item.type==='submission' && item.submissionRef){

      <td>${g.rhythm}</td>
      <td>${g.breath}</td>

}

/* 'YYYY.MM.DD' 문자열 파서 — attendanceLog의 날짜 표기를 달력 계산에 쓰기 위함 */
function parseAttDate(str){
  const [y,m,d] = str.split('.').map(Number);
  return {y,m,d};
}
let attCalYear = 2026, attCalMonth = 5; // 1-indexed month

function attCourseDetailScreen(){
  const c = attendanceLog[attActiveCourse];
  // 현재 활성 날짜가 속한 달로 캘린더 초기 위치를 맞춘다
  const active = parseAttDate(attActiveDate);
  attCalYear = active.y; attCalMonth = active.m;
  return `<button class="btn btn-secondary btn-sm" style="margin-bottom:12px" onclick="backToAttCourseList()">← 수업 목록으로</button>
  <div class="md-layout">
    <div class="md-master" id="att-cal-pane" style="padding:16px">${attCalendarView()}</div>
    <div class="md-detail" id="att-detail-pane">${attDateDetail()}</div>
  </div>`;
}

function attCalendarView(){
  const c = attendanceLog[attActiveCourse];
  const sessionsByDay = {};
  c.sessions.forEach(s=>{
    const d = parseAttDate(s.date);
    if(d.y===attCalYear && d.m===attCalMonth) sessionsByDay[d.d] = s;
  });
  const firstDow = new Date(attCalYear, attCalMonth-1, 1).getDay();
  const daysInMonth = new Date(attCalYear, attCalMonth, 0).getDate();
  const dows = ['일','월','화','수','목','금','토'];

  let cells = '';
  for(let i=0;i<firstDow;i++) cells += `<div class="att-cal-cell empty"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const session = sessionsByDay[day];
    if(!session){
      cells += `<div class="att-cal-cell"><span class="att-cal-daynum">${day}</span></div>`;
      continue;
    }
    const dateStr = `${attCalYear}.${String(attCalMonth).padStart(2,'0')}.${String(day).padStart(2,'0')}`;
    const total = c.students.length;
    const present = c.students.filter(st=>session.records[st]==='O').length;
    const absent = c.students.filter(st=>session.records[st]==='X').length;
    const rate = Math.round(present/total*100);
    const rateClass = rate>=85?'good':rate>=60?'fair':'low';
    cells += `<div class="att-cal-cell has-session${dateStr===attActiveDate?' active':''}" onclick="selectAttDate('${dateStr}')">
      ${absent>0?`<span class="att-cal-warn-badge">${absent}</span>`:''}
      <span class="att-cal-daynum">${day}</span>
      <span class="att-cal-rate ${rateClass}">${rate}%</span>
    </div>`;
  }

  return `<div class="att-cal-head">
    <span class="att-cal-title">${attActiveCourse} · ${attCalYear}년 ${attCalMonth}월</span>
    <div class="att-cal-nav">
      <button onclick="shiftAttCalMonth(-1)">‹</button>
      <button onclick="shiftAttCalMonth(1)">›</button>
    </div>
  </div>
  <div class="att-cal-grid">
    ${dows.map(d=>`<div class="att-cal-dow">${d}</div>`).join('')}
    ${cells}
  </div>
  <div class="vreport-bar-legend" style="margin-top:14px">
    <span><span class="dot" style="background:#16a34a"></span>출석률 85% 이상</span>
    <span><span class="dot" style="background:#d97706"></span>60~84%</span>
    <span><span class="dot" style="background:#dc2626"></span>60% 미만</span>
    <span><span class="att-cal-warn-badge" style="position:static;display:inline-flex;width:14px;height:14px">3</span>결석 인원</span>
  </div>`;
}

function shiftAttCalMonth(diff){
  attCalMonth += diff;
  if(attCalMonth>12){ attCalMonth=1; attCalYear++; }
  if(attCalMonth<1){ attCalMonth=12; attCalYear--; }
  document.getElementById('att-cal-pane').innerHTML = attCalendarView();
}

function attDateDetail(){
  const c = attendanceLog[attActiveCourse];
  const session = c.sessions.find(s=>s.date===attActiveDate);
  if(!session) return `<div class="md-detail-empty">달력에서 회차가 있는 날짜를 선택하세요.</div>`;
  const presentCount = c.students.filter(st=>session.records[st]==='O').length;
  return `<div class="md-detail-head">
    <div><div class="md-detail-title">${attActiveDate}</div><div class="md-detail-sub">${attActiveCourse} · 출석 ${presentCount}/${c.students.length}명</div></div>

  ${c.students.map(st=>{
    const cur = session.records[st]||'O';
    if(attCanEdit){
      return `<div class="attendance-row">
        <span class="avatar av-blue">${st[0]}</span>
        <span class="att-name">${st}</span>
        <div class="att-btns">
          <button class="att-btn att-O${cur==='O'?' sel':''}" onclick="setAttRecord('${st}','O',this)">출석</button>
          <button class="att-btn att-L${cur==='L'?' sel':''}" onclick="setAttRecord('${st}','L',this)">지각</button>
          <button class="att-btn att-X${cur==='X'?' sel':''}" onclick="setAttRecord('${st}','X',this)">결석</button>

}

/* 새로 추가된 수강생들은 각 수업의 기존 세션에 출결 기록이 비어있다.
   instrStudentRows의 attendRate(출석률)를 시드로 삼아, 학생별로 일관되고 결정론적인 O/L/X 패턴을 채워 넣는다.
   (매번 다른 무작위값이 아니라 같은 입력엔 항상 같은 결과가 나오도록 — 이름 문자코드 합을 시드로 사용) */
function seededPattern(name, rate, count){
  let seed = 0;
  for(let i=0;i<name.length;i++) seed += name.charCodeAt(i);
  const pattern = [];
  for(let i=0;i<count;i++){
    const v = (seed * (i+7)) % 100;
    if(v < rate*0.7) pattern.push('O');
    else if(v < rate*0.7 + 12) pattern.push('L');
    else pattern.push(v < rate ? 'O' : 'X');
  }
  return pattern;
}

/* "거의 매일 수업"이라는 실제 운영 느낌을 주기 위해, 각 수업을 한 달치(약 4주) 분량으로 확장한다.
   손으로 적어둔 최신 세션들은 그대로 두고, 그보다 이전 날짜를 courseDows에 정의된 요일에 맞춰 역순으로 채운다.
   레코드(출결)는 비워둔 채 추가하고, 바로 아래의 fillMissingAttendance가 attendRate 기반으로 일괄 채운다. */
(function expandToMonth(){
  const WEEKS = 4;
  Object.keys(attendanceLog).forEach(courseName=>{
    const c = attendanceLog[courseName];
    const dows = courseDows[courseName];
    if(!dows || !c.sessions.length) return;
    const earliest = c.sessions.reduce((min,s)=>{
      const d = parseAttDate(s.date);
      const t = new Date(d.y, d.m-1, d.d).getTime();
      return t<min ? t : min;
    }, Infinity);
    const existingDates = new Set(c.sessions.map(s=>s.date));
    let cursor = new Date(earliest);
    cursor.setDate(cursor.getDate()-1);
    let added = 0;
    const maxAdd = dows.length * WEEKS;
    while(added < maxAdd){
      if(dows.includes(cursor.getDay())){
        const y=cursor.getFullYear(), m=String(cursor.getMonth()+1).padStart(2,'0'), d=String(cursor.getDate()).padStart(2,'0');
        const dateStr = `${y}.${m}.${d}`;
        if(!existingDates.has(dateStr)){
          c.sessions.push({date:dateStr, records:{}});
          existingDates.add(dateStr);
          added++;
        }
      }
      cursor.setDate(cursor.getDate()-1);
    }
    c.sessions.sort((a,b)=>b.date.localeCompare(a.date));
  });
})();
(function fillMissingAttendance(){
  const rateByName = {};
  instrStudentRows.forEach(r=>{ rateByName[r.name] = r.attendRate; });
  Object.keys(attendanceLog).forEach(courseName=>{
    const c = attendanceLog[courseName];
    c.students.forEach(student=>{
      const rate = rateByName[student] || 75;
      const pattern = seededPattern(student, rate, c.sessions.length);
      c.sessions.forEach((s,i)=>{
        if(!s.records[student]) s.records[student] = pattern[i];
      });
    });
  });
})();

/* submissionLog에 아직 제출물이 없는 학생들(신규 확충 인원)에게 1건씩 자동 생성한다.
   attendRate(출석률)를 시드로 삼아 4항목(음정/박자/호흡/공명) 점수를 결정론적으로 만들고,
   id는 기존 최댓값 다음부터 이어서 부여한다. 검증 이력은 비워둔 채(pending) 시작 — 실제로 강사가 아직 안 본 상태를 재현한다.
   courseLecMap의 텍스트가 vodLectures의 실제 강의 제목과 일치하는 경우 lecId를 함께 채워 강의별
   정리(제출물 검토 탭)에서 올바르게 묶이게 한다. 또한 시드값으로 출처(submissionKind)를 결정론적으로
   분배해, 데모 데이터에도 과제 제출/온라인 강의 연습/강사 촬영 세 종류가 고르게 섞이도록 한다. */
const courseLecMap = {
  '보컬 기초 A반':'복식호흡의 원리와 실습', '보컬 심화 B반':'고음 발성 입문',
  'K-POP 퍼포먼스':'호흡과 발성의 연결', '작곡 기초':'멜로디 라인 구성',
  '댄스 기초':'기본 스텝과 그루브',
};
(function fillMissingSubmissions(){
  const existing = new Set(submissionLog.map(s=>s.student));
  let nextId = Math.max(...submissionLog.map(s=>s.id)) + 1;
  instrStudentRows.forEach(r=>{
    if(existing.has(r.name)) return;
    let seed = 0;
    for(let i=0;i<r.name.length;i++) seed += r.name.charCodeAt(i);
    const base = Math.max(35, Math.min(95, r.attendRate + (seed%21-10)));
    const scores = {
      pitch: Math.max(20, Math.min(98, base + (seed%9-4))),
      rhythm: Math.max(20, Math.min(98, base + (seed%7-3))),
      breath: Math.max(20, Math.min(98, base + (seed%11-5))),
      resonance: Math.max(20, Math.min(98, base + (seed%5-2))),
    };
    const avg = Math.round((scores.pitch+scores.rhythm+scores.breath+scores.resonance)/4);
    const lecTitle = courseLecMap[r.course]||'기초 실습';
    const courseRow = courseList.find(c=>c.name===r.course);
    const matchedLec = courseRow ? vodLectures.find(l=>l.courseId===courseRow.id && l.title===lecTitle) : null;

    // 시드값 나머지로 출처를 결정론적 분배: 0~5 온라인강의연습 / 6~7 과제제출 / 8~9 강사촬영(10개 중 6:2:2 비율)
    const kindRoll = seed % 10;
    let submissionKind, sourceType, submittedBy;
    if(kindRoll>=8){
      submissionKind='instructor_capture'; sourceType='instructor_capture'; submittedBy=courseRow?.instr || roles.instructor.name;
    } else if(kindRoll>=6){
      submissionKind='assignment'; sourceType='self'; submittedBy=r.name;
    } else {
      submissionKind='lecture_practice'; sourceType='self'; submittedBy=r.name;
    }

    submissionLog.push({
      id: nextId++, student: r.name, course: r.course, lec: lecTitle, lecId: matchedLec ? matchedLec.id : null,
      date: '05.0'+((seed%6)+1), submittedAt: '2026.05.0'+((seed%6)+1)+' '+String(9+(seed%8)).padStart(2,'0')+':00',
      aiScore: avg, confidence: Math.max(45, Math.min(95, base-5)), verifyStatus:'pending', hasDetail:false,
      aiScores: {...scores}, adjustedScores: {...scores},
      verifyHistory: [],
      sourceType, submissionKind, submittedBy,
    });
  });
})();

/* submissionKind/lecId 최종 역보강 — fillMissingSubmissions()까지 포함해 submissionLog가
   완전히 채워진 시점에 한 번 더 전체를 돌며 빠진 필드를 채운다. 이 시점 이후로는 새 제출물이
   createSubmissionFromMedia()를 통해서만 추가되므로(이미 모든 필드를 명시적으로 채움), 여기서
   다시 누락이 생길 일은 없다. 즉 이 블록은 "맨 처음 21개 + fillMissingSubmissions가 채운 나머지"
   까지를 포함한 초기 데모 데이터 전체에 대한 일회성 안전망이다. */
submissionLog.forEach(s=>{
  if(s.lecId==null){
    const course = courseList.find(c=>c.name===s.course);
    const matched = course ? vodLectures.find(l=>l.courseId===course.id && l.title===s.lec) : null;
    s.lecId = matched ? matched.id : null;
  }
  if(s.submissionKind==null){
    s.submissionKind = s.sourceType==='instructor_capture' ? 'instructor_capture' : 'lecture_practice';
  }
  if(s.sourceType==null) s.sourceType = s.submissionKind==='instructor_capture' ? 'instructor_capture' : 'self';
  if(s.submittedBy==null) s.submittedBy = s.student;
});

function attCourseRate(courseName){
  const c = attendanceLog[courseName];
  if(!c) return 0;
  let total=0, present=0;
  c.sessions.forEach(s=>c.students.forEach(st=>{ total++; if(s.records[st]==='O') present++; }));
  return total?Math.round(present/total*100):0;
}
function attStudentRate(courseName, student){
  const c = attendanceLog[courseName];
  if(!c) return null;
  const records = c.sessions.map(s=>s.records[student]).filter(Boolean);
  if(!records.length) return null;
  const present = records.filter(r=>r==='O').length;
  return Math.round(present/records.length*100);
}

/* 학생명으로 제출물 전체를 찾고(최신순), 종합 성장점수 = 각 제출물의 (보정된) 4항목 평균을 다시 전체 평균낸 값.
   제출물이 없으면 null — 화면에서 "데이터 없음"으로 표시한다. */
function getStudentSubmissions(name){
  return submissionLog.filter(s=>s.student===name).slice().sort((a,b)=>b.submittedAt.localeCompare(a.submittedAt));
}
function getStudentScore(name){
  const subs = getStudentSubmissions(name).filter(s=>s.aiStatus!=='analyzing');
  if(!subs.length) return null;
  const perSubAvg = subs.map(s=>(s.adjustedScores.pitch+s.adjustedScores.rhythm+s.adjustedScores.breath+s.adjustedScores.resonance)/4);
  return Math.round(perSubAvg.reduce((a,v)=>a+v,0)/perSubAvg.length);
}

/* 마스터 목록 상태 — 상태/피드백 칩 필터(filter)에 더해 반 필터(course), 검색어(search),
   정렬(sort)을 추가한다. instructor/manager 컨텍스트가 각각 독립된 상태를 가지므로
   객체로 묶어 관리하고, 컨텍스트에 따라 instrStudentRosterState 혹은 mgrStudentRosterState를 쓴다. */
function defaultRosterState(){ return { course:'all', search:'', sort:'name' }; }
let instrStudentRosterState = defaultRosterState();
let mgrStudentRosterState = defaultRosterState();
function rosterState(){
  return studentRosterContext==='manager' ? mgrStudentRosterState : instrStudentRosterState;
}
/* 로그인한 강사가 실제로 담당하는 반 이름 목록(courseList.instr 기준).
   매니저는 캠퍼스 전체를 보므로 이 제한을 적용하지 않는다. */
function myTaughtCourseNames(){
  return courseList.filter(c=>c.instr===roles.instructor.name).map(c=>c.name);
}
function instrStudentMaster(activeIdx,filter){
  filter = filter||'all';
  const st = rosterState();
  const selectFn = studentRosterContext==='manager' ? 'selectMgrStudent' : 'selectStudent';
  const isInstructorCtx = studentRosterContext!=='manager';
  const taught = isInstructorCtx ? myTaughtCourseNames() : [];
  // 반 드롭다운 옵션 — 강사는 본인이 담당하는 반만, 매니저는 캠퍼스 전체 반을 본다.
  const courseOptions = isInstructorCtx ? taught : courseList.map(c=>c.name);

  let rows = instrStudentRows.map((r,i)=>({r,i}));
  // 강사 컨텍스트에서는 기본적으로 "내가 담당하는 반"의 수강생만 보이도록 범위를 좁힌다.
  // (이전에는 캠퍼스 전체 수강생이 한 목록에 섞여 있어 담당 외 학생까지 노출되는 문제가 있었다.)
  if(isInstructorCtx){
    rows = rows.filter(({r})=>r.courses.some(c=>taught.includes(c)));
  }
  if(st.course!=='all'){
    rows = rows.filter(({r})=>r.courses.includes(st.course));
  }
  if(filter==='alert') rows = rows.filter(({r})=>r.statusClass==='badge-red');
  else if(filter==='pending') rows = rows.filter(({r})=>!r.fbDone);
  if(st.search.trim()){
    const q = st.search.trim().toLowerCase();
    rows = rows.filter(({r})=>r.name.toLowerCase().includes(q));
  }
  const sortGetters = {
    name:({r})=>r.name,
    attendAsc:({r})=>r.attendRate,
    attendDesc:({r})=>-r.attendRate,
    recent:({r})=>['오늘','어제'].includes(r.last)?0:1, // 오늘/어제를 우선 표시, 나머지는 동순위
  };
  const getter = sortGetters[st.sort]||sortGetters.name;
  rows = rows.slice().sort((a,b)=>{
    const va=getter(a), vb=getter(b);
    if(typeof va==='string') return va.localeCompare(vb,'ko');
    return va-vb;
  });

  const items = rows.map(({r,i})=>{
    const score = getStudentScore(r.name);
    const scoreClass = score===null?'':score>=80?'good':score>=60?'fair':'low';
    const dot = r.statusClass==='badge-red'?'alert':(r.fbDone?'good':'warn');
    const checked = rosterSelection().has(r.name);
    return `<div class="md-tl-row${checked?' checked':''}">
      <input type="checkbox" class="md-tl-checkbox" ${checked?'checked':''} onclick="event.stopPropagation();toggleStudentSelection('${r.name}')" aria-label="${r.name} 선택">
      <button class="md-tl-item${i===activeIdx?' active':''}" onclick="${selectFn}(${i})">
        <span class="md-tl-dot ${dot}"></span><span class="md-tl-line"></span>
        <div class="md-tl-date">${r.course}${r.courses.length>1?` <span style="color:var(--text-faint)">+${r.courses.length-1}</span>`:''}</div>
        <div class="md-tl-title">${r.name}</div>
        <div class="md-tl-meta">성장 <span class="md-tl-score ${scoreClass}">${score===null?'데이터 없음':score+'점'}</span> · 최근 연습 ${r.last}${r.fbDone?'':' · 피드백 대기'}</div>
      </button>
    </div>`;
  }).join('') || `<div class="md-detail-empty">조건에 맞는 수강생이 없습니다.</div>`;

  const selCount = rosterSelection().size;
  return `<div class="md-master-head">
    <div class="md-master-title">수강생 (${rows.length}${rows.length!==instrStudentRows.length?`/${isInstructorCtx?instrStudentRows.filter(r=>r.courses.some(c=>taught.includes(c))).length:instrStudentRows.length}`:''}명)</div>
    <div class="md-master-sub">선택하면 누적 데이터가 오른쪽에 표시됩니다</div>
    <input class="md-search-input" placeholder="🔍 이름으로 검색" value="${st.search}" oninput="searchStudentMaster(this.value)">
    <div class="md-master-controls">
      <select class="md-course-select" onchange="filterStudentByCourse(this.value)">
        <option value="all"${st.course==='all'?' selected':''}>${isInstructorCtx?'담당 반 전체':'전체 반'}</option>
        ${courseOptions.map(c=>`<option value="${c}"${st.course===c?' selected':''}>${c}</option>`).join('')}
      </select>
      <select class="md-sort-select" onchange="sortStudentMaster(this.value)">
        <option value="name"${st.sort==='name'?' selected':''}>이름순</option>
        <option value="attendAsc"${st.sort==='attendAsc'?' selected':''}>출석률 낮은순</option>
        <option value="attendDesc"${st.sort==='attendDesc'?' selected':''}>출석률 높은순</option>
        <option value="recent"${st.sort==='recent'?' selected':''}>최근 연습순</option>
      </select>
    </div>
    <div class="md-master-filters">
      <span class="md-filter-chip${filter==='all'?' active':''}" onclick="filterStudentMaster('all')">전체</span>
      <span class="md-filter-chip${filter==='pending'?' active':''}" onclick="filterStudentMaster('pending')">피드백 대기</span>
      <span class="md-filter-chip${filter==='alert'?' active':''}" onclick="filterStudentMaster('alert')">관리 필요</span>
    </div>
  </div>
  ${selCount>0?`<div class="md-bulk-bar">
    <span class="md-bulk-count">${selCount}명 선택됨</span>
    <button class="btn btn-primary btn-sm" onclick="bulkMessageSelected()">💌 일괄 메시지</button>
    <button class="btn btn-secondary btn-sm" onclick="clearStudentSelection()">선택 해제</button>
  </div>`:''}
  <div class="md-tl">${items}</div>`;
}

function instrStudentDetail(idx){
  const r = instrStudentRows[idx];
  if(!r) return `<div class="md-detail-empty">왼쪽에서 수강생을 선택하면<br>출결·AI 분석·코멘트 누적 데이터가 표시됩니다.</div>`;
  const subs = getStudentSubmissions(r.name);
  const score = getStudentScore(r.name);
  const activeSubId = (instrActiveSubmissionId && subs.some(s=>s.id===instrActiveSubmissionId)) ? instrActiveSubmissionId : (subs[0]?subs[0].id:null);
  instrActiveSubmissionId = activeSubId;
  const attendBoxes = r.attendHistory.map(v=>`<span class="history-attend-box ${v?'present':'absent'}"></span>`).join('');
  return `<div class="md-detail-head">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="avatar av-blue" style="width:44px;height:44px;font-size:var(--fs-title)">${r.name[0]}</div>
      <div>
        <div class="md-detail-title">${r.name}</div>
        <div class="md-detail-sub">${r.course}${r.courses.length>1?` 외 ${r.courses.length-1}개 반`:''} · 등록일 ${r.joined}</div>
      </div>
    </div>
    <span class="badge ${r.statusClass}">${r.statusText}</span>
  </div>
  <div class="md-detail-contact-row">
    <div class="md-detail-contact-item"><span class="md-detail-contact-label">학생 연락처</span><span class="md-detail-contact-val">${r.phone}</span></div>
    <div class="md-detail-contact-item"><span class="md-detail-contact-label">보호자</span><span class="md-detail-contact-val">${r.guardian}</span></div>
    ${r.courses.length>1?`<div class="md-detail-contact-item"><span class="md-detail-contact-label">수강 중인 반</span><span class="md-detail-contact-val">${r.courses.join(', ')}</span></div>`:''}
    <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="messageStudentFromRoster('${r.name}')">💌 메시지 보내기</button>
  </div>
  <div class="history-stat-row">
    <div class="history-stat"><div class="history-stat-label">종합 성장점수${score!==null?' 🔒':''}</div><div class="history-stat-val">${score===null?'—':score+'점'}</div></div>
    <div class="history-stat"><div class="history-stat-label">출석률</div><div class="history-stat-val">${r.attendRate}%</div></div>
    <div class="history-stat"><div class="history-stat-label">강사 피드백</div><div class="history-stat-val">${r.fbDone?'완료':'대기'}</div></div>
    <div class="history-stat"><div class="history-stat-label">최근 연습</div><div class="history-stat-val" style="font-size:var(--fs-body)">${r.last}</div></div>
  </div>
  ${score!==null?`<div class="data-trail-note" style="margin-bottom:14px"><span class="dot"></span>종합 성장점수는 아래 제출물 ${subs.length}건의 점수를 자동 평균낸 값으로, 직접 수정할 수 없습니다. 개별 제출물 점수만 검증·조정할 수 있습니다.</div>`:''}
  <div class="vreport-section">
    <div class="vreport-section-title">최근 10회 출결</div>
    <div class="history-attend-row">${attendBoxes}</div>
    <div class="vreport-bar-legend" style="margin-top:10px">
      <span><span class="dot" style="background:#16a34a"></span>출석</span>
      <span><span class="dot" style="background:#e4e4e7"></span>결석</span>
    </div>
  </div>
  <div class="vreport-section">
    <div class="vreport-section-title">제출물별 점수 (${subs.length}건) — 항목을 선택해 개별 검증</div>
    ${subs.length?renderStudentSubmissionList(subs, activeSubId):`<div class="vreport-note">이 수강생은 아직 AI 분석이 연동된 보컬 녹음을 제출하지 않았습니다.</div>`}
  </div>
  ${subs.length?`<div id="instr-sub-detail-pane">${renderStudentSubmissionDetail(activeSubId, rosterRefreshCallbackName())}</div>`:''}
  <div class="vreport-section">
    <div class="vreport-section-title">강사 노트</div>
    ${renderStudentNotes(r.name)}
  </div>`;
}

/* ── 강사 노트(학생별 메모) ──
   studentNotes: {학생이름: [{text, author, time}, ...]} 형태로 메모리에 누적.
   페이지를 새로고침하면 초기화되는 프로토타입 단계의 휘발성 저장소이며,
   실제 구현 시에는 submissionLog와 마찬가지로 서버에 영속화해야 한다. */
const studentNotes = {};
function renderStudentNotes(studentName){
  const notes = studentNotes[studentName]||[];
  return `<div class="student-notes-list">
    ${notes.length?notes.map(n=>`
    <div class="student-note-item">
      <div class="student-note-meta"><span class="student-note-author">${n.author}</span><span class="student-note-time">${n.time}</span></div>
      <div class="student-note-text">${n.text}</div>
    </div>`).join(''):`<div class="vreport-note" style="margin-top:0;padding-top:0;border-top:none">아직 작성된 노트가 없습니다. 수업 중 특이사항이나 다음 레슨에서 챙길 점을 적어두세요.</div>`}
  </div>
  <div class="student-note-input-row">
    <textarea class="student-note-input" id="student-note-input" placeholder="예: 비음이 섞여 나옴, 다음 시간에 발성 위치 다시 점검 필요" rows="2"></textarea>
    <button class="btn btn-primary btn-sm" onclick="addStudentNote('${studentName}')">노트 추가</button>
  </div>`;
}
function addStudentNote(studentName){
  const input = document.getElementById('student-note-input');
  const text = input ? input.value.trim() : '';
  if(!text) return;
  const author = studentRosterContext==='manager' ? roles.manager.name : roles.instructor.name;
  if(!studentNotes[studentName]) studentNotes[studentName] = [];
  studentNotes[studentName].unshift({text, author, time:'방금'});
  const idx = studentRosterContext==='manager' ? mgrStudentActiveIdx : instrStudentActiveIdx;
  document.getElementById('md-detail-pane').innerHTML = instrStudentDetail(idx);
}
/* 수강생 관리 화면에서 바로 메시지 보내기 — 기존 메시지 화면(messagesScreen)에
   해당 학생과의 스레드가 있으면 그 스레드를 열고, 없으면 메시지 목록 화면으로 이동한다.
   (스레드 데이터는 msgThreadsData에 역할별로 고정돼 있어, 실제 서비스에서는 학생별로
   동적으로 스레드를 찾거나 새로 생성하는 로직이 필요하다 — 여기서는 이름 매칭으로 best-effort 연결) */
function messageStudentFromRoster(studentName){
  const myRole = studentRosterContext==='manager' ? 'manager' : 'instructor';
  navigate('messages');
  const threads = msgThreadsData['instructor']||[];
  const matchIdx = threads.findIndex(t=>t.name===studentName);
  if(matchIdx>-1) msgOpenThread(matchIdx);
}

function renderStudentSubmissionList(subs, activeId){
  return `<div class="sub-list">${subs.map(s=>{
    const analyzing = s.aiStatus==='analyzing';
    const avg = Math.round((s.adjustedScores.pitch+s.adjustedScores.rhythm+s.adjustedScores.breath+s.adjustedScores.resonance)/4);
    const scoreClass = avg>=80?'good':avg>=60?'fair':'low';
    const meta = verifyStatusMeta[s.verifyStatus];
    return `<button class="sub-list-item${s.id===activeId?' active':''}" onclick="selectStudentSubmission(${s.id})">
      <span class="sub-list-date">${s.date}</span>
      <span class="sub-list-lec">${s.lec}</span>
      ${analyzing?`<span class="ai-analyzing-badge" style="padding:2px 7px;font-size:9px"><span class="ai-analyzing-spinner"></span>분석중</span>`:`<span class="md-tl-score ${scoreClass}">${avg}점</span><span class="badge ${meta.badge}" style="font-size:9px">${meta.label}</span>`}
    </button>`;
  }).join('')}</div>`;
}

function renderStudentSubmissionDetail(submissionId, refreshCallback){
  const s = submissionLog.find(x=>x.id===submissionId);
  if(!s) return '';
  ensureSubmissionPlaybackMeta(s);
  const analyzing = s.aiStatus==='analyzing';
  return `<div class="vreport-section">
    <div class="vreport-section-title">제출 과제 청취</div>
    ${renderSubPlayer(s)}
  </div>
  ${analyzing ? '' : `<div class="vreport-section">
    <div class="vreport-section-title">AI 1차 분석 — ${s.lec} (${s.date})</div>
    <div class="vreport-bars">
      ${vreportBarRow('음정',s.adjustedScores.pitch)}${vreportBarRow('박자',s.adjustedScores.rhythm)}${vreportBarRow('호흡',s.adjustedScores.breath)}${vreportBarRow('공명',s.adjustedScores.resonance)}
    </div>
    <div style="text-align:right;margin-top:10px">${s.hasDetail?`<button class="vreport-action-btn" onclick="showVocalReport(${s.id})">📊 전체 AI 리포트 보기</button>`:''}</div>
  </div>`}
  ${instrVerifySection(s.id, refreshCallback)}`;
}

/* 'instructor' 또는 'manager' — 현재 학생 마스터-디테일을 누가 보고 있는지에 따라
   검증 후 새로고침할 패널 id와 콜백 함수명이 달라진다. 화면 진입 시 반드시 설정한다. */
let studentRosterContext = 'instructor';
function rosterRefreshCallbackName(){
  return studentRosterContext==='manager' ? 'mgrStudentDetailRefresh' : 'instrStudentDetailRefresh';
}
function rosterDetailPaneId(){
  return studentRosterContext==='manager' ? 'mgr-md-detail-pane' : 'md-detail-pane';
}

function selectStudentSubmission(submissionId){
  subPlayerStop();
  instrActiveSubmissionId = submissionId;
  document.querySelectorAll('.sub-list-item').forEach(el=>el.classList.remove('active'));
  const target = [...document.querySelectorAll('.sub-list-item')].find(el=>el.getAttribute('onclick')===`selectStudentSubmission(${submissionId})`);
  if(target) target.classList.add('active');
  const pane = document.getElementById('instr-sub-detail-pane');
  if(pane) pane.innerHTML = renderStudentSubmissionDetail(submissionId, rosterRefreshCallbackName());
}

let instrStudentActiveIdx = 0;
let instrStudentFilter = 'all';
let instrActiveSubmissionId = null;
function selectStudent(idx){
  subPlayerStop();
  studentRosterContext = 'instructor';
  instrStudentActiveIdx = idx;
  instrActiveSubmissionId = null;
  document.getElementById('md-master-pane').innerHTML = instrStudentMaster(idx,instrStudentFilter);
  document.getElementById('md-detail-pane').innerHTML = instrStudentDetail(idx);
}
function instrStudentDetailRefresh(){
  document.getElementById('md-detail-pane').innerHTML = instrStudentDetail(instrStudentActiveIdx);
}
function instrVerifySection(submissionId, refreshCallback){
  refreshCallback = refreshCallback || 'instrStudentDetailRefresh';
  const s = submissionLog.find(x=>x.id===submissionId);
  if(!s) return '';
  const analyzing = s.aiStatus==='analyzing';
  const meta = verifyStatusMeta[s.verifyStatus];
  return `<div class="vreport-section">
    <div class="vreport-section-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>AI 분석 검증 파이프라인</span>${analyzing?'':`<span class="badge ${meta.badge}">${meta.label}</span>`}
    </div>
    ${renderPipelineStepper(s)}
    ${analyzing
      ? `<div class="vreport-note" style="margin-top:0;padding-top:0;border-top:none">AI 1차 분석이 끝나면 검증을 진행할 수 있습니다.</div>`
      : (s.verifyHistory.length?renderVerifyHistory(s):`<div class="vreport-note" style="margin-top:0;padding-top:0;border-top:none">아직 검증되지 않았습니다. AI 분석이 정확한지 확인해주세요.</div>`)}
    <div style="text-align:right;margin-top:10px"><button class="vreport-action-btn" onclick="navigateToSubmissionReview(${submissionId})">${analyzing?'진행 상황 보기':(s.verifyHistory.length?'재검증하기':'검증하기')}</button></div>
  </div>`;
}
function filterStudentMaster(filter){
  if(studentRosterContext==='manager'){
    mgrStudentFilter = filter;
    document.getElementById('md-master-pane').innerHTML = instrStudentMaster(mgrStudentActiveIdx,filter);
  } else {
    instrStudentFilter = filter;
    document.getElementById('md-master-pane').innerHTML = instrStudentMaster(instrStudentActiveIdx,filter);
  }
}
function currentRosterFilter(){
  return studentRosterContext==='manager' ? mgrStudentFilter : instrStudentFilter;
}
function currentRosterActiveIdx(){
  return studentRosterContext==='manager' ? mgrStudentActiveIdx : instrStudentActiveIdx;
}
/* 다중 선택(체크박스) — 이름 기준 Set으로 보관한다. instructor/manager 컨텍스트가
   각자 독립된 선택 상태를 가지므로 둘을 분리해 둔다(역할 전환 시 서로 섞이지 않도록). */
let instrStudentSelection = new Set();
let mgrStudentSelection = new Set();
function rosterSelection(){
  return studentRosterContext==='manager' ? mgrStudentSelection : instrStudentSelection;
}
function toggleStudentSelection(name){
  const sel = rosterSelection();
  if(sel.has(name)) sel.delete(name); else sel.add(name);
  document.getElementById('md-master-pane').innerHTML = instrStudentMaster(currentRosterActiveIdx(), currentRosterFilter());
}
function clearStudentSelection(){
  rosterSelection().clear();
  document.getElementById('md-master-pane').innerHTML = instrStudentMaster(currentRosterActiveIdx(), currentRosterFilter());
}
/* 일괄 메시지 — 현재는 데모 알림으로 대체한다. 실제 구현에서는 선택된 학생 각각에게
   동일한 메시지를 보내는 발송 모달을 띄우는 것이 자연스럽다. */
function bulkMessageSelected(){
  const names = [...rosterSelection()];
  if(!names.length) return;
  alert(`${names.join(', ')}\n위 ${names.length}명에게 메시지를 보낼 수 있는 발송 화면으로 연결됩니다. (프로토타입 단계)`);
}
/* 검색어 입력 — 매 타이핑마다 목록을 다시 그리지만, 입력창 포커스와 캐럿 위치를
   유지해야 한 글자씩 입력할 때마다 포커스가 끊기지 않는다. */
function searchStudentMaster(value){
  rosterState().search = value;
  const pane = document.getElementById('md-master-pane');
  pane.innerHTML = instrStudentMaster(currentRosterActiveIdx(), currentRosterFilter());
  const input = pane.querySelector('.md-search-input');
  if(input){ input.focus(); input.setSelectionRange(value.length, value.length); }
}
function filterStudentByCourse(courseName){
  rosterState().course = courseName;
  document.getElementById('md-master-pane').innerHTML = instrStudentMaster(currentRosterActiveIdx(), currentRosterFilter());
}
function sortStudentMaster(sortKey){
  rosterState().sort = sortKey;

}

/* 마스터-디테일 / 테이블 뷰 전환 — instructor/manager 각각 독립된 뷰 상태를 가진다. */
let instrRosterView = 'detail';
let mgrRosterView = 'detail';
function rosterView(){
  return studentRosterContext==='manager' ? mgrRosterView : instrRosterView;
}
function setRosterView(view){
  if(studentRosterContext==='manager') mgrRosterView = view; else instrRosterView = view;
  document.getElementById('roster-body').innerHTML = rosterBodyHtml();
}
function rosterBodyHtml(){
  if(rosterView()==='table') return renderStudentTableView();
  const idx = currentRosterActiveIdx();
  const filter = currentRosterFilter();
  return `<div class="md-layout">
    <div class="md-master" id="md-master-pane">${instrStudentMaster(idx, filter)}</div>
    <div class="md-detail" id="md-detail-pane">${instrStudentDetail(idx)}</div>
  </div>`;
}
function rosterViewToggleHtml(){
  const v = rosterView();
  return `<div class="md-view-toggle">
    <button class="md-view-btn${v==='detail'?' active':''}" onclick="setRosterView('detail')">👤 개별 보기</button>
    <button class="md-view-btn${v==='table'?' active':''}" onclick="setRosterView('table')">📋 전체 비교</button>
  </div>`;
}

/* 반 전체를 표로 비교하는 뷰 — 출석률/상태/최근 연습 기준으로 정렬해 한 화면에서
   누구를 먼저 챙겨야 할지 파악할 수 있게 한다. 마스터-디테일과 같은 rosterState(검색/반필터)를
   공유해, 한쪽에서 좁혀둔 범위가 다른 뷰로 전환해도 그대로 유지된다. */
function renderStudentTableView(){
  const st = rosterState();
  const isInstructorCtx = studentRosterContext!=='manager';
  const taught = isInstructorCtx ? myTaughtCourseNames() : [];
  let rows = instrStudentRows.map((r,i)=>({r,i}));
  if(isInstructorCtx) rows = rows.filter(({r})=>r.courses.some(c=>taught.includes(c)));
  if(st.course!=='all') rows = rows.filter(({r})=>r.courses.includes(st.course));
  if(st.search.trim()){
    const q = st.search.trim().toLowerCase();
    rows = rows.filter(({r})=>r.name.toLowerCase().includes(q));
  }
  rows = rows.slice().sort((a,b)=>a.r.attendRate-b.r.attendRate); // 기본: 출석률 낮은 순(관리 우선순위)
  const selectFn = studentRosterContext==='manager' ? 'selectMgrStudent' : 'selectStudent';
  return `<div class="roster-table-wrap">
  <table class="roster-table">
    <thead><tr><th>이름</th><th>반</th><th>출석률</th><th>최근 연습</th><th>피드백</th><th>상태</th><th></th></tr></thead>
    <tbody>
    ${rows.map(({r,i})=>`
    <tr>
      <td><span class="avatar av-blue" style="width:26px;height:26px;font-size:var(--fs-caption)">${r.name[0]}</span>${r.name}</td>
      <td>${r.course}${r.courses.length>1?` <span style="color:var(--text-faint)">+${r.courses.length-1}</span>`:''}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="roster-table-bar"><div class="roster-table-bar-fill" style="width:${r.attendRate}%;background:${r.attendRate<60?'#dc2626':r.attendRate<80?'#d97706':'#16a34a'}"></div></div><span style="font-size:var(--fs-caption);font-weight:700">${r.attendRate}%</span></div></td>
      <td>${r.last}</td>
      <td>${r.fbDone?'<span style="color:#16a34a;font-weight:700">완료</span>':'<span style="color:#d97706;font-weight:700">대기</span>'}</td>
      <td><span class="badge ${r.statusClass}">${r.statusText}</span></td>
      <td><button class="btn btn-secondary btn-sm" onclick="setRosterView('detail');${selectFn}(${i})">상세</button></td>
    </tr>`).join('')}
    </tbody>
  </table>
  ${!rows.length?`<div class="md-detail-empty">조건에 맞는 수강생이 없습니다.</div>`:''}
  </div>`;
}

function mgrAttSummary(){
  const courses = Object.keys(attendanceLog);
  let totalRecords=0, totalPresent=0;
  const lateCounts = {};
  const absentCounts = {};
  courses.forEach(name=>{
    const c = attendanceLog[name];
    c.sessions.forEach(s=>c.students.forEach(st=>{
      totalRecords++;
      const v = s.records[st];
      if(v==='O') totalPresent++;
      if(v==='L') lateCounts[st]=(lateCounts[st]||0)+1;
      if(v==='X') absentCounts[st]=(absentCounts[st]||0)+1;
    }));
  });
  const avgRate = totalRecords?Math.round(totalPresent/totalRecords*100):0;
  const absentOver3 = Object.values(absentCounts).filter(n=>n>=3).length;
  const topLate = Object.entries(lateCounts).sort((a,b)=>b[1]-a[1])[0];
  return {avgRate, absentOver3, topLate};
}

function mgrAttReport(){
  const sum = mgrAttSummary();

/* ── 운영자: 데이터 관리 화면 ──
   목적: 제출물(녹음+AI분석+강사검증) 단위로 누적 데이터를 한눈에 보고, 검증 상태를 직접 관리한다.
   구성: 요약 카드 4개 + 검증 상태 분포 바 + 검색/정렬/필터 가능한 제출물 리스트. */
let dmSearch = '', dmStatusFilter = 'all', dmSort = 'date_desc';

function dmSummary(){
  const total = submissionLog.length;
  const agree = submissionLog.filter(s=>s.verifyStatus==='agree').length;
  const corr = submissionLog.filter(s=>s.verifyStatus==='correction_needed').length;
  const pending = submissionLog.filter(s=>s.verifyStatus==='pending').length;
  const analyzed = submissionLog.filter(s=>s.aiStatus!=='analyzing');
  const avgConf = analyzed.length ? Math.round(analyzed.reduce((a,s)=>a+s.confidence,0)/analyzed.length) : 0;
  const instrDone = submissionLog.filter(s=>getPipelineStage(s).instrReview.done).length;
  const mgrDone = submissionLog.filter(s=>getPipelineStage(s).mgrReview.done).length;
  // 한 제출물에 강사/운영자 검증이 동시에 있을 수 있으므로, 막대 하나에 같이 표현하기 위해 배타적으로 분류
  let both=0, instrOnly=0, mgrOnly=0, none=0;
  submissionLog.forEach(s=>{
    const p = getPipelineStage(s);
    if(p.instrReview.done && p.mgrReview.done) both++;
    else if(p.instrReview.done) instrOnly++;
    else if(p.mgrReview.done) mgrOnly++;
    else none++;
  });
  return {total,agree,corr,pending,avgConf,instrDone,mgrDone,instrWaiting:total-instrDone,mgrWaiting:total-mgrDone,both,instrOnly,mgrOnly,none};
}

function dmFilteredRows(){
  let rows = submissionLog.slice();
  if(dmStatusFilter==='instr_waiting') rows = rows.filter(s=>!getPipelineStage(s).instrReview.done);
  else if(dmStatusFilter==='mgr_waiting') rows = rows.filter(s=>!getPipelineStage(s).mgrReview.done);
  else if(dmStatusFilter!=='all') rows = rows.filter(s=>s.verifyStatus===dmStatusFilter);
  if(dmSearch.trim()){
    const q = dmSearch.trim().toLowerCase();
    rows = rows.filter(s=>s.student.toLowerCase().includes(q)||s.course.toLowerCase().includes(q)||s.lec.toLowerCase().includes(q));
  }
  rows.sort((a,b)=>{
    if(dmSort==='date_desc') return b.date.localeCompare(a.date);
    if(dmSort==='date_asc') return a.date.localeCompare(b.date);
    if(dmSort==='score_desc') return b.aiScore-a.aiScore;
    if(dmSort==='score_asc') return a.aiScore-b.aiScore;
    if(dmSort==='confidence_asc') return a.confidence-b.confidence;
    return 0;
  });
  return rows;
}

function dmRenderTable(){
  const rows = dmFilteredRows();
  if(!rows.length) return `<div class="md-detail-empty">조건에 맞는 제출물이 없습니다.</div>`;
  return `<table><thead><tr><th>학생</th><th>출처</th><th>수업</th><th>레슨</th><th>제출일</th><th>AI 점수</th><th>신뢰도</th><th>검증 상태</th><th>진행 단계</th><th></th></tr></thead><tbody>
  ${rows.map(s=>{
    const analyzing = s.aiStatus==='analyzing';
    const meta = verifyStatusMeta[s.verifyStatus];
    const kindMeta = submissionKindMeta[s.submissionKind] || submissionKindMeta.lecture_practice;
    const scoreClass = s.aiScore>=80?'good':s.aiScore>=60?'fair':'low';
    const p = getPipelineStage(s);
    const adjustedAvg = Math.round((s.adjustedScores.pitch+s.adjustedScores.rhythm+s.adjustedScores.breath+s.adjustedScores.resonance)/4);
    const wasAdjusted = adjustedAvg !== s.aiScore;
    return `<tr>
      <td><span class="avatar av-blue">${s.student[0]}</span>${s.student}</td>
      <td><span class="badge ${kindMeta.badge}" style="font-size:10px;white-space:nowrap">${kindMeta.label}</span></td>
      <td>${s.course}</td>
      <td style="font-size:var(--fs-caption);color:var(--text-faint)">${s.lec}</td>
      <td>${s.date}</td>
      <td>${analyzing?`<span class="ai-analyzing-badge"><span class="ai-analyzing-spinner"></span>분석중</span>`:`<span class="md-tl-score ${scoreClass}">${s.aiScore}점</span>${wasAdjusted?`<div style="font-size:10px;color:#6d28d9;font-weight:700">→ 보정 평균 ${adjustedAvg}점</div>`:''}`}</td>
      <td>${analyzing?'—':s.confidence+'%'}</td>
      <td><span class="badge ${meta.badge}">${meta.label}</span></td>
      <td style="font-size:var(--fs-caption);white-space:nowrap"><span style="color:${p.instrReview.done?'#16a34a':'#a1a1aa'};font-weight:700">강사${p.instrReview.done?'✓':'·대기'}</span> · <span style="color:${p.mgrReview.done?'#16a34a':'#a1a1aa'};font-weight:700">운영자${p.mgrReview.done?'✓':'·대기'}</span></td>
      <td style="display:flex;gap:6px">
        ${s.hasDetail?`<button class="btn btn-secondary btn-sm" onclick="showVocalReport(${s.id})">상세</button>`:''}
        <button class="btn ${analyzing?'btn-secondary':'btn-primary'} btn-sm" onclick="navigateToSubmissionReview(${s.id})">${analyzing?'확인':(s.verifyHistory.length?'재검증':'검증하기')}</button>
      </td>
    </tr>`;
  }).join('')}
  </tbody></table>`;
}

      <div class="form-group"><label>연습 분야</label><select id="plog-field"><option>보컬</option><option>댄스</option><option>작곡</option></select></div>
      <div class="form-group"><label>연습 시간</label><select id="plog-duration"><option>30분</option><option selected>1시간</option><option>1시간 30분</option><option>2시간 이상</option></select></div>
    </div>
    <div class="form-group"><label>오늘의 자기 평가</label>
      <div class="plog-stars" id="plog-star-row">${[1,2,3,4,5].map(n=>`<span class="plog-star${n<=4?' on':''}" onclick="setPlogStar(${n})">★</span>`).join('')}</div>
    </div>
    <div class="form-group"><label>오늘 연습 메모</label><textarea id="plog-note" rows="3" placeholder="오늘 느낀 점, 어려웠던 부분, 다음에 집중할 것을 자유롭게 기록하세요."></textarea></div>
    <div style="text-align:right;margin-top:8px"><button class="btn btn-primary" onclick="savePracticeLog()">저장하기</button></div>`,
};

let plogStarDraft = 4;
function setPlogStar(n){
  plogStarDraft = n;
  document.querySelectorAll('#plog-star-row .plog-star').forEach((el,i)=>el.classList.toggle('on', i<n));
}
function savePracticeLog(){
  const field = document.getElementById('plog-field').value;
  const duration = document.getElementById('plog-duration').value;
  const note = document.getElementById('plog-note').value.trim();
  const now = new Date();
  const dateStr = `2026.05.${String(now.getDate()).padStart(2,'0')}`;
  studentTimelineLog.unshift({
    id:'tl'+(Date.now()), type:'practice', date:dateStr, course:'개인 연습',
    title:`${field} 연습 일지`, scoreLabel:'자기평가', score:plogStarDraft, scoreClass:plogStarDraft>=4?'good':plogStarDraft>=3?'warn':'alert', fbDone:null,
    summary:note||`${field} 연습 ${duration} 진행.`,
  });
  closeModal();
  if(typeof renderContent==='function') renderContent();
}

function showModal(key){
  document.getElementById('modal-content').innerHTML = modals[key]||'';
  document.getElementById('modal-content').classList.remove('modal-wide');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay')){
    document.getElementById('modal-overlay').classList.remove('show');
    document.getElementById('modal-content').classList.remove('modal-wide');
    subPlayerStop(); // 재생 중인 제출물 모달이 오버레이 클릭으로 닫혀도 타이머를 반드시 정리
    if(homeworkUploadTimer){ clearInterval(homeworkUploadTimer); homeworkUploadTimer=null; homeworkUploadDraft=null; }
    if(instructorCaptureTimer){ clearInterval(instructorCaptureTimer); instructorCaptureTimer=null; instructorCaptureDraft=null; }
    activeUploadResultSubmissionId = null; // 업로드완료 화면이 오버레이 클릭으로 닫혀도 갱신 대상에서 제외
  }
}

function toggleUnit(header){
  const body = header.nextElementSibling;
  const arrow = header.querySelector('span:last-child');
  if(body.style.display==='none'){body.style.display='';arrow.textContent='▼';}
  else{body.style.display='none';arrow.textContent='▶';}
}

function bindEvents(){}

function initNotifBell(){
  renderNotifDrop();
  syncMobileNotifBell();
}

(function(){
  var role = sessionStorage.getItem('smms_role') || 'student';
  sessionStorage.removeItem('smms_role');
  switchRole(role);
  initNotifBell();
})();

(function(){
  var logo = document.getElementById('sidebar-logo');
  if(!logo) return;
  logo.addEventListener('error', function(){
    logo.style.display = 'none';
    var span = document.createElement('span');
    span.style.cssText = 'font-size:var(--fs-emphasis);font-weight:900;letter-spacing:.06em;color:var(--text)';
    span.textContent = 'SM UNIVERSE';
    logo.parentElement.appendChild(span);
  });
})();

window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='setRole'&&typeof switchRole==='function'){
    switchRole(e.data.role);
  }
});

document.addEventListener('keydown',function(e){
  if(e.key!=='Escape') return;
  const ro=document.getElementById('role-overlay');
  if(ro&&ro.classList.contains('show')){ closeRolePicker(); return; }
  const sb=document.getElementById('app-sidebar');
  if(sb&&sb.classList.contains('is-open')) closeNavDrawer();
});

if(window.matchMedia){
  const mq=window.matchMedia('(min-width:769px)');
  const onWide=function(ev){ if(ev.matches) closeNavDrawer(); };
  if(mq.addEventListener) mq.addEventListener('change',onWide);
  else if(mq.addListener) mq.addListener(onWide);
}




</script>
</body>
</html>
