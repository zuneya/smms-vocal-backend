/* 통합 리뷰 페이지(구 모달) 내부 구획 헤더 */
.review-section-label{font-size:var(--fs-caption);font-weight:800;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;margin:18px 0 8px}
.review-section-label:first-of-type{margin-top:0}
.page-back-row{margin-bottom:14px}
.review-page-head{margin-bottom:4px}
.review-page-title{font-size:var(--fs-title);font-weight:800;letter-spacing:-.01em;color:var(--text)}
.review-page-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:18px;border-top:1px solid var(--border-soft)}

.pipeline-stepper{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:14px}
.pipeline-step{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 6px}
.pipeline-step-icon{width:34px;height:34px;border-radius:50%;background:#f4f4f5;color:var(--text-faint);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;margin-bottom:7px;z-index:1;border:1px solid var(--border-soft)}
.pipeline-step.done .pipeline-step-icon{background:#16a34a;color:#fff;border-color:#16a34a}
.pipeline-step-label{font-size:var(--fs-caption);font-weight:800;color:var(--text);line-height:1.3}
.pipeline-step-sub{font-size:10px;color:var(--text-faint);margin-top:2px;line-height:1.3}
.pipeline-step-line{position:absolute;top:17px;left:calc(50% + 24px);right:calc(-50% + 24px);height:1px;background:var(--border)}
.pipeline-step.done .pipeline-step-line{background:#16a34a}

/* ── 점수 조정 막대(드래그) — 강사/운영자가 AI 1차 점수를 직접 보정할 때 사용.
   읽기전용 vreport-bar-row와 동일한 그리드 비율(108px 라벨 / 1fr 트랙 / 38px 값)을 공유해 시각적으로 자연스럽게 이어진다. */
.score-adjust-row{display:grid;grid-template-columns:108px 1fr 46px;align-items:center;gap:10px;margin-bottom:4px}
.score-adjust-label{font-size:var(--fs-body);font-weight:700;color:var(--text-muted)}
.score-adjust-track{position:relative;height:22px;background:#f4f4f5;border-radius:var(--radius-pill);cursor:pointer;touch-action:none;user-select:none}
.score-adjust-fill{position:absolute;left:0;top:0;height:100%;border-radius:var(--radius-pill);pointer-events:none;transition:background .15s}
.score-adjust-fill.good{background:#bbf0cf}.score-adjust-fill.fair{background:#fde7bf}.score-adjust-fill.low{background:#fbd3d3}
.score-adjust-fill.changed{background:#ddd6fe}
.score-adjust-orig-mark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--text-faint);pointer-events:none;opacity:.6}
.score-adjust-handle{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--text);transform:translate(-50%,-50%);cursor:grab;box-shadow:0 1px 3px rgba(0,0,0,.15);z-index:2}
.score-adjust-handle:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.12)}
.score-adjust-val{font-size:var(--fs-body);font-weight:800;text-align:right;color:var(--text)}
.score-adjust-val.changed{color:#6d28d9}
.score-adjust-orig-note{font-size:10px;color:var(--text-faint);text-align:right;margin-top:-2px;margin-bottom:8px;grid-column:2/4}
.score-adjust-legend{display:flex;align-items:center;gap:14px;font-size:var(--fs-caption);color:var(--text-faint);margin:10px 0 14px}
.score-adjust-legend span{display:flex;align-items:center;gap:5px}
.score-adjust-legend .swatch{width:10px;height:10px;border-radius:3px}

/* ── 출결 달력 ── */
.att-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.att-cal-title{font-size:var(--fs-body);font-weight:800;color:var(--text)}
.att-cal-nav{display:flex;gap:4px}
.att-cal-nav button{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-family:inherit}
.att-cal-nav button:hover{border-color:rgba(0,0,0,.2);color:var(--text)}
.att-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.att-cal-dow{text-align:center;font-size:10px;color:var(--text-faint);font-weight:700;padding-bottom:4px}
.att-cal-cell{position:relative;height:44px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;font-size:10px;color:var(--text-faint)}
.att-cal-cell.empty{visibility:hidden}
.att-cal-cell.has-session{cursor:pointer;border:1px solid var(--border-soft);color:var(--text);font-weight:700}
.att-cal-cell.has-session:hover{border-color:rgba(0,0,0,.25);background:#fafafa}
.att-cal-cell.active{background:var(--text);color:#fff;border-color:var(--text)}
.att-cal-cell.has-session.active:hover{background:var(--text);color:#fff;border-color:var(--text)}
.att-cal-daynum{font-size:11px;line-height:1}
.att-cal-rate{font-size:12px;font-weight:800;line-height:1;margin-top:2px}
.att-cal-rate.good{color:#16a34a}
.att-cal-rate.fair{color:#d97706}
.att-cal-rate.low{color:#dc2626}
.att-cal-cell.active .att-cal-rate{color:#fff!important}
.att-cal-warn-badge{position:absolute;top:-4px;right:-4px;min-width:14px;height:14px;padding:0 3px;border-radius:999px;background:#dc2626;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;line-height:1}
.att-cal-cell.active .att-cal-warn-badge{background:#fff;color:var(--text)}

.sub-list{display:flex;flex-direction:column;gap:0;border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px}
.sub-list-item{display:grid;grid-template-columns:62px 1fr auto auto;align-items:center;gap:10px;padding:9px 12px;border:none;background:#fff;border-bottom:1px solid var(--border-soft);cursor:pointer;font:inherit;text-align:left;width:100%}
.sub-list-item:last-child{border-bottom:none}
.sub-list-item:hover{background:#fafafa}
.sub-list-item.active{background:#f4f4f5}
.sub-list-date{font-size:var(--fs-caption);color:var(--text-faint);font-weight:700}
.sub-list-lec{font-size:var(--fs-caption);color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:600px){.pipeline-stepper{grid-template-columns:repeat(2,1fr);row-gap:18px}.pipeline-step-line{display:none}}

/* ── Hero — contextual dashboard hero ── */
.hero-section{
  position:relative;
  border-radius:var(--radius);
  margin-bottom:24px;
  overflow:hidden;
  background:#0a0a0f;
}
/* role-specific light accent — subtle, not decorative */
.hero-section[data-role="student"] .hero-light{
  background:radial-gradient(ellipse 55% 120% at 92% 50%, rgba(109,40,217,.14) 0%, transparent 65%);
}
.hero-section[data-role="instructor"] .hero-light{
  background:radial-gradient(ellipse 50% 120% at 90% 50%, rgba(20,150,100,.10) 0%, transparent 65%);
}
.hero-section[data-role="manager"] .hero-light{
  background:radial-gradient(ellipse 50% 120% at 90% 50%, rgba(30,90,200,.10) 0%, transparent 65%);
}
.hero-section[data-role="admin"] .hero-light{
  background:radial-gradient(ellipse 55% 120% at 90% 50%, rgba(200,140,20,.09) 0%, transparent 65%);
}
.hero-light{position:absolute;inset:0;z-index:0;pointer-events:none}

/* two-column layout: left = context / right = metrics */
.hero-inner{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:1fr auto;
  gap:0;
  min-height:0;
}
.hero-left{
  padding:30px 36px 28px;
  display:flex;
  flex-direction:column;
  gap:0;
}
.hero-right{
  padding:30px 36px 28px 0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  gap:0;
  border-left:1px solid rgba(255,255,255,.06);
  padding-left:32px;
  min-width:240px;
}

/* kicker */
.hero-kicker{
  display:inline-flex;align-items:center;gap:7px;
  font-size:var(--fs-caption);font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  color:rgba(255,255,255,.32);
  margin-bottom:14px;
}
.hero-kicker-dot{
  width:4px;height:4px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.4);
}
/* role accent dot colors */
.hero-section[data-role="student"] .hero-kicker-dot{background:#a78bfa}
.hero-section[data-role="instructor"] .hero-kicker-dot{background:#34d399}
.hero-section[data-role="manager"] .hero-kicker-dot{background:#60a5fa}
.hero-section[data-role="admin"] .hero-kicker-dot{background:#fbbf24}

/* headline */
.hero-title{
  font-size:clamp(1.55rem, 1.2vw + 1rem, 2.2rem);
  font-weight:800;
  line-height:1.08;
  letter-spacing:-.02em;
  color:#fff;
  margin-bottom:11px;
}
/* accent word — thin colored line under, not gradient fill */
.hero-title .hl{
  position:relative;
  display:inline;
}
.hero-section[data-role="student"] .hero-title .hl{color:#c4b5fd}
.hero-section[data-role="instructor"] .hero-title .hl{color:#6ee7b7}
.hero-section[data-role="manager"] .hero-title .hl{color:#93c5fd}
.hero-section[data-role="admin"] .hero-title .hl{color:#fde68a}

/* subcopy */
.hero-desc{
  font-size:var(--fs-body);
  line-height:1.65;
  color:rgba(255,255,255,.44);
  max-width:440px;
  margin-bottom:0;
  font-weight:400;
  letter-spacing:.005em;
}

/* separator between headline block and context strip */
.hero-divider{
  height:1px;
  background:rgba(255,255,255,.07);
  margin:22px 0 0;
}

/* context strip — role-specific status items */
.hero-ctx{
  display:flex;
  gap:0;
  padding-top:18px;
}
.hero-ctx-item{
  display:flex;flex-direction:column;gap:5px;
  padding-right:24px;
  margin-right:24px;
  border-right:1px solid rgba(255,255,255,.07);
}
.hero-ctx-item:last-child{border-right:none;margin-right:0;padding-right:0}
.hero-ctx-label{
  font-size:var(--fs-caption);font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;
  color:rgba(255,255,255,.32);
  line-height:1;
}
.hero-ctx-val{
  font-size:var(--fs-title);font-weight:800;
  color:#fff;
  letter-spacing:-.015em;
  line-height:1;
}
.hero-ctx-sub{
  font-size:var(--fs-caption);
  color:rgba(255,255,255,.28);
  font-weight:400;
  letter-spacing:.01em;
  line-height:1;
}

/* right column — role status panel */
.hero-status-label{
  font-size:var(--fs-caption);font-weight:700;
  letter-spacing:.10em;text-transform:uppercase;
  color:rgba(255,255,255,.28);
  margin-bottom:14px;
}
.hero-status-list{display:flex;flex-direction:column;gap:10px}
.hero-status-row{
  display:flex;align-items:center;gap:10px;
}
.hero-status-dot{
  width:5px;height:5px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.2);
}
.hero-status-dot.dot-alert{background:#f87171}
.hero-status-dot.dot-warn{background:#fbbf24}
.hero-status-dot.dot-ok{background:#34d399}
.hero-status-text{font-size:var(--fs-body);color:rgba(255,255,255,.52);font-weight:400;flex:1;line-height:1.3}
.hero-status-count{
  font-size:var(--fs-body);font-weight:700;
  color:rgba(255,255,255,.72);
  letter-spacing:-.01em;
}

@media(max-width:768px){
  .hero-inner{grid-template-columns:1fr}
  .hero-right{display:none}
  .hero-left{padding:22px 20px 20px}
  .hero-title{font-size:1.45rem}
  .hero-ctx{flex-wrap:wrap;gap:14px}
  .hero-ctx-item{border-right:none;padding-right:0;margin-right:0}
}
.modal{background:#fff;border-radius:var(--radius);padding:28px;width:500px;max-width:100%;max-height:82vh;overflow-y:auto;border:1px solid var(--border-soft);box-shadow:var(--shadow-lg)}

.modal-close{background:#f4f4f5;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);line-height:1;width:32px;height:32px;border-radius:8px;transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e4e4e7;color:var(--text)}
.nav-drawer-toggle,.profile-fab-mobile{display:none}

.nav-backdrop.is-visible{opacity:1;visibility:visible;pointer-events:auto}
.topbar-center{min-width:0}
.profile-fab-mobile{align-items:center;justify-content:center;width:38px;height:38px;padding:0;border:none;border-radius:50%;cursor:pointer;flex-shrink:0;background:var(--text);color:#fff;font-size:var(--fs-body);font-weight:800;font-family:inherit;transition:opacity .12s;-webkit-tap-highlight-color:transparent}
.profile-fab-mobile:active{opacity:.7}
.nav-drawer-toggle{align-items:center;justify-content:center;width:40px;height:40px;padding:0;border:none;border-radius:10px;cursor:pointer;flex-shrink:0;background:#fff;color:var(--text);border:1px solid var(--border-soft);transition:background .15s,transform .12s;-webkit-tap-highlight-color:transparent}
.nav-drawer-toggle:active{transform:scale(.96);background:#f4f4f5}
.nav-drawer-toggle .nav-drawer-icon{display:flex;flex-direction:column;gap:4px;width:18px}

}

/* ── 실제 AI 분석 백엔드 연결 설정 ──────────────────────────────────────
   비워두면(기본값) 기존처럼 completeAiAnalysis()의 데모 시뮬레이션 결과가 나온다.
   SMMS_backend 폴더를 Vercel에 배포한 뒤, 그 주소 + "/api/analyze-vocal"을 여기 넣으면
   실제 OpenAI 분석 결과가 표시된다. API 키는 여기 절대 넣지 않는다 — 서버 쪽 환경 변수로만 관리한다. */
const VOCAL_ANALYSIS_API_URL = 'https://smms-vocal-backend.vercel.app/api/analyze-vocal';

let currentRole = 'student';
let currentNav = 'dashboard';
/* "제출물 검토"·"업로드 완료" 같은 페이지형 화면에 진입하기 직전의 currentNav를 기억해둔다.
   이 화면들은 사이드바 메뉴가 아니라 카드/버튼 클릭으로 들어오므로, 뒤로가기 버튼이
   "원래 보고 있던 화면"으로 정확히 돌아갈 수 있도록 진입 시점에 한 번만 저장한다. */
let navReturnTo = 'dashboard';

/* 제출물 검토 페이지로 이동 — 진입 전 화면을 기억해두고 navigate()로 전환한다.
   roster/데이터관리 모달처럼 "모달 안에서" 호출되는 경우를 위해 모달도 함께 닫는다. */
function navigateToSubmissionReview(submissionId){
  navReturnTo = currentNav;
  closeModal(); // 호출 시점에 열려있는 모달(roster, 데이터관리 등)이 있다면 닫고 페이지로 전환
  navigate('submission_review_'+submissionId);
}

function toggleNavDrawer(){
  const sb=document.getElementById('app-sidebar');
  if(sb.classList.contains('is-open')) closeNavDrawer();
  else openNavDrawer();
}

function openNavDrawer(){
  document.getElementById('app-sidebar').classList.add('is-open');
  document.getElementById('nav-backdrop').classList.add('is-visible');
  document.getElementById('nav-backdrop').setAttribute('aria-hidden','false');
  const tg=document.getElementById('nav-drawer-toggle');
  if(tg){ tg.setAttribute('aria-expanded','true'); tg.setAttribute('aria-label','메뉴 닫기'); }
  document.body.classList.add('nav-drawer-open');
}

function closeNavDrawer(){
  document.getElementById('app-sidebar').classList.remove('is-open');
  document.getElementById('nav-backdrop').classList.remove('is-visible');
  document.getElementById('nav-backdrop').setAttribute('aria-hidden','true');
  const tg=document.getElementById('nav-drawer-toggle');
  if(tg){ tg.setAttribute('aria-expanded','false'); tg.setAttribute('aria-label','메뉴 열기'); }
  document.body.classList.remove('nav-drawer-open');
}

function syncRolePickerHighlight(){
  document.querySelectorAll('.role-option').forEach(btn=>{
    btn.classList.toggle('active', btn.getAttribute('data-role')===currentRole);
  });
  const r = roles[currentRole];
  if(!r) return;
  const sa=document.getElementById('sheet-avatar');
  const sn=document.getElementById('sheet-name');
  const ss=document.getElementById('sheet-sub');
  if(sa) sa.textContent = r.name.charAt(0);
  if(sn) sn.textContent = r.name;
  if(ss) ss.textContent = r.sub;
}

function openRolePicker(){
  closeNavDrawer();
  syncRolePickerHighlight();
  document.getElementById('role-overlay').classList.add('show');
  const t=document.getElementById('user-profile-trigger');
  if(t) t.setAttribute('aria-expanded','true');
  const m=document.getElementById('profile-fab-mobile');
  if(m) m.setAttribute('aria-expanded','true');
}

function closeRolePicker(e){
  const overlay=document.getElementById('role-overlay');
  if(e&&e.target!==overlay) return;
  overlay.classList.remove('show');
  const t=document.getElementById('user-profile-trigger');
  if(t) t.setAttribute('aria-expanded','false');
  const m=document.getElementById('profile-fab-mobile');
  if(m) m.setAttribute('aria-expanded','false');
}

function pickRole(role){
  switchRole(role);
  closeRolePicker();
}

function switchRole(role){
  currentRole = role;
  currentNav = 'dashboard';
  syncRolePickerHighlight();
  document.getElementById('user-name').textContent = roles[role].name;
  document.getElementById('user-role').textContent = roles[role].sub;
  const av=document.getElementById('user-avatar-letter');
  if(av&&roles[role].name) av.textContent = roles[role].name.charAt(0);
  const avm=document.getElementById('user-avatar-mobile');
  if(avm&&roles[role].name) avm.textContent = roles[role].name.charAt(0);
  renderNav();
  renderContent();
  if(typeof renderNotifDrop==='function') renderNotifDrop();
  if(typeof syncMobileNotifBell==='function') syncMobileNotifBell();
}

function renderNav(){
  const nav = roles[currentRole].nav;
  let html = '<div class="nav-section">';
  nav.forEach(n=>{
    const label = t(n.key) || n.label;
    html+=`<div class="nav-item${n.key===currentNav?' active':''}" onclick="navigate('${n.key}')">
      <span class="icon">${n.icon}</span>${label}
      ${n.badge?`<span class="badge">${n.badge}</span>`:''}
    </div>`;
  });
  html+='</div>';
  document.getElementById('sidebar-nav').innerHTML=html;
}

function navigate(key){
  currentNav=key;
  closeNavDrawer();
  renderNav();
  renderContent();
}

  const fn = screens[currentRole]?.[currentNav];
  // checkout / submission_review / upload_result dynamic routing
  let bodyHtml;

  const heroHtml = currentNav==='dashboard' ? getHeroSection() : '';

  document.getElementById('topbar-actions').innerHTML = getTopbarActions();

    </div>`).join('');

function toggleNotifDrop(triggerEl){
  const d = document.getElementById('notif-dropdown');
  if(!d) return;
  const isOpen = d.classList.contains('open');
  if(isOpen){ d.classList.remove('open'); return; }
  // find the trigger button — PC bell or mobile bell
  const btn = triggerEl || document.querySelector('#notif-bell-wrap .notif-bell') || document.querySelector('#notif-bell-mobile .notif-bell');
  if(btn){
    const rect = btn.getBoundingClientRect();
    const dropW = Math.min(320, window.innerWidth - 24);
    let left = rect.right - dropW;
    if(left < 12) left = 12;
    d.style.width = dropW + 'px';
    d.style.top = (rect.bottom + 8) + 'px';
    d.style.left = left + 'px';
    d.style.right = 'auto';
  }
  d.classList.add('open');
  renderNotifDrop();
}

function clearNotifs(){
  (notifData[currentRole]||[]).forEach(n=>n.unread=false);
  renderNotifDrop();
}

document.addEventListener('click',function(e){
  const d=document.getElementById('notif-dropdown');
  if(!d||!d.classList.contains('open')) return;
  const notifWrap=document.getElementById('notif-bell-wrap');
  const mobileSlot=document.getElementById('notif-bell-mobile');
  const clickedInsideDrop = d.contains(e.target);
  const clickedBell = (notifWrap&&notifWrap.contains(e.target))||(mobileSlot&&mobileSlot.contains(e.target));
  if(!clickedInsideDrop && !clickedBell) d.classList.remove('open');
});

function messagesScreen(role){
  msgActiveRole = role;
  msgActiveIndex = 0;
  return msgRenderLayout();

function msgRenderLayout(){
  return`
<div class="msg-layout" id="msg-layout">
  <div class="msg-list">
    <div class="msg-list-head">메시지</div>
    <div class="msg-list-body" id="msg-list-body">${msgRenderThreadList()}</div>
  </div>
  <div class="msg-chat" id="msg-chat">${msgRenderChat()}</div>
</div>`;
}

function msgRenderThreadList(){
  const list = msgThreadsData[msgActiveRole]||msgThreadsData.student;
  return list.map((t,i)=>`
      <div class="msg-thread${i===msgActiveIndex?' active':''}" onclick="msgOpenThread(${i})">
        <div class="msg-thread-avatar">${t.name[0]}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:4px">
            <span class="msg-thread-name">${t.name}</span>
            <span class="msg-thread-time">${t.time}</span>
          </div>
          <div class="msg-thread-preview">${t.preview}</div>
          <div style="font-size:var(--fs-caption);color:var(--text-faint)">${t.sub}</div>
        </div>
        ${t.unread?`<div class="msg-thread-unread"></div>`:''}
      </div>`).join('');
}

function msgRenderChat(){
  const list = msgThreadsData[msgActiveRole]||msgThreadsData.student;
  const active = list[msgActiveIndex] || list[0];
  return`
    <div class="msg-chat-head">
      <button class="msg-back-btn" onclick="msgBackToList()" aria-label="목록으로">←</button>
      <div class="msg-thread-avatar">${active.name[0]}</div>
      <div><div class="msg-chat-name">${active.name}</div><div class="msg-chat-sub">${active.sub}</div></div>
    </div>
    <div class="msg-chat-body">
      <div class="msg-date-divider"><span>${active.msgs.length?'대화 시작':''}</span></div>
      ${active.msgs.map(m=>`
      <div class="msg-bubble-wrap ${m.me?'me':''}">
        ${!m.me?`<div class="msg-thread-avatar" style="width:26px;height:26px;font-size:var(--fs-caption)">${active.name[0]}</div>`:''}
        <div class="msg-bubble ${m.me?'me':'them'}">${m.text}</div>
      </div>`).join('')}

    <div class="msg-chat-input">
      <textarea class="msg-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      <button class="msg-send" onclick="alert('전송되었습니다.')">↑</button>
    </div>`;
}

/* 스레드 클릭 — 활성 인덱스를 바꾸고 목록(active 표시)과 대화 영역만 innerHTML로
   부분 교체한다. msg-layout 자체는 그대로 유지되므로 모바일에서 얹는 show-chat
   클래스도 함께 보존된다. */
function msgOpenThread(i){
  msgActiveIndex = i;
  const listBody = document.getElementById('msg-list-body');
  const chat = document.getElementById('msg-chat');
  if(listBody) listBody.innerHTML = msgRenderThreadList();
  if(chat) chat.innerHTML = msgRenderChat();
  const layout = document.getElementById('msg-layout');
  if(layout) layout.classList.add('show-chat');
}
function msgBackToList(){
  const layout = document.getElementById('msg-layout');
  if(layout) layout.classList.remove('show-chat');
}

function syncMobileNotifBell(){
  const mobileSlot = document.getElementById('notif-bell-mobile');
  if(!mobileSlot) return;
  const unread = (notifData[currentRole]||[]).filter(i=>i.unread).length;
  mobileSlot.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'notif-bell';
  btn.style.position = 'relative';
  btn.innerHTML = '🔔' + (unread > 0 ? '<span style="position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:#dc2626;border:2px solid var(--bg-app);display:block"></span>' : '');
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    toggleNotifDrop(btn);
  });
  mobileSlot.appendChild(btn);
}

function showLangToast(name){
  let t=document.getElementById('lang-toast');
  if(!t){t=document.createElement('div');t.id='lang-toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0a0a0f;color:#fff;padding:10px 18px;border-radius:999px;font-size:var(--fs-body);font-weight:700;z-index:200;pointer-events:none;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=name+' 언어로 변경되었습니다';
  if(name==='English') t.textContent='Language changed to '+name;
  if(name==='日本語') t.textContent='言語を日本語に変更しました';
  if(name==='中文') t.textContent='已切换到中文';
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0';},2200);
}

/* ── hasDetail:false 제출물(5~21번)은 상세 AI 리포트는 없지만, 재생 화면에서는 동일하게 다뤄야 한다.
   재생/하이라이트 관련 필드가 비어 있으면 점수 기반으로 합성해 채워준다 — submissionLog가 화면들의
   단일 소스이므로, 화면 쪽 코드가 누락 필드를 각자 다르게 처리하지 않도록 한 곳에서 정규화한다. */
function ensureSubmissionPlaybackMeta(s){
  if(s._playbackReady) return s;
  if(s.durationSec==null) s.durationSec = 90 + ((s.id*17)%80);
  if(s.hasVideo==null) s.hasVideo = false;
  if(s.mediaUrl===undefined) s.mediaUrl = null; // 실제 업로드 파일의 objectURL — 데모 데이터는 없으므로 null(시뮬레이션 모드)
  if(s.mediaType===undefined) s.mediaType = s.hasVideo ? 'video' : 'audio';
  if(s.fbDone==null) s.fbDone = s.verifyHistory.length>0 && s.verifyStatus==='agree';
  if(s.feedbackText==null) s.feedbackText = '';
  if(!s.highlights){
    const dur = s.durationSec;
    const low = Object.entries(s.aiScores).sort((a,b)=>a[1]-b[1])[0];
    const high = Object.entries(s.aiScores).sort((a,b)=>b[1]-a[1])[0];
    const pts = [
      {ratio:0.18, field:high, good:true},
      {ratio:0.55, field:low, good:false},
      {ratio:0.82, field:high, good:true},
    ];
    s.highlights = pts.map(p=>{
      const sec = Math.round(dur*p.ratio);
      const mm = Math.floor(sec/60), ss = String(sec%60).padStart(2,'0');
      const label = scoreFieldLabel[p.field[0]];
      const val = p.field[1];
      return {
        t:`${mm}:${ss}`, sec,
        text: p.good ? `${label} 구간 양호 (${val}점)` : `${label} 보완 필요 구간 (${val}점)`,
        tag: p.good ? 'good' : (val<60?'alert':'warn'),
      };
    });
  }
  s._playbackReady = true;
  return s;
}

/* 기존에 정의된 모든 제출물은 이미 AI 1차 분석이 끝난 상태다. aiStatus를 명시하지 않은 항목은
   여기서 한 번에 'done'으로 채운다 — 새로 제출되는 항목만 submitNewHomework()에서 'analyzing'으로 시작한다. */
submissionLog.forEach(s=>{ if(s.aiStatus==null) s.aiStatus='done'; });

/* lecId 역보강 — 기존 제출물은 course(수업명 문자열) + lec(강의 제목 문자열)만 갖고 있었다.
   vodLectures에서 같은 수업·같은 제목의 강의를 찾아 lecId(=vodLectures.id)를 채워 넣어,
   "어떤 강의차시였는지"를 문자열 일치가 아니라 정식 참조로 추적할 수 있게 한다.
   일치하는 강의를 못 찾으면 lecId는 null로 남고, 화면에는 lec 문자열 그대로 표시된다
   (자유 텍스트로 입력된 과거 데이터·즉석 강의명을 위한 fallback). */
submissionLog.forEach(s=>{
  if(s.lecId!=null) return;
  const course = courseList.find(c=>c.name===s.course);
  const matched = course ? vodLectures.find(l=>l.courseId===course.id && l.title===s.lec) : null;
  s.lecId = matched ? matched.id : null;
});

   여기서 먼저 실행하면 fillMissingSubmissions()가 나중에 추가하는 항목들이 누락된다. */

/* ── 4단계 파이프라인: 학생 제출 → AI 1차 평가 → 강사 보정/추가평가 → 운영자 확인/수정.
   강사/운영자 단계 완료 여부는 verifyHistory에 쌓인 role 값으로부터 파생한다(별도 상태를 따로 들고 다니지 않음 —
   이력이 곧 진행 상태의 단일 출처). 순서는 강제하지 않으므로 둘 다 비어 있을 수도, 운영자가 먼저 기록될 수도 있다. */
function getPipelineStage(s){
  const instrEntry = s.verifyHistory.find(h=>h.role==='강사');
  const mgrEntry = s.verifyHistory.slice().reverse().find(h=>h.role==='운영자');
  const aiDone = s.aiStatus!=='analyzing';
  return {
    submitted:{done:true,by:s.student,at:s.submittedAt},
    aiReview:{done:aiDone,score:s.aiScore,confidence:s.confidence},
    instrReview:{done:!!instrEntry,entry:instrEntry||null},
    mgrReview:{done:!!mgrEntry,entry:mgrEntry||null},
  };
}

function renderPipelineStepper(s){
  const p = getPipelineStage(s);
  const steps = [
    {key:'submitted',icon:'🎙️',label:'학생 제출',sub:p.submitted.at,done:true},
    {key:'aiReview',icon:'🤖',label:'AI 1차 평가',sub:p.aiReview.done?`${p.aiReview.score}점 · 신뢰도 ${p.aiReview.confidence}%`:'분석 중...',done:p.aiReview.done,pending:!p.aiReview.done},
    {key:'instrReview',icon:'🎤',label:'강사 보정/추가평가',sub:p.aiReview.done?(p.instrReview.done?`${p.instrReview.entry.by} · ${p.instrReview.entry.date}`:'대기 중'):'AI 분석 후 진행',done:p.instrReview.done},
    {key:'mgrReview',icon:'🏢',label:'운영자 확인/수정',sub:p.mgrReview.done?`${p.mgrReview.entry.by} · ${p.mgrReview.entry.date}`:'대기 중',done:p.mgrReview.done},
  ];
  return `<div class="pipeline-stepper">
    ${steps.map((st,i)=>`
    <div class="pipeline-step${st.done?' done':''}">
      <div class="pipeline-step-icon">${st.pending?'<span class="ai-analyzing-spinner" style="border-color:#e4e4e7;border-top-color:var(--text-faint)"></span>':(st.done?'✓':st.icon)}</div>
      <div class="pipeline-step-label">${st.label}</div>
      <div class="pipeline-step-sub">${st.sub}</div>
      ${i<steps.length-1?'<div class="pipeline-step-line"></div>':''}
    </div>`).join('')}
  </div>`;
}

/* ── 점수 조정 막대(드래그) ── AI 원본 점수(aiScores)는 회색 세로선으로 항상 표시되어 기준점 역할을 하고,
   현재 값(adjustedScores)은 핸들을 드래그해 0~100 사이에서 조정한다. 트랙 클릭으로도 바로 이동 가능.
   값이 원본과 달라지면 보라색(changed)으로 강조되어 "수정됨"이 시각적으로 분명해진다. */
const scoreFieldLabel = {pitch:'음정',rhythm:'박자',breath:'호흡',resonance:'공명'};
let scoreAdjustDraft = null; // {submissionId, scores:{pitch,rhythm,breath,resonance}} — 모달이 열려있는 동안의 임시 편집값

function renderScoreAdjustRow(field, s){
  const orig = s.aiScores[field];
  const cur = scoreAdjustDraft.scores[field];
  const cls = cur>=80?'good':cur>=60?'fair':'low';
  const changed = cur!==orig;
  return `<div class="score-adjust-row" data-field="${field}">
    <span class="score-adjust-label">${scoreFieldLabel[field]}</span>
    <div class="score-adjust-track" id="sa-track-${field}" onmousedown="saStartDrag(event,'${field}')" ontouchstart="saStartDrag(event,'${field}')">
      <div class="score-adjust-orig-mark" style="left:${orig}%"></div>
      <div class="score-adjust-fill ${changed?'changed':cls}" id="sa-fill-${field}" style="width:${cur}%"></div>
      <div class="score-adjust-handle" id="sa-handle-${field}" style="left:${cur}%"></div>
    </div>
    <span class="score-adjust-val${changed?' changed':''}" id="sa-val-${field}">${cur}</span>
  </div>
  <div class="score-adjust-orig-note">AI 원본 ${orig}점${changed?` → 조정 ${cur}점`:''}</div>`;
}

function renderScoreAdjustPanel(s){
  scoreAdjustDraft = {submissionId:s.id, scores:{...s.adjustedScores}};
  return `<div id="score-adjust-panel">
    ${['pitch','rhythm','breath','resonance'].map(f=>renderScoreAdjustRow(f,s)).join('')}
  </div>
  <div class="score-adjust-legend">
    <span><span class="swatch" style="background:var(--text-faint)"></span>AI 원본 위치</span>
    <span><span class="swatch" style="background:#ddd6fe"></span>조정된 항목</span>
    <button class="vreport-action-btn" style="margin-left:auto" onclick="saResetAll(${s.id})">AI 원본으로 초기화</button>
  </div>`;
}

function saSetValue(field, val){
  val = Math.max(0,Math.min(100,Math.round(val)));
  scoreAdjustDraft.scores[field] = val;
  const s = submissionLog.find(x=>x.id===scoreAdjustDraft.submissionId);
  const orig = s.aiScores[field];
  const changed = val!==orig;
  const cls = val>=80?'good':val>=60?'fair':'low';
  document.getElementById(`sa-handle-${field}`).style.left = val+'%';
  const fillEl = document.getElementById(`sa-fill-${field}`);
  fillEl.style.width = val+'%';
  fillEl.className = `score-adjust-fill ${changed?'changed':cls}`;
  const valEl = document.getElementById(`sa-val-${field}`);
  valEl.textContent = val;
  valEl.className = `score-adjust-val${changed?' changed':''}`;
  const row = document.querySelector(`.score-adjust-row[data-field="${field}"]`);
  if(row && row.nextElementSibling) row.nextElementSibling.textContent = `AI 원본 ${orig}점${changed?` → 조정 ${val}점`:''}`;
}

function saValueFromEvent(e, track){
  const rect = track.getBoundingClientRect();
  if(!rect.width) return 0;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const ratio = (clientX - rect.left) / rect.width;
  return ratio*100;
}

function saStartDrag(e, field){
  e.preventDefault();
  const track = document.getElementById(`sa-track-${field}`);
  saSetValue(field, saValueFromEvent(e, track));
  const onMove = (ev)=>saSetValue(field, saValueFromEvent(ev, track));
  const onUp = ()=>{
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onUp);
}

function saResetAll(submissionId){
  const s = submissionLog.find(x=>x.id===submissionId);
  if(!s) return;
  document.getElementById('score-adjust-panel').innerHTML = ['pitch','rhythm','breath','resonance'].map(f=>{
    scoreAdjustDraft.scores[f] = s.aiScores[f];
    return renderScoreAdjustRow(f,s);
  }).join('');
}


/* ── 제출물 재생 플레이어 상태 ── 실제 미디어 파일이 없으므로 durationSec을 기준으로
   setInterval 타이머로 재생 위치를 시뮬레이션한다. 모달이 열려있는 동안에만 유효하며,
   닫히면 반드시 정리(clear)한다. */
let subPlayerState = null; // {submissionId, curSec, durationSec, timer, playing, hasMedia}

function subPlayerFormatTime(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60), s = String(sec%60).padStart(2,'0');
  return `${m}:${s}`;
}

function subPlayerStop(){
  if(subPlayerState?.timer){ clearInterval(subPlayerState.timer); }
  if(subPlayerState?.hasMedia){
    const media = document.getElementById('sub-player-media');
    if(media && !media.paused) media.pause();
  }
  subPlayerState = null;
}

/* renderSubPlayer — mediaUrl이 있으면(학생이 실제로 올린 파일) 화면에 보이지 않는 <audio>/<video>
   엘리먼트를 실제로 재생시키고, 우리가 그려둔 커스텀 트랙/버튼은 그 미디어의 재생 위치를 그대로
   반영하는 "스킨" 역할만 한다. mediaUrl이 없는 기존 데모 데이터는 durationSec 기준 시간 시뮬레이션으로
   동작한다(이전 동작 그대로) — 두 모드 모두 동일한 UI/하이라이트 상호작용을 제공한다. */
function renderSubPlayer(s){
  ensureSubmissionPlaybackMeta(s);
  subPlayerStop(); // 이 패널이 다시 그려지기 전에 이전 제출물의 재생 타이머/미디어가 남아있다면 먼저 정리
  const dur = s.durationSec;
  const analyzing = s.aiStatus==='analyzing';
  const hasMedia = !!s.mediaUrl;
  subPlayerState = {submissionId:s.id, curSec:0, durationSec:dur, timer:null, playing:false, hasMedia};
  const markers = analyzing ? '' : s.highlights.map(h=>`<div class="sub-player-marker ${h.tag}" style="left:${(h.sec/dur)*100}%" title="${h.t} · ${h.text}" onclick="event.stopPropagation();subPlayerSeek(${h.sec})"></div>`).join('');
  const chips = analyzing ? '' : s.highlights.map((h,i)=>`<button class="sub-highlight-chip" id="sub-hl-chip-${i}" onclick="subPlayerSeek(${h.sec})">
    <span class="dot ${h.tag}"></span>${h.t} ${h.text}
  </button>`).join('');
  const mediaTag = hasMedia
    ? (s.mediaType==='video'
        ? `<video id="sub-player-media" src="${s.mediaUrl}" preload="metadata" class="sub-player-video" onloadedmetadata="onSubPlayerMediaLoaded(${s.id})" ontimeupdate="onSubPlayerMediaTick(${s.id})" onended="onSubPlayerMediaEnded(${s.id})" onclick="subPlayerToggle(${s.id})"></video>`
        : `<audio id="sub-player-media" src="${s.mediaUrl}" preload="metadata" style="display:none" onloadedmetadata="onSubPlayerMediaLoaded(${s.id})" ontimeupdate="onSubPlayerMediaTick(${s.id})" onended="onSubPlayerMediaEnded(${s.id})"></audio>`)
    : '';
  return `<div class="sub-player">
    <div class="sub-player-head">
      <div class="sub-player-title">${s.hasVideo?'🎥 제출 영상':'🎙️ 제출 녹음'} 재생${analyzing?`<span class="ai-analyzing-badge"><span class="ai-analyzing-spinner"></span>AI 분석 중</span>${aiAttemptStepper(s)}`:`<span class="sub-player-badge">AI 하이라이트 ${s.highlights.length}개</span>`}</div>
    </div>
    ${hasMedia && s.mediaType==='video' ? mediaTag : ''}
    <div class="sub-player-controls">
      <button class="sub-player-playbtn" id="sub-player-playbtn" onclick="subPlayerToggle(${s.id})">▶</button>
      <div class="sub-player-track-wrap">
        ${markers}
        <div class="sub-player-track" id="sub-player-track" onclick="subPlayerTrackClick(event)">
          <div class="sub-player-progress" id="sub-player-progress" style="width:0%"></div>
          <div class="sub-player-handle" id="sub-player-handle" style="left:0%"></div>
        </div>
      </div>
      <span class="sub-player-time" id="sub-player-time">0:00 / ${subPlayerFormatTime(dur)}</span>
    </div>
    ${hasMedia && s.mediaType==='audio' ? mediaTag : ''}
    <div class="sub-player-current-note" id="sub-player-current-note">${analyzing?aiAnalyzingLongText(s):'재생하거나 하이라이트를 클릭하면 해당 구간 설명이 여기에 표시됩니다.'}</div>
    <div class="sub-highlight-chip-row">${chips}</div>
  </div>`;
}

/* 실제 미디어의 메타데이터가 로드되면(브라우저가 파일을 읽어 길이를 알게 되면) 추정치였던
   durationSec을 정확한 값으로 교체하고 화면 표시도 갱신한다. */
function onSubPlayerMediaLoaded(submissionId){
  const media = document.getElementById('sub-player-media');
  if(!media || !isFinite(media.duration) || media.duration<=0) return;
  const s = submissionLog.find(x=>x.id===submissionId);
  if(s) s.durationSec = media.duration;
  if(subPlayerState && subPlayerState.submissionId===submissionId) subPlayerState.durationSec = media.duration;
  const time = document.getElementById('sub-player-time');
  if(time) time.textContent = `0:00 / ${subPlayerFormatTime(media.duration)}`;
}

/* 실제 미디어 재생 중 timeupdate 이벤트 — 커스텀 트랙/하이라이트 UI를 미디어의 현재 위치로 동기화 */
function onSubPlayerMediaTick(submissionId){
  if(!subPlayerState || subPlayerState.submissionId!==submissionId) return;
  const media = document.getElementById('sub-player-media');
  if(!media) return;
  subPlayerState.curSec = media.currentTime;
  subPlayerUpdateUI();
}

function onSubPlayerMediaEnded(submissionId){
  if(!subPlayerState || subPlayerState.submissionId!==submissionId) return;
  subPlayerState.playing = false;
  const btn = document.getElementById('sub-player-playbtn');
  if(btn) btn.textContent = '▶';
}

function subPlayerToggle(submissionId){
  if(!subPlayerState || subPlayerState.submissionId!==submissionId) return;
  const btn = document.getElementById('sub-player-playbtn');
  if(subPlayerState.hasMedia){
    const media = document.getElementById('sub-player-media');
    if(!media) return;
    if(subPlayerState.playing){
      media.pause();
      subPlayerState.playing = false;
      if(btn) btn.textContent = '▶';
    } else {
      media.play();
      subPlayerState.playing = true;
      if(btn) btn.textContent = '⏸';
    }
    return;
  }
  // 실제 파일이 없는 데모 데이터 — 기존 시간 시뮬레이션 방식 그대로
  if(subPlayerState.playing){
    clearInterval(subPlayerState.timer);
    subPlayerState.playing = false;
    if(btn) btn.textContent = '▶';
  } else {
    subPlayerState.playing = true;
    if(btn) btn.textContent = '⏸';
    subPlayerState.timer = setInterval(()=>{
      subPlayerState.curSec += 0.5;
      if(subPlayerState.curSec >= subPlayerState.durationSec){
        subPlayerState.curSec = subPlayerState.durationSec;
        subPlayerUpdateUI();
        subPlayerToggle(submissionId); // 끝에 도달하면 정지
        return;
      }
      subPlayerUpdateUI();
    }, 200);
  }
}

function subPlayerSeek(sec){
  if(!subPlayerState) return;
  const clamped = Math.max(0, Math.min(subPlayerState.durationSec, sec));
  subPlayerState.curSec = clamped;
  if(subPlayerState.hasMedia){
    const media = document.getElementById('sub-player-media');
    if(media) media.currentTime = clamped; // timeupdate 이벤트가 이어서 subPlayerUpdateUI를 호출한다
  }
  subPlayerUpdateUI();
}

function subPlayerTrackClick(e){
  if(!subPlayerState) return;
  const track = document.getElementById('sub-player-track');
  const rect = track.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width));
  subPlayerSeek(ratio*subPlayerState.durationSec);
}

function subPlayerUpdateUI(){
  if(!subPlayerState) return;
  const {curSec, durationSec, submissionId} = subPlayerState;
  const pct = (curSec/durationSec)*100;
  const progress = document.getElementById('sub-player-progress');
  const handle = document.getElementById('sub-player-handle');
  const time = document.getElementById('sub-player-time');
  if(progress) progress.style.width = pct+'%';
  if(handle) handle.style.left = pct+'%';
  if(time) time.textContent = `${subPlayerFormatTime(curSec)} / ${subPlayerFormatTime(durationSec)}`;

  const s = submissionLog.find(x=>x.id===submissionId);
  if(!s) return;
  const note = document.getElementById('sub-player-current-note');
  if(note){
    const active = s.highlights.filter(h=>curSec>=h.sec).sort((a,b)=>b.sec-a.sec)[0];
    note.innerHTML = active ? `<b>${active.t}</b> ${active.text}` : '재생하거나 하이라이트를 클릭하면 해당 구간 설명이 여기에 표시됩니다.';
  }
  s.highlights.forEach((h,i)=>{
    const chip = document.getElementById('sub-hl-chip-'+i);
    if(chip) chip.classList.toggle('active', Math.abs(curSec-h.sec)<1.5);
  });
}

/* ── 통합 제출물 리뷰 모달 ── 재생(청취) · AI 점수 보정(드래그) · 강사 텍스트 피드백 · 검증 판정을
   하나의 화면에서 처리한다. 기존에는 "제출 카드의 텍스트 코멘트+전송"과 "검증모달의 점수보정+판정"이
   분리되어 있었고 데이터도 feedbackText / verifyHistory.note로 나뉘어 있었는데, 이제는 하나의 텍스트
   입력이 곧 강사 코멘트이자 검증 노트다 — 저장 시 양쪽에 동일하게 반영(s.feedbackText, verifyHistory.note).
   강사·운영자·데이터관리·과제현황 등 호출 컨텍스트에 따라 새로고침할 영역이 다르므로 onSavedCallback으로 위임. */
/* ── 제출물 검토 페이지 ── 청취(재생) · AI 점수 보정(드래그) · 강사 텍스트 피드백 · 검증 판정을
   하나의 화면에서 처리한다. 강사 제출카드, 학생상세 패널, 과제현황 roster, 데이터관리 테이블 등
   여러 진입점에서 navigateToSubmissionReview()를 통해 들어오는 전용 페이지다. 모달이 아니라
   renderContent()가 그리는 본문이므로, 콘텐츠가 아무리 무거워도(재생+점수보정+코칭 템플릿+이력)
   모달 오버레이의 backdrop-filter와 겹쳐 깜빡이던 문제가 구조적으로 사라진다.
   저장/취소 후에는 navReturnTo로 기록해둔 원래 화면으로 navigate() — 그 화면이 다시 그려지면서
   최신 데이터가 자연히 반영되므로, 모달 시절의 개별 갱신 콜백(omSubmissionsRefresh 등)이 더는 필요 없다. */
function renderSubmissionReviewPage(submissionId){
  const s = submissionLog.find(x=>x.id===submissionId);
  if(!s) return '<div class="empty-state"><div class="empty-icon">🔍</div>제출물을 찾을 수 없습니다.</div>';
  ensureSubmissionPlaybackMeta(s);
  activeUploadResultSubmissionId = null; // 이 페이지가 표시되는 동안엔 업로드완료 자동갱신 대상이 아니다
  const byName = roles[currentRole]?.name || '익명';
  const byRole = roleDisplayName[currentRole] || currentRole;
  const latestNote = s.verifyHistory.length ? s.verifyHistory[s.verifyHistory.length-1].note : '';
  const draftText = s.feedbackText || latestNote || defaultDraft(s);
  const analyzing = s.aiStatus==='analyzing';

  const scoreAndVerifySection = analyzing ? `
<div class="review-section-label">AI 점수 보정 · 강사 피드백 · 검증 판정</div>
<div class="data-trail-note"><span class="dot" style="background:#6d28d9"></span>AI가 아직 1차 분석 중입니다. 분석이 끝나면 점수 보정과 피드백 작성, 검증을 진행할 수 있습니다.</div>` : `
<div class="review-section-label">AI 점수 보정 — 막대를 드래그하거나 트랙을 클릭해 조정하세요</div>
${renderScoreAdjustPanel(s)}

<div class="review-section-label">강사 피드백 · 검증 판정</div>
<div class="quick-tag-row" style="margin-bottom:8px">
  <button class="quick-tag" onclick="applyCommentTemplate(${s.id},'pitch')">🎯 음정 코칭</button>
  <button class="quick-tag" onclick="applyCommentTemplate(${s.id},'rhythm')">🥁 박자 코칭</button>
  <button class="quick-tag" onclick="applyCommentTemplate(${s.id},'breath')">💨 호흡 코칭</button>
  <button class="quick-tag" onclick="applyCommentTemplate(${s.id},'resonance')">🔊 공명 코칭</button>
  <button class="quick-tag" onclick="applyCommentTemplate(${s.id},'praise')">👍 칭찬 위주</button>
</div>
<div class="form-group"><textarea id="review-fb-textarea" rows="4" placeholder="AI 데이터와 직접 청취한 내용을 참고해 학생에게 전달할 피드백을 작성하세요. 이 내용은 검증 판정 코멘트로도 함께 저장됩니다.">${draftText}</textarea></div>

<div class="form-group" style="margin-top:4px"><label>검증 판정</label>
  <div class="verify-radio-group">
    <label class="verify-radio${s.verifyStatus==='agree'?' sel':''}"><input type="radio" name="verify-status" value="agree" ${s.verifyStatus==='agree'?'checked':''}><span class="verify-radio-dot good"></span>강사 동의</label>
    <label class="verify-radio${s.verifyStatus==='correction_needed'?' sel':''}"><input type="radio" name="verify-status" value="correction_needed" ${s.verifyStatus==='correction_needed'?'checked':''}><span class="verify-radio-dot low"></span>보정 필요</label>
    <label class="verify-radio${s.verifyStatus==='pending'?' sel':''}"><input type="radio" name="verify-status" value="pending" ${s.verifyStatus==='pending'?'checked':''}><span class="verify-radio-dot fair"></span>미확인으로 되돌리기</label>
  </div>
</div>
${s.hasDetail?`<div style="text-align:right;margin-top:-4px;margin-bottom:8px"><button class="vreport-action-btn" onclick="showVocalReport(${s.id})">📊 전체 AI 리포트 보기</button></div>`:''}
${s.verifyHistory.length?`<div class="form-group"><label>변경 이력 (${s.verifyHistory.length}건)</label>${renderVerifyHistory(s)}</div>`:''}`;

  return `
<div class="page-back-row"><button class="btn btn-secondary btn-sm" onclick="returnFromSubmissionReview()">← 돌아가기</button></div>
<div class="card">
  <div class="card-body">
    <div class="review-page-head">
      <div>
        <div class="review-page-title">${s.student} · ${s.lec}</div>
        <div style="font-size:var(--fs-caption);color:var(--text-faint);margin-top:2px">${s.course} · 제출일 ${s.date}${analyzing?' · AI 분석 진행 중':` · AI 점수 ${s.aiScore}점 · 신뢰도 ${s.confidence}%`}</div>
      </div>
    </div>
    ${renderPipelineStepper(s)}

    <div class="review-section-label">제출 과제 청취</div>
    ${renderSubPlayer(s)}
    ${scoreAndVerifySection}

    <div class="review-page-actions">
      <span style="font-size:var(--fs-caption);color:var(--text-faint);align-self:center;margin-right:auto">검증자: ${byName} (${byRole})</span>
      <button class="btn btn-secondary" onclick="returnFromSubmissionReview()">${analyzing?'닫기':'취소'}</button>
      ${analyzing?'':`<button class="btn btn-primary" onclick="saveSubmissionReview(${submissionId})">저장 · 학생에게 전송</button>`}
    </div>
  </div>

}

/* 페이지 진입 직후 .verify-radio 라디오 그룹에 선택 강조(.sel) 토글을 바인딩한다.
   bindEvents()에서 매 renderContent() 호출 뒤 자동으로 실행된다. */
function bindSubmissionReviewPageEvents(){
  document.querySelectorAll('.verify-radio').forEach(label=>{
    label.addEventListener('click',()=>{
      document.querySelectorAll('.verify-radio').forEach(l=>l.classList.remove('sel'));
      label.classList.add('sel');
    });
  });
}

function returnFromSubmissionReview(){
  scoreAdjustDraft = null;
  subPlayerStop();
  navigate(navReturnTo || 'dashboard');
}
/* 이전 버전과의 호환을 위한 별칭 */
function cancelSubmissionReview(){ returnFromSubmissionReview(); }
function cancelVerify(){ returnFromSubmissionReview(); }

function renderVerifyHistory(s){
  const items = s.verifyHistory.slice().reverse().map(h=>{
    const fromMeta = h.from?verifyStatusMeta[h.from]:null;
    const toMeta = verifyStatusMeta[h.to];
    const scoreAdjustHtml = h.scoreAdjust?`<div class="verify-history-score-adjust">${Object.keys(h.scoreAdjust).map(f=>{
      const [before,after] = h.scoreAdjust[f];
      return `<span class="verify-history-score-chip">${scoreFieldLabel[f]} ${before}→<b>${after}</b></span>`;
    }).join('')}</div>`:'';
    return `<div class="verify-history-item">
      <div class="verify-history-head">
        <span class="verify-history-who">${h.by} <span class="verify-history-role">(${h.role})</span></span>
        <span class="verify-history-date">${h.date}</span>
      </div>
      <div class="verify-history-change">${fromMeta?`<span class="badge ${fromMeta.badge}">${fromMeta.label}</span> → `:''}<span class="badge ${toMeta.badge}">${toMeta.label}</span></div>
      ${scoreAdjustHtml}
      ${h.note?`<div class="verify-history-note">${h.note}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="verify-history-list">${items}</div>`;
}

function saveSubmissionReview(submissionId){
  const s = submissionLog.find(x=>x.id===submissionId);
  if(!s) return;
  const selected = document.querySelector('input[name="verify-status"]:checked');
  if(!selected){ alert('검증 판정을 선택해주세요.'); return; }
  const newStatus = selected.value;
  const ta = document.getElementById('review-fb-textarea');
  const note = ta ? ta.value.trim() : '';
  if(!note){ alert('학생에게 전달할 피드백을 입력해주세요.'); return; }
  const prevStatus = s.verifyStatus;
  const byName = roles[currentRole]?.name || '익명';
  const byRole = roleDisplayName[currentRole] || currentRole;
  const now = new Date();
  const dateStr = `2026.05.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // 점수 조정 반영: scoreAdjustDraft와 현재 adjustedScores를 비교해 바뀐 항목만 이력에 기록
  const scoreAdjust = {};
  let scoreChanged = false;
  if(scoreAdjustDraft && scoreAdjustDraft.submissionId===submissionId){
    ['pitch','rhythm','breath','resonance'].forEach(f=>{
      const before = s.adjustedScores[f];
      const after = scoreAdjustDraft.scores[f];
      if(before!==after){ scoreAdjust[f]=[before,after]; scoreChanged=true; }
    });
    s.adjustedScores = {...scoreAdjustDraft.scores};
  }

  const histEntry = {by:byName,role:byRole,date:dateStr,from:prevStatus,to:newStatus,note};
  if(scoreChanged) histEntry.scoreAdjust = scoreAdjust;
  s.verifyHistory.push(histEntry);
  s.verifyStatus = newStatus;
  // 텍스트 피드백은 검증 코멘트와 동일한 내용으로 학생 화면에도 그대로 노출된다 — 화면이 둘로
  // 나뉘어 있던 이전과 달리, 이제는 작성 시점에 단 하나의 코멘트만 존재한다.
  s.feedbackText = note;
  s.fbDone = true;
  scoreAdjustDraft = null;
  subPlayerStop();
  // navigate()가 원래 화면을 처음부터 다시 그리므로, submissionLog를 참조하는 모든 화면(제출카드,
  // 학생상세, 데이터관리 테이블 등)이 별도 갱신 콜백 없이 자동으로 최신 상태를 보여준다.
  navigate(navReturnTo || 'dashboard');
}

/* 코멘트 템플릿 — 항목 버튼 클릭 시 강사 코멘트 영역을 해당 항목 중심으로 재작성. submissionLog의
   adjustedScores(강사가 보정한 현재 점수) 기준으로 코칭 문구를 생성한다 — 보정 후 점수가 기준이어야
   코멘트와 화면에 보이는 점수가 항상 일치한다. */
const commentTemplates = {
  pitch:(s)=>{
    const v=s.adjustedScores.pitch;
    const warnSpots=(s.highlights||[]).filter(h=>h.tag!=='good').map(h=>h.t).join(', ');
    return v>=80
      ? `음정 정확도가 ${v}점으로 안정적입니다. 전체적인 음 이탈 없이 곡의 흐름을 잘 따라가고 있어요. 이 감각을 유지하면서 다음 단계인 고음역 확장 연습으로 넘어가면 좋겠습니다.`
      : `음정 정확도가 ${v}점으로, ${warnSpots||'전반적인 구간'}에서 음 이탈이 감지됩니다. 직접 들어보니 — 특정 음에서 호흡이 급해지며 음정이 흔들리는 경향이 있습니다. 해당 구간을 느린 템포로 끊어서 반복 연습한 뒤 원래 속도로 맞춰보는 방식을 권장합니다.`;
  },
  rhythm:(s)=>{
    const v=s.adjustedScores.rhythm;
    return v>=80
      ? `박자 안정성은 ${v}점으로 메트로놈 없이도 일정한 템포를 유지하고 있습니다. 다음에는 곡의 강약을 살린 리듬 표현을 시도해보세요.`
      : `박자 안정성이 ${v}점으로, 도입부에서 박자가 밀리는 경향이 보입니다. 직접 들어보니 — 호흡을 들이마시는 타이밍이 늦어지면서 다음 박이 늦게 나오는 패턴입니다. 메트로놈을 60bpm로 낮춰 연습한 뒤 점진적으로 원곡 속도로 올려보세요.`;
  },
  breath:(s)=>{
    const v=s.adjustedScores.breath;
    return v>=80
      ? `호흡 지지력이 ${v}점으로 우수합니다. 프레이즈 끝까지 소리가 흔들리지 않고 유지되는 점이 인상적입니다. 이 호흡량을 활용해 더 긴 프레이즈에도 도전해보세요.`
      : `호흡 지지력이 ${v}점으로, 구간 중간에 호흡이 끊기는 지점이 있습니다. 직접 들어보니 — 복식호흡으로 충분한 공기를 확보하기보다 흉식호흡에 가까운 짧은 호흡을 사용하고 있는 것으로 보입니다. 누운 자세에서 복식호흡을 먼저 체득한 뒤, 같은 감각을 서서 노래할 때도 적용하는 연습을 권장합니다.`;
  },
  resonance:(s)=>{
    const v=s.adjustedScores.resonance;
    return v>=80
      ? `공명 활용도가 ${v}점으로 음색이 풍부하게 형성되고 있습니다. 두성과 흉성 전환도 자연스럽습니다.`
      : `공명 활용도가 ${v}점으로, 전환 구간에서 소리가 얇아지는 느낌이 있습니다. 직접 들어보니 — 입안 공간이 충분히 열리지 않아 공명이 약해지는 것으로 보입니다. 입모양을 조금 더 편안하게 유지하며 소리를 내는 연습을 해보면 도움이 될 것입니다.`;
  },
  praise:(s)=>{
    return `이번 녹음에서 가장 인상적인 부분은 ${(s.highlights||[]).find(h=>h.tag==='good')?.text||'안정적인 발성'}입니다. 전체적으로 연습량이 느껴지는 결과물이었습니다. 지금처럼 꾸준히 이어가면서 다음 단계로 자연스럽게 넘어갈 수 있겠습니다.`;
  }
};

function defaultDraft(s){
  const hl=s.highlights||[];
  const warnCount=hl.filter(h=>h.tag!=='good').length;
  if(warnCount===0){
    return `전체적으로 안정적인 녹음입니다. ${hl.map(h=>h.t).join(', ')} 구간 모두 양호하게 나타났습니다. `;
  }
  const spots=hl.filter(h=>h.tag!=='good').map(h=>`${h.t}(${h.text})`).join(', ');
  return `AI 분석 결과 ${spots} 구간에서 보완이 필요한 것으로 나타났습니다. 직접 들어보니 — `;
}

function applyCommentTemplate(id,type){
  const s=submissionLog.find(x=>x.id===id);
  const ta=document.getElementById('review-fb-textarea');
  if(!s||!ta) return;
  ta.value=commentTemplates[type](s);
  ta.focus();
}

   하나의 모달(openSubmissionReviewModal)에서 한번에 저장하므로 별도 전송 함수가 필요 없다. */



/* 로그인한 학생이 실제로 등록된 강의 이름 목록 — instrStudentRows의 courses 배열을 그대로
   재사용한다(별도 "수강 등록" 데이터를 새로 만들지 않음 — 단일 소스 원칙). 강사 화면에서 보는
   수강생 등록 정보와 학생이 보는 "내 강의"가 항상 같은 데이터를 가리키게 된다. */
function myEnrolledCourseNames(){
  const row = instrStudentRows.find(r=>r.name===roles.student.name);
  return row ? row.courses : [];
}
function myEnrolledCourses(){
  const names = myEnrolledCourseNames();
  return courseList.filter(c=>names.includes(c.name));
}

   쓰이는 가벼운 상태다. lecTabMode가 탭(강의 목록/현재 수강 중)을, lecActiveCourseId/lecActiveLectureId가

function lecTab(el,tab){
  document.querySelectorAll('#lec-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  lecTabMode = tab;
  lecActiveCourseId = null;
  lecActiveLectureId = null;
  recStop(); // 탭 전환 시 녹음/재생 중이던 것이 있다면 정리
  document.getElementById('lec-content').innerHTML=lecContent(tab);
}

/* 강의 카드 클릭 — 어느 탭에서 들어왔는지(lecTabMode)는 유지한 채 커리큘럼 화면으로 들어간다.
   뒤로가기(lecBackToCourseList)는 이 탭으로 되돌아온다. */
function lecOpenCourse(courseId){
  lecActiveCourseId = courseId;
  lecActiveLectureId = null;
  recStop();
  document.getElementById('lec-content').innerHTML = lecContent('curriculum');
}
function lecOpenLecture(lectureId){
  lecActiveLectureId = lectureId;
  recStop();
  document.getElementById('lec-content').innerHTML = lecContent('watch');
}
function lecBackToCourseList(){
  lecActiveCourseId = null;
  lecActiveLectureId = null;
  recStop();
  document.getElementById('lec-content').innerHTML = lecContent(lecTabMode);
}
function lecBackToCurriculum(){
  lecActiveLectureId = null;
  recStop();
  document.getElementById('lec-content').innerHTML = lecContent('curriculum');
}

</div>
${enrolledHere?renderRecordingPanel(l):`<div class="data-trail-note"><span class="dot"></span>이 강의를 수강 신청하면 연습 녹음을 제출하고 강사 피드백을 받을 수 있습니다.</div>`}
<div id="ai-result-area"></div>`;
  }

  if(tab==='myai') return '<div class="empty-state"><div class="empty-icon">📋</div><div style="font-size:var(--fs-body);font-weight:700;margin-bottom:6px">피드백 히스토리</div><div style="font-size:var(--fs-body);color:var(--text-muted)">강사 피드백 내역은 과제 & 성장 메뉴의 성장 기록에서 확인할 수 있습니다.</div><button class="btn btn-secondary btn-sm" style="margin-top:14px" onclick="navigate(&quot;growth&quot;)">성장 기록 보기</button></div>';

/* ── 연습 녹음 제출 패널 — 파일 업로드 방식 ──
   기존에는 MediaRecorder로 마이크 직접 녹음을 받았으나, 과제 제출(openHomeworkUploadModal)·
   강사 현장촬영(openInstructorCaptureModal)과 동일하게 "파일 선택 → 미리보기 → 업로드 진행률
   애니메이션 → 제출" 흐름으로 통일한다. 차시별 업로드 상태를 lectureRecordings[lectureId]에
   보관해, 다른 차시를 보다가 돌아와도(페이지가 열려있는 한) 방금 선택한 파일이 유지된다.
   제출 시점에 createSubmissionFromMedia()로 submissionLog에 합류해 기존 AI분석·강사검증
   파이프라인을 그대로 탄다. */
const lectureRecordings = {}; // {lectureId: {mediaUrl, mediaType, fileName, fileSize, submitted:bool}}
let lecUploadTimer = null;

function renderRecordingPanel(l){
  return `<div class="submit-panel" id="rec-panel">
  <div class="submit-panel-title"><span>🎙️ 연습 녹음 제출</span></div>
  <p style="font-size:var(--fs-caption);color:var(--text-muted);margin-bottom:12px;line-height:1.6">강의의 예시 발음을 따라 연습한 녹음/영상 파일을 업로드해 제출하면 강사가 직접 피드백을 전달합니다.</p>
  <div id="rec-panel-body">${renderRecordingPanelBody(l)}</div>
</div>`;
}

function renderRecordingPanelBody(l){
  const rec = lectureRecordings[l.id];
  if(rec?.submitted){
    return `<div class="data-trail-note"><span class="dot" style="background:#16a34a"></span>제출이 완료되었습니다. 결과는 "성장 기록"에서 확인할 수 있습니다.</div>`;
  }
  if(rec?.mediaUrl){
    // 파일 선택 완료 — 미리보기 + 메모 + 제출/취소
    return `<div class="upload-file-chip">${rec.mediaType==='video'?'🎥':'🎵'} <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${rec.fileName}</span><span style="color:var(--text-faint);font-size:var(--fs-caption)">${rec.fileSize}</span><span class="remove" onclick="event.stopPropagation();recRetry(${l.id})">제거</span></div>
  <div class="upload-preview-wrap">${rec.mediaType==='video'
    ? `<video src="${rec.mediaUrl}" controls preload="metadata" class="upload-preview-media"></video>`
    : `<audio src="${rec.mediaUrl}" controls preload="metadata" class="upload-preview-media"></audio>`}</div>
  <div class="form-group" style="margin-top:10px"><label>전달 메모 (선택)</label><textarea id="rec-note-${l.id}" rows="2" placeholder="강사에게 전달할 메모를 남길 수 있습니다."></textarea></div>
  <div id="rec-upload-progress-wrap" style="display:none">
    <div class="upload-progress-track"><div class="upload-progress-fill" id="rec-upload-progress-fill"></div></div>
    <div style="font-size:var(--fs-caption);color:var(--text-faint);margin-top:6px" id="rec-upload-progress-label">업로드 중...</div>
  </div>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn btn-secondary btn-sm" id="rec-cancel-btn" style="flex:1" onclick="recRetry(${l.id})">다른 파일 선택</button>
    <button class="btn btn-primary btn-sm" id="rec-submit-btn" style="flex:1" onclick="recSubmit(${l.id})">강사에게 제출</button>
  </div>`;
  }
  // 파일 선택 전
  return `<div id="rec-upload-drop" class="upload-drop" onclick="document.getElementById('rec-file-input').click()">
    <div class="upload-drop-icon">🎙️</div>
    <div class="upload-drop-text">클릭해서 파일 선택</div>
    <div class="upload-drop-sub">음성(mp3, m4a, wav) 또는 영상(mp4, mov) 파일</div>
  </div>
  <input type="file" id="rec-file-input" accept="audio/*,video/*" style="display:none" onchange="recFileSelected(${l.id},this)">`;
}

function recRefreshPanel(l){
  const body = document.getElementById('rec-panel-body');
  if(body) body.innerHTML = renderRecordingPanelBody(l);
}

/* 파일 선택 시 미리보기를 채워준다. 과제 제출 모달(onHomeworkFileSelected)과 동일한 방식. */
function recFileSelected(lectureId, input){
  const file = input.files && input.files[0];
  if(!file) return;
  const sizeLabel = file.size > 1024*1024 ? `${(file.size/1024/1024).toFixed(1)}MB` : `${Math.max(1,Math.round(file.size/1024))}KB`;
  const mediaType = file.type.startsWith('video/') ? 'video' : (file.type.startsWith('audio/') ? 'audio' : (file.name.match(/\.(mp4|mov|webm|m4v)$/i) ? 'video' : 'audio'));
  const mediaUrl = URL.createObjectURL(file);
  if(lectureRecordings[lectureId]?.mediaUrl) URL.revokeObjectURL(lectureRecordings[lectureId].mediaUrl);
  lectureRecordings[lectureId] = {mediaUrl, mediaType, fileName:file.name, fileSize:sizeLabel, submitted:false};
  const l = vodLectures.find(x=>x.id===lectureId);
  if(l) recRefreshPanel(l);
}

function recRetry(lectureId){
  if(lecUploadTimer){ clearInterval(lecUploadTimer); lecUploadTimer=null; }
  const rec = lectureRecordings[lectureId];
  if(rec?.mediaUrl) URL.revokeObjectURL(rec.mediaUrl);
  delete lectureRecordings[lectureId];
  const l = vodLectures.find(x=>x.id===lectureId);
  if(l) recRefreshPanel(l);
}

/* "강사에게 제출" 클릭 → 짧은 업로드 진행률 애니메이션(과제 제출 모달과 동일 패턴) → 완료되면
   createSubmissionFromMedia()로 실제 제출 처리. */
function recSubmit(lectureId){
  const rec = lectureRecordings[lectureId];
  const l = vodLectures.find(x=>x.id===lectureId);
  if(!rec || !l) return;
  const progressWrap = document.getElementById('rec-upload-progress-wrap');
  const progressFill = document.getElementById('rec-upload-progress-fill');
  const progressLabel = document.getElementById('rec-upload-progress-label');
  const submitBtn = document.getElementById('rec-submit-btn');
  const cancelBtn = document.getElementById('rec-cancel-btn');
  if(progressWrap) progressWrap.style.display = '';
  if(submitBtn) submitBtn.disabled = true;
  if(cancelBtn) cancelBtn.disabled = true;
  let pct = 0;
  let stopped = false;
  const tick = ()=>{
    if(stopped) return;
    pct = Math.min(100, pct + 18 + Math.random()*12);
    if(progressFill) progressFill.style.width = pct+'%';
    if(progressLabel) progressLabel.textContent = pct>=100 ? '업로드 완료' : `업로드 중... ${Math.round(pct)}%`;
    if(pct>=100){
      stopped = true;
      clearInterval(lecUploadTimer);
      lecUploadTimer = null;
      setTimeout(()=>finalizeRecordingSubmission(lectureId), 280);
    }
  };
  lecUploadTimer = setInterval(tick, 160);
}

function finalizeRecordingSubmission(lectureId){
  const rec = lectureRecordings[lectureId];
  const l = vodLectures.find(x=>x.id===lectureId);
  if(!rec || !l) return;
  const c = courseList.find(x=>x.id===l.courseId);
  const note = (document.getElementById(`rec-note-${lectureId}`)?.value || '').trim();
  const newId = createSubmissionFromMedia({
    course: c?c.name:'', lec: l.title, lecId: l.id,
    mediaUrl: rec.mediaUrl, mediaType: rec.mediaType||'audio', note,
    submissionKind:'lecture_practice',
  });
  rec.submitted = true;
  l.hasSubmit = true;
  navReturnTo = 'online_lecture';
  navigate('upload_result_'+newId);
}

/* 화면 전환(탭/강의/차시 이동) 시 호출된다. 마이크 녹음 시절에는 진행 중인 녹음을 정리하는
   역할이었으나, 파일 업로드 방식으로 바뀌면서 정리할 미디어 스트림이 더는 없다. 다른 화면
   전환 코드 곳곳에서 이 함수를 호출하므로 이름과 시그니처는 그대로 유지하고 내부만 비웠다. */
function recStop(){
  if(lecUploadTimer){ clearInterval(lecUploadTimer); lecUploadTimer=null; }
}

/* ── 강사: 제출물 검토 탭 — 강의별 정리, 출처 무관 통합 ──
   기존에는 "제출 녹음"(과제+온라인강의 제출, 최신 8건 평면 리스트)과 "현장 촬영 평가"(강사 촬영,
   강의별 아코디언), 그리고 "수업 관리"의 "과제 관리" 표가 같은 submissionLog를 세 가지 다른
   화면·레이아웃으로 나눠 보여주고 있었다. 출처에 따라 보이는 곳이 다르면 강사가 "어디서 확인해야
   하는지" 헷갈리고, 같은 강의의 제출물이 여러 화면에 흩어져 전체 그림을 보기도 어려웠다.
   이제 출처(과제 제출/온라인 강의 연습/강사 촬영)에 관계없이 모든 제출물을 하나의 화면에서,
   다음 두 단계로 정리해 보여준다.
   1) 수업 단위로만 알약 필터를 둔다 — 수업 수는 구조적으로 적게 유지되므로(보통 5~10개 이하)
      제출물·강의 수가 아무리 늘어나도 알약이 무한정 늘어나는 문제를 피할 수 있다.
   2) 그 안에서 강의(차시)별로 섹션을 나누고, 기본은 접힌 아코디언으로 둔다 — 건수만 보고도
      한눈에 파악되고, 강의가 수십 개로 늘어나도 세로 스크롤만 하면 된다.
   각 카드에는 submissionKindMeta 기준 출처 뱃지(과제 제출/온라인 강의 연습/강사 촬영)가 항상
   표시되어, 강의 섹션 안에서도 어떤 경로로 들어온 제출물인지 한 번에 구분된다.
   섹션 그룹화는 assignmentGroupKey()의 lecId 기준을 그대로 써서 출처가 달라도 같은 강의차시면
   하나의 섹션으로 합쳐진다(예: 학생이 과제로 제출한 것과 강사가 같은 차시를 촬영한 것이 한 섹션에 모임). */
let srCourseFilter = 'all'; // 'all' | courseList.id
let srKindFilter = 'all'; // 'all' | 'assignment' | 'lecture_practice' | 'instructor_capture'
let srExpandedKeys = new Set(); // 펼쳐진 강의 섹션의 assignmentGroupKey

function renderSubmissionReviewTab(){
  const all = submissionLog.slice();
  const myCourses = courseList.filter(c=>c.instr===roles.instructor.name);
  const unverifiedTotal = all.filter(s=>s.aiStatus!=='analyzing' && s.verifyHistory.length===0).length;

  </div>
  <button class="btn btn-primary btn-sm" onclick="openInstructorCaptureModal()">🎬 현장 촬영/녹음 업로드</button>

  <button class="gc-course-filter${srCourseFilter==='all'?' active':''}" onclick="srFilterByCourse('all')">전체 수업 <span class="ic-filter-count">${all.length}</span></button>
  ${myCourses.map(c=>{
    const count = all.filter(s=>s.course===c.name).length;
    if(!count) return '';
    return `<button class="gc-course-filter${srCourseFilter===c.id?' active':''}" onclick="srFilterByCourse(${c.id})">${c.name} <span class="ic-filter-count">${count}</span></button>`;

  ${kindOrder.map(kind=>{
    const count = all.filter(s=>s.submissionKind===kind).length;
    if(!count) return '';
    const meta = submissionKindMeta[kind];
    return `<button class="gc-course-filter${srKindFilter===kind?' active':''}" onclick="srFilterByKind('${kind}')">${meta.label} <span class="ic-filter-count">${count}</span></button>`;
  }).join('')}
</div>` : ''}
<div id="sr-sections">${renderSubmissionReviewSections()}</div>`;
}

/* 강의(lecId 기준) 섹션 목록 — 현재 선택된 수업 필터·출처 필터(둘 다 AND 조건)에 맞는 항목만
   그룹화해 보여준다. 섹션 헤더를 클릭하면 펼치고/접고, 미검증 건이 있으면 헤더에서부터 바로
   보이게 뱃지를 단다. */
function renderSubmissionReviewSections(){
  let items = submissionLog.slice();
  if(srCourseFilter!=='all'){
    const course = courseList.find(c=>c.id===srCourseFilter);
    items = items.filter(s=>s.course===course?.name);
  }
  if(srKindFilter!=='all'){
    items = items.filter(s=>s.submissionKind===srKindFilter);
  }
  if(!items.length) return '<div class="md-detail-empty">조건에 맞는 제출물이 없습니다.</div>';

  const groups = {};
  items.forEach(s=>{
    const key = assignmentGroupKey(s);
    if(!groups[key]) groups[key] = {key, lec:s.lec, course:s.course, items:[]};
    groups[key].items.push(s);
  });
  // 가장 최근 항목이 있는 강의가 위로 오도록 정렬
  const sections = Object.values(groups).sort((a,b)=>{
    const maxA = Math.max(...a.items.map(s=>s.id));
    const maxB = Math.max(...b.items.map(s=>s.id));
    return maxB - maxA;
  });

  return sections.map(g=>{
    const expanded = srExpandedKeys.has(g.key);
    const unverified = g.items.filter(s=>s.verifyHistory.length===0).length;
    const sortedItems = g.items.slice().sort((a,b)=>b.id-a.id);
    return `
<div class="ic-capture-section">
  <div class="ic-capture-section-head" onclick="srToggleSection('${g.key.replace(/'/g,"\\'")}')">
    <span class="ic-capture-section-arrow">${expanded?'▾':'▸'}</span>

      <div style="font-size:var(--fs-body);font-weight:700">${g.lec}</div>
      <div style="font-size:var(--fs-caption);color:var(--text-faint)">${g.course}</div>

    <span class="badge badge-gray">${g.items.length}건</span>
    ${unverified>0?`<span class="badge badge-red" style="margin-left:6px">미검증 ${unverified}</span>`:''}
  </div>
  ${expanded?`<div class="ic-capture-section-body">${sortedItems.map(s=>renderSubmissionCard(s)).join('')}</div>`:''}
</div>`;
  }).join('');
}

/* ── 과제 업로드 모달 ── 파일을 선택하면 미리보기 칩이 뜨고, "제출하기"를 누르면 업로드 진행률

let homeworkUploadDraft = null; // {assignmentId, fileName, fileSize}
/* 제출 완료 후 자동으로 열리는 "업로드 완료" 화면(재생+분석상태)에서, 지금 보고 있는 제출물의 id.
   AI 분석이 끝났을 때 이 모달이 떠 있으면 그 자리에서 점수/하이라이트로 갱신해준다. 모달이 닫히면 null로 되돌린다. */
let activeUploadResultSubmissionId = null;

function openHomeworkUploadModal(assignmentId){
  const h = assignmentLog.find(x=>x.id===assignmentId);
  if(!h) return;
  if(homeworkUploadDraft?.mediaUrl) URL.revokeObjectURL(homeworkUploadDraft.mediaUrl);
  homeworkUploadDraft = null;
  document.getElementById('modal-content').innerHTML = `

<div class="form-group"><label>녹음/영상 파일</label>
  <div id="hw-upload-drop" class="upload-drop" onclick="document.getElementById('hw-upload-input').click()">

  </div>

<div class="form-group"><label>전달 메모 (선택)</label><textarea id="hw-upload-note" rows="3" placeholder="강사에게 전달할 메모를 남길 수 있습니다."></textarea></div>
<div id="hw-upload-progress-wrap" style="display:none">
  <div class="upload-progress-track"><div class="upload-progress-fill" id="hw-upload-progress-fill"></div></div>
  <div style="font-size:var(--fs-caption);color:var(--text-faint);margin-top:6px" id="hw-upload-progress-label">업로드 중...</div>

  <button class="btn btn-primary" id="hw-upload-submit-btn" disabled onclick="submitNewHomework(${assignmentId})">제출하기</button>

function onHomeworkFileSelected(assignmentId, input){
  const file = input.files && input.files[0];
  if(!file) return;
  // 이전에 선택했던 파일의 objectURL이 있다면 교체 전에 해제 — 메모리에 여러 개를 쌓아두지 않도록
  if(homeworkUploadDraft?.mediaUrl) URL.revokeObjectURL(homeworkUploadDraft.mediaUrl);

  const sizeLabel = file.size > 1024*1024 ? `${(file.size/1024/1024).toFixed(1)}MB` : `${Math.max(1,Math.round(file.size/1024))}KB`;
  const mediaType = file.type.startsWith('video/') ? 'video' : (file.type.startsWith('audio/') ? 'audio' : (file.name.match(/\.(mp4|mov|webm|m4v)$/i) ? 'video' : 'audio'));
  const mediaUrl = URL.createObjectURL(file);
  homeworkUploadDraft = {assignmentId, fileName: file.name, fileSize: sizeLabel, mediaUrl, mediaType};

  document.getElementById('hw-upload-drop').classList.add('has-file');
  document.getElementById('hw-upload-file-chip').innerHTML = `
    <div class="upload-file-chip">${mediaType==='video'?'🎥':'🎵'} <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</span><span style="color:var(--text-faint);font-size:var(--fs-caption)">${sizeLabel}</span><span class="remove" onclick="event.stopPropagation();clearHomeworkFile()">제거</span></div>
    <div class="upload-preview-wrap">${mediaType==='video'
      ? `<video src="${mediaUrl}" controls preload="metadata" class="upload-preview-media"></video>`
      : `<audio src="${mediaUrl}" controls preload="metadata" class="upload-preview-media"></audio>`}</div>`;
  const btn = document.getElementById('hw-upload-submit-btn');
  if(btn) btn.disabled = false;
}

function clearHomeworkFile(){
  if(homeworkUploadDraft?.mediaUrl) URL.revokeObjectURL(homeworkUploadDraft.mediaUrl);
  homeworkUploadDraft = null;
  const input = document.getElementById('hw-upload-input');
  if(input) input.value = '';
  document.getElementById('hw-upload-drop').classList.remove('has-file');
  document.getElementById('hw-upload-file-chip').innerHTML = '';
  const btn = document.getElementById('hw-upload-submit-btn');
  if(btn) btn.disabled = true;
}

/* 제출 버튼 클릭 → 짧은 업로드 진행률 애니메이션 → 실제 데이터 반영(submissionLog/assignmentLog/타임라인)
   → 모달 닫기 → "할 일" 탭 새로고침. 이후 3초 뒤 AI 분석이 완료되며 화면이 떠 있으면 그 자리에서 갱신된다. */
let homeworkUploadTimer = null; // 모달이 도중에 닫히면 closeModal/cancelHomeworkUpload에서 이 타이머를 정리한다

function submitNewHomework(assignmentId){
  if(!homeworkUploadDraft || homeworkUploadDraft.assignmentId!==assignmentId) return;
  const progressWrap = document.getElementById('hw-upload-progress-wrap');
  const progressFill = document.getElementById('hw-upload-progress-fill');
  const progressLabel = document.getElementById('hw-upload-progress-label');
  const submitBtn = document.getElementById('hw-upload-submit-btn');
  if(progressWrap) progressWrap.style.display = '';
  if(submitBtn) submitBtn.disabled = true;
  let pct = 0;
  // setInterval이 콜백을 동기적으로 호출하는 경우에도 안전하도록, 콜백 정의와 homeworkUploadTimer
  // 할당을 분리한다 — 콜백 안에서 clearInterval(homeworkUploadTimer)를 호출할 때 그 값이
  // 아직 대입되지 않았을 수 있으므로, 정지는 반환된 핸들이 아니라 별도 플래그로 판단한다.
  let stopped = false;
  const tick = ()=>{
    if(stopped) return;
    pct = Math.min(100, pct + 18 + Math.random()*12);
    if(progressFill) progressFill.style.width = pct+'%';
    if(progressLabel) progressLabel.textContent = pct>=100 ? '업로드 완료' : `업로드 중... ${Math.round(pct)}%`;
    if(pct>=100){
      stopped = true;
      clearInterval(homeworkUploadTimer);
      homeworkUploadTimer = null;
      setTimeout(()=>finalizeHomeworkSubmission(assignmentId), 280);
    }
  };
  homeworkUploadTimer = setInterval(tick, 160);
}

/* ── 새 제출물 생성 공통 헬퍼 ── "할 일" 탭의 과제 업로드, 온라인 강의의 연습 파일 업로드, 강사의
   현장 촬영 평가가 모두 동일한 패턴(AI 분석중 상태로 submissionLog에 추가 → 타임라인 기록 →
   10초 후 분석완료)을 공유하므로 한 곳으로 모았다. 호출부마다 달랐던 student/course/lec/mediaUrl
   등만 매개변수로 받는다.
   - studentName: 이 제출물의 주인(평가 대상 학생). 생략 시 현재 로그인한 학생 본인.
   - sourceType: 'self'(학생 본인 제출, 기본값) | 'instructor_capture'(강사가 현장에서 촬영/녹음해 대신 등록)
     — "누가 업로드를 실행했는가" 축.
   - submissionKind: 'assignment'(강사가 낸 과제 제출) | 'lecture_practice'(온라인 강의 연습 제출,
     기본값) | 'instructor_capture'(강사 현장 촬영) — "이 제출물이 어떤 맥락에서 생겼는가" 축.
     화면에서 강사/학생 모두에게 항상 보이는 출처 뱃지 3종이 이 필드 기준으로 갈린다.
   - submittedBy: 실제로 업로드를 수행한 사람 이름. instructor_capture일 때 강사 이름이 들어간다. */
function createSubmissionFromMedia({course, lec, lecId, mediaUrl, mediaType, note, dateLabel, studentName, sourceType, submittedBy, submissionKind}){
  const targetStudent = studentName || roles.student.name;
  const srcType = sourceType || 'self';
  const kind = submissionKind || (srcType==='instructor_capture' ? 'instructor_capture' : 'lecture_practice');
  const newId = Math.max(...submissionLog.map(x=>x.id)) + 1;
  const now = new Date();
  const dateStr = dateLabel || `${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const submittedAtStr = `2026.${dateStr} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const zeroScores = {pitch:0,rhythm:0,breath:0,resonance:0};
  const newSubmission = {
    id:newId, student:targetStudent, course, lec, lecId: lecId!=null ? lecId : null, date:dateStr, submittedAt:submittedAtStr,
    aiScore:0, confidence:0, verifyStatus:'pending', hasDetail:false, aiStatus:'analyzing',
    aiScores:{...zeroScores}, adjustedScores:{...zeroScores}, verifyHistory:[],
    hasVideo: mediaType==='video',
    mediaUrl: mediaUrl || null, mediaType: mediaType || null,
    fbDone:false, feedbackText:'', highlights:[],
    durationSec: 80 + Math.round(Math.random()*100), // 실제 미디어가 로드되면 onSubPlayerMediaLoaded()가 정확한 길이로 갱신한다
    analysisAttempt: 0, analysisMaxAttempts: 0, // runVocalAnalysis()가 실제 API 시도 중에만 채운다
    studentNote: note || '',
    sourceType: srcType,
    submissionKind: kind,
    submittedBy: submittedBy || targetStudent,
  };
  submissionLog.push(newSubmission);

  studentTimelineLog.unshift({
    id:'tl'+Date.now()+Math.round(Math.random()*999), type:'submission', date:'2026.'+dateStr, course,
    title:lec, scoreLabel:'AI 종합', submissionRef:newId,
    summary: srcType==='instructor_capture'
      ? `${submittedBy} 강사가 현장에서 촬영한 영상입니다. AI가 음정·박자·호흡·공명을 분석하는 중입니다.`
      : 'AI가 음정·박자·호흡·공명을 분석하는 중입니다.',
  });

  if(VOCAL_ANALYSIS_API_URL){
    // 실제 백엔드가 설정되어 있으면 진짜 OpenAI 분석을 시도한다. 실패하면(네트워크 오류,
    // 백엔드 미배포, 키 미설정 등) runVocalAnalysis 내부에서 completeAiAnalysis()로 자동 폴백한다.
    runVocalAnalysis(newId, mediaUrl, mediaType, lec);
  } else {
    setTimeout(()=>completeAiAnalysis(newId), 10000);
  }
  return newId;
}

/* 실제 AI 분석 재시도 진행 상태를 화면에 보여주기 위한 헬퍼들.
   s.analysisAttempt/s.analysisMaxAttempts는 runVocalAnalysis()가 시도할 때마다 갱신한다.
   백엔드 미설정(데모 모드)이거나 아직 시도 전이면 analysisMaxAttempts가 없어 빈 문자열을 반환한다. */
function aiAttemptStepper(s){
  if(!s.analysisMaxAttempts) return '';
  const max = s.analysisMaxAttempts, cur = s.analysisAttempt||0;
  const dots = Array.from({length:max},(_,i)=>{
    const n = i+1;
    const cls = n<cur ? 'done' : n===cur ? 'active' : '';
    return `<span class="ai-attempt-dot ${cls}"></span>`;
  }).join('');
  return `<span class="ai-attempt-stepper" title="AI 분석 시도 ${cur}/${max}">${dots}<span class="ai-attempt-label">${cur}/${max}</span></span>`;
}
function aiAnalyzingLongText(s){
  const base = 'AI가 음정·박자·호흡·공명을 분석하는 중입니다.';
  if(s.analysisMaxAttempts){
    return `${base} 실제 분석 서버 응답을 기다리는 중입니다 (시도 ${s.analysisAttempt||1}/${s.analysisMaxAttempts}). 분석이 끝나면 구간별 하이라이트가 여기에 표시됩니다.`;
  }
  return `${base} 분석이 끝나면 구간별 하이라이트가 여기에 표시됩니다.`;
}

/* Blob → base64 문자열(데이터 URI의 접두어 "data:...;base64," 제외) 변환 */
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onloadend = ()=>{
      const result = String(reader.result||'');
      const comma = result.indexOf(',');
      resolve(comma>-1 ? result.slice(comma+1) : result);
    };
    reader.onerror = ()=>reject(reader.error||new Error('파일을 읽지 못했습니다.'));
    reader.readAsDataURL(blob);
  });
}

const VOCAL_ANALYSIS_MAX_ATTEMPTS = 3;
const VOCAL_ANALYSIS_RETRY_DELAY_MS = 1500;

/* 실제 OpenAI 분석 요청 — mediaUrl(브라우저 blob URL)에서 실제 업로드 파일을 다시 읽어
   base64로 인코딩한 뒤 백엔드(/api/analyze-vocal)에 전송한다. 최대 VOCAL_ANALYSIS_MAX_ATTEMPTS번까지
   재시도하며, 시도할 때마다 s.analysisAttempt를 갱신하고 화면을 새로고침해 진행 상태(●●○)를
   보여준다. 모든 시도가 실패하면 그때만 기존 데모 시뮬레이션(completeAiAnalysis)으로 대체한다 —
   백엔드가 잠깐 불안정해도 시연이 끊기지 않도록 하기 위한 안전망이다. */
async function runVocalAnalysis(submissionId, mediaUrl, mediaType, songTitle){
  const s = submissionLog.find(x=>x.id===submissionId);
  if(!s || !mediaUrl) { completeAiAnalysis(submissionId); return; }

  s.analysisMaxAttempts = VOCAL_ANALYSIS_MAX_ATTEMPTS;
  s.analysisAttempt = 0;

  // 파일 읽기/base64 인코딩은 시도마다 반복할 필요 없이 한 번만 수행한다.
  let base64, mimeType;
  try{
    const fileRes = await fetch(mediaUrl);
    const blob = await fileRes.blob();
    base64 = await blobToBase64(blob);
    mimeType = blob.type || mediaType || 'audio/mpeg';
  } catch(err){
    console.warn('[SMMS] 업로드 파일을 다시 읽지 못했습니다 — 데모 결과로 대체합니다:', err);
    completeAiAnalysis(submissionId);
    return;
  }

  for(let attempt=1; attempt<=VOCAL_ANALYSIS_MAX_ATTEMPTS; attempt++){
    s.analysisAttempt = attempt;
    refreshAfterAiAnalysisComplete(submissionId); // 열려있는 화면에 "시도 n/3" 진행 상태 반영

    try{
      const apiRes = await fetch(VOCAL_ANALYSIS_API_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ audioBase64: base64, mimeType, songTitle }),
      });
      const json = await apiRes.json().catch(()=>null);
      if(!apiRes.ok || !json || !json.ok) {
        throw new Error((json && json.error) || `백엔드 응답 오류 (HTTP ${apiRes.status})`);
      }
      applyRealAnalysisResult(submissionId, json.result);
      return; // 성공 — 재시도 중단
    } catch(err){
      console.warn(`[SMMS] 실제 AI 분석 시도 ${attempt}/${VOCAL_ANALYSIS_MAX_ATTEMPTS} 실패:`, err);
      if(attempt < VOCAL_ANALYSIS_MAX_ATTEMPTS){
        await new Promise(resolve=>setTimeout(resolve, VOCAL_ANALYSIS_RETRY_DELAY_MS));
      }
    }
  }

  // 3회 모두 실패 — 데모 결과로 대체
  console.warn(`[SMMS] 실제 AI 분석 ${VOCAL_ANALYSIS_MAX_ATTEMPTS}회 모두 실패 — 데모 결과로 대체합니다.`);
  completeAiAnalysis(submissionId);
}

/* /api/analyze-vocal이 돌려준 영문 키 JSON(analyze-vocal.js의 JSON_SCHEMA 참고)을
   기존 리포트 렌더링 함수(vreportTab*)가 기대하는 한글 라벨 구조로 매핑해 submissionLog에 반영한다. */
function applyRealAnalysisResult(submissionId, r){
  const s = submissionLog.find(x=>x.id===submissionId);
  if(!s || !r) return;
  const dur = s.durationSec || 180;
  const n = (r.highlights||[]).length || 1;
  Object.assign(s, {
    aiScores:{ pitch:r.overall.pitch, rhythm:r.overall.rhythm, breath:r.overall.breath, resonance:Math.round((r.resonanceDetail.nasal+r.resonanceDetail.oral+r.resonanceDetail.chest+r.resonanceDetail.head)/4) },
    adjustedScores:{ pitch:r.overall.pitch, rhythm:r.overall.rhythm, breath:r.overall.breath, resonance:Math.round((r.resonanceDetail.nasal+r.resonanceDetail.oral+r.resonanceDetail.chest+r.resonanceDetail.head)/4) },
    aiScore: r.overall.total, confidence: 70, hasDetail: true,
    highlights: (r.highlights||[]).map((h,i)=>({
      t: h.approxTimeLabel, sec: Math.round(((i+0.5)/n) * dur), text: h.text, tag: h.tag,
    })),
    overall: r.overall,
    voiceProduction: [
      ['성대 접촉', r.voiceProduction.vocalCordContact], ['성대 압력', r.voiceProduction.vocalCordPressure],
      ['호흡 지지', r.voiceProduction.breathSupport], ['발성 일관성', r.voiceProduction.consistency],
      ['소리 밀도', r.voiceProduction.soundDensity], ['발성 안정도', r.voiceProduction.stability],
    ],
    pitchDetail: { avg:r.pitchDetail.avg, start:r.pitchDetail.start, sustain:r.pitchDetail.sustain, end:r.pitchDetail.end, deviation:r.pitchDetail.deviationCents, tendency:r.pitchDetail.tendency },
    rhythmDetail: r.rhythmDetail,
    range: { lowest:r.range.lowestNote, highest:r.range.highestNote, mainRange:r.range.mainRange, safeRange:r.range.safeRange, songRequires:r.range.songRequiresNote, note:r.range.note },
    breathDetail: r.breathDetail,
    resonanceDetail: [
      ['비강 공명', r.resonanceDetail.nasal], ['구강 공명', r.resonanceDetail.oral],
      ['흉성 공명', r.resonanceDetail.chest], ['두성 공명', r.resonanceDetail.head],
    ],
    timbre: r.timbre,
    diction: r.diction,
    expression: r.expression,
    performance: s.hasVideo ? (s.performance||null) : null,
    growth: [{ label:s.date, pitch:r.overall.pitch, breath:r.overall.breath, voice:r.overall.voice, expression:r.overall.expression }],
    strengths: r.strengths, improvements: r.improvements, practice: r.practice,
    vocalComment: r.vocalComment, overallReview: r.overallReview, vocalStyleNote: r.vocalStyleNote,
    songFit: { recommended: r.songFit.recommendedArtists, notRecommended: { artists: r.songFit.notRecommendedArtists, reason: r.songFit.notRecommendedReason } },
    trend: [{ label:s.date, score:r.overall.total }],
  });
  s.aiStatus = 'done';
  s._playbackReady = false;
  ensureSubmissionPlaybackMeta(s);

  const tlItem = studentTimelineLog.find(x=>x.submissionRef===submissionId);
  if(tlItem) tlItem.summary = `AI 1차 분석이 완료되었습니다. 종합 ${s.aiScore}점 — 강사 확인 후 정식 피드백이 도착합니다.`;

  refreshAfterAiAnalysisComplete(submissionId);
}

function finalizeHomeworkSubmission(assignmentId){
  const idx = assignmentLog.findIndex(x=>x.id===assignmentId);
  if(idx===-1) return;
  const h = assignmentLog[idx];
  const note = (document.getElementById('hw-upload-note')?.value || '').trim();

    course:h.course, lec:h.title, lecId:h.lecId, mediaUrl:draft?.mediaUrl, mediaType:draft?.mediaType, note,
